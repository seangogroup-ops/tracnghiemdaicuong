D. xã hội - tôn giáo.
Gt: Chủ nghĩa xã hội khoa học tập trung nghiên cứu cơ cấu xã hội - giai cấp.

Câu 2: Cơ cấu xã hội - giai cấp biến đổi gắn liền và bị quy định bởi
A. chế độ tư hữu.
*B. cơ cấu kinh tế.
C. hình thái ý thức xã hội.
D. chính sách xã hội.
Gt: Cơ cấu xã hội - giai cấp biến đổi gắn liền và bị quy định bởi cơ cấu kinh tế của thời kỳ quá độ lên chủ nghĩa xã hội.

Câu 3: Luận điểm "Những tư tưởng thống trị của một thời đại bao giờ cũng chỉ là tư tưởng của giai cấp thống trị" là của ai sau đây?
*A. C. Mác và Ph. Ăngghen.
B. Ph. Ăngghen.
C. Xtalin.
D. Xtalin và V.I. Lênin.
Gt: Luận điểm trên là của C. Mác và Ph. Ăngghen, được viết trong tác phẩm Hệ tư tưởng Đức.

Câu 4: Cơ cấu xã hội - giai cấp của thời kỳ quá độ lên chủ nghĩa tư bản được đặc trưng bởi hai giai cấp cơ bản là
*A. tư sản và vô sản.
B. tư sản và trí thức.
C. tư sản và nông dân.
D. tư sản và tiểu tư sản.
Gt: Trong xã hội tư bản chủ nghĩa, giai cấp tư sản nắm tư liệu sản xuất, còn giai cấp vô sản không có (hoặc rất ít) tư liệu sản xuất, đó là đặc trưng cơ bản của cơ cấu xã hội - giai cấp thời kỳ này.

Câu 5: Tất cả những cộng đồng người cùng toàn bộ những mối quan hệ xã hội do sự tác động lẫn nhau của các cộng đồng ấy tạo nên gọi là
A. cơ cấu dân cư.
B. cộng đồng người.
C. cộng đồng xã hội.
*D. cơ cấu xã hội.
Gt: Cơ cấu xã hội là những cộng đồng người cùng toàn bộ những mối quan hệ xã hội do sự tác động lẫn nhau của các cộng đồng ấy tạo nên.

Câu 6: Trong các cơ cấu hợp thành cơ cấu xã hội, cơ cấu nào sau đây giữ vị trí quan trọng hàng đầu?
A. Cơ cấu xã hội - nghề nghiệp.
B. Cơ cấu xã hội - dân tộc.
*C. Cơ cấu xã hội - giai cấp.
D. Cơ cấu xã hội - tôn giáo.
Gt: Cơ cấu xã hội - giai cấp có vị trí quan trọng hàng đầu, chi phối các loại hình cơ cấu xã hội khác.

Câu 7: Mức độ liên minh, xích lại gần nhau giữa các giai cấp, tầng lớp trong thời kỳ quá độ lên chủ nghĩa xã hội tùy thuộc vào yếu tố nào sau đây?
*A. Điều kiện kinh tế - xã hội.
B. Hoàn cảnh lịch sử cụ thể.
C. Quan điểm của tầng lớp trí thức.
D. Tư tưởng của đội ngũ doanh nhân.
Gt: Mức độ liên minh, xích lại gần nhau giữa các giai cấp, tầng lớp trong thời kỳ quá độ lên chủ nghĩa xã hội tùy thuộc vào các điều kiện kinh tế - xã hội của đất nước trong từng giai đoạn.

Câu 8: Cơ sở để hoạch định chính sách phát triển kinh tế và tổ chức đời sống xã hội một cách phù hợp phải dựa vào
A. quan hệ giữa trí thức và tư sản.
*B. cơ cấu xã hội - giai cấp.
C. cơ cấu xã hội - dân số.
D. quan hệ giữa sản xuất và tự nhiên.
Gt: Cơ sở để hoạch định chính sách phát triển kinh tế và tổ chức đời sống xã hội phải dựa vào cơ cấu xã hội - giai cấp.

Câu 9: Trong thời kỳ quá độ lên chủ nghĩa xã hội, cơ cấu xã hội - giai cấp bao gồm những giai cấp, tầng lớp cơ bản nào sau đây?
*A. Công nhân, nông dân, trí thức.
B. Tiểu tư sản, tiểu thương, tiểu chủ.
C. Doanh nhân, tiểu thương, tiểu chủ.
D. Công nhân, tiểu chủ, tiểu tư sản.
Gt: Các giai cấp, tầng lớp xã hội cơ bản trong cơ cấu xã hội - giai cấp thời kỳ quá độ gồm giai cấp công nhân, giai cấp nông dân, tầng lớp trí thức và các tầng lớp xã hội khác.

Câu 10: Việc hoạch định chính sách phát triển kinh tế, văn hóa, xã hội của mỗi quốc gia trong thời kỳ quá độ chủ yếu phải dựa vào cơ cấu nào sau đây?
A. Xã hội - dân số.
B. Xã hội - nghề nghiệp.
*C. Xã hội - giai cấp.
D. Xã hội - dân tộc.
Gt: Cơ cấu xã hội - giai cấp là căn cứ cơ bản để xây dựng chính sách phát triển kinh tế, văn hóa, xã hội của mỗi giai đoạn lịch sử cụ thể.

Câu 11: Sự xích lại gần nhau về quan hệ phân phối tư liệu tiêu dùng giữa các giai cấp, tầng lớp chủ yếu liên quan tới việc hoàn thiện chế độ phân phối theo
*A. kết quả lao động.
B. phúc lợi xã hội.
C. nhu cầu cá nhân.
D. địa vị xã hội.
Gt: Sự xích lại gần nhau về quan hệ phân phối tư liệu tiêu dùng giữa các giai cấp, tầng lớp liên quan tới việc hoàn thiện chế độ phân phối theo kết quả lao động.

Câu 12: Trong các loại hình của cơ cấu xã hội, cơ cấu xã hội - giai cấp có vị trí
A. chủ yếu.
B. thứ yếu.
C. bao trùm tuyệt đối.
*D. quan trọng hàng đầu.
Gt: Cơ cấu xã hội - giai cấp có vị trí quan trọng hàng đầu, chi phối các loại hình cơ cấu xã hội khác.

Câu 13: Trong thời kỳ quá độ lên chủ nghĩa xã hội, cơ cấu xã hội - giai cấp biến đổi theo hướng đa dạng, phức tạp, làm xuất hiện thêm
A. phương thức sản xuất mới.
*B. các tầng lớp xã hội mới.
C. mâu thuẫn xã hội sâu sắc.
D. đấu tranh giai cấp gay gắt.
Gt: Trong thời kỳ quá độ lên chủ nghĩa xã hội, cơ cấu xã hội - giai cấp biến đổi đa dạng, phức tạp, làm xuất hiện thêm các tầng lớp xã hội mới.

Câu 14: Cơ cấu xã hội - giai cấp biến đổi có tính quy luật, gắn liền và bị quy định bởi
A. bản chất của cơ cấu xã hội.
B. bản chất của chính sách nhà nước.
*C. trình độ của lực lượng sản xuất.
D. trình độ của công cụ lao động.
Gt: Cơ cấu xã hội - giai cấp có vị trí quyết định, bắt nguồn từ quan hệ sở hữu tư liệu sản xuất, quản lý và tổ chức lao động, quyết định bởi trình độ của lực lượng sản xuất.

Câu 15: Căn cứ để nhận diện cơ cấu xã hội - giai cấp là
*A. quan hệ sản xuất.
B. lực lượng sản xuất.
C. ý thức xã hội.
D. tồn tại xã hội.
Gt: Cơ cấu xã hội - giai cấp là hệ thống các giai cấp, tầng lớp xã hội tồn tại khách quan trong một chế độ xã hội nhất định, thông qua những quan hệ về sở hữu tư liệu sản xuất, tức là dựa trên quan hệ sản xuất.

Câu 16: Giai cấp công nhân giữ vai trò chủ đạo trong khối liên minh là do yếu tố nào sau đây quy định?
A. Được kế thừa truyền thống đấu tranh.
B. Luôn đi đầu trong các cuộc đấu tranh.
*C. Địa vị kinh tế - xã hội quy định.
D. Có mối quan hệ gắn bó với nông dân.
Gt: Vai trò chủ đạo của giai cấp công nhân trong khối liên minh xuất phát từ vị trí kinh tế - xã hội khách quan, gắn với phương thức sản xuất tiên tiến, đại diện cho lợi ích chung của toàn xã hội.

Câu 17: Các giai cấp, tầng lớp trong thời kỳ quá độ lên chủ nghĩa xã hội biến đổi trong mối quan hệ với nhau tạo nên đối tượng nghiên cứu chính là
A. cơ cấu xã hội - dân số.
*B. cơ cấu xã hội - giai cấp.
C. quan hệ dân cư.
D. quan hệ dân tộc.
Gt: Các giai cấp, tầng lớp trong thời kỳ quá độ lên chủ nghĩa xã hội biến đổi trong mối quan hệ với nhau, thể hiện đối tượng nghiên cứu chính là cơ cấu xã hội - giai cấp.

Câu 18: Cơ cấu xã hội - giai cấp trong thời kỳ quá độ lên chủ nghĩa xã hội biến đổi trong mối quan hệ
*A. vừa đấu tranh, vừa liên minh với nhau.
B. bài trừ và phủ định lẫn nhau.
C. đối đầu.
D. bài xích.
Gt: Trong thời kỳ quá độ từ chủ nghĩa tư bản lên chủ nghĩa xã hội, cơ cấu xã hội - giai cấp biến đổi trong mối quan hệ vừa có mâu thuẫn, đấu tranh, vừa có hợp tác với nhau.

Câu 19: Tính đa dạng, phức tạp của cơ cấu xã hội - giai cấp được biểu hiện ở sự tồn tại đan xen của các
A. dân tộc, tôn giáo.
B. thành phần dân cư.
C. lĩnh vực kinh tế.
*D. giai cấp, tầng lớp.
Gt: Cơ cấu xã hội - giai cấp là hệ thống các giai cấp, tầng lớp xã hội tồn tại khách quan; tính đa dạng, phức tạp thể hiện ở sự tồn tại đan xen của các giai cấp, tầng lớp khác nhau trong xã hội.

Câu 20: Trong thời kỳ quá độ, nền kinh tế nhiều thành phần tất yếu tạo ra cơ cấu xã hội - giai cấp
A. thuần nhất.
*B. đa dạng và phức tạp.
C. thống nhất.
D. bài trừ và phủ định.
Gt: Trong thời kỳ quá độ, nền kinh tế nhiều thành phần tất yếu dẫn đến cơ cấu xã hội - giai cấp đa dạng và phức tạp.

Câu 21: Nguyên nhân thất bại trong nhiều cuộc đấu tranh của công nhân là do chưa liên minh chặt chẽ với "người bạn đồng hành tự nhiên" của mình là
*A. nông dân.
B. trí thức.
C. thợ thủ công.
D. tiểu tư sản.
Gt: Nguyên nhân thất bại trong nhiều cuộc đấu tranh của công nhân là do chưa liên minh chặt chẽ với "người bạn đồng hành tự nhiên" của mình là giai cấp nông dân.

Câu 22: "Nếu không liên minh với nông dân thì không thể có được chính quyền của giai cấp vô sản" là khẳng định của ai sau đây?
A. C. Mác.
*B. V.I. Lênin.
C. Hồ Chí Minh.
D. Ph. Ăngghen.
Gt: "Nếu không liên minh với nông dân thì không thể có được chính quyền của giai cấp vô sản" là khẳng định của V.I. Lênin.

Câu 23: Nhà tư tưởng nào sau đây đã ví vấn đề liên minh giữa công nhân và nông dân giống như những "bài đơn ca và điệu"?
*A. C. Mác và Ph. Ăngghen.
B. V.I. Lênin.
C. Hồ Chí Minh.
D. V.I. Lênin và Xtalin.
Gt: C. Mác và Ph. Ăngghen đã ví vấn đề liên minh giữa công nhân với nông dân được ví như những "bài đơn ca và điệu".

Câu 24: Trong quá trình xây dựng chủ nghĩa xã hội, liên minh giữa công nhân, nông dân và trí thức giữ vị trí, vai trò quan trọng nhất trên lĩnh vực nào sau đây?
A. Văn hóa.
B. Tư tưởng.
*C. Kinh tế.
D. Chính trị.
Gt: Trong quá trình xây dựng chủ nghĩa xã hội, liên minh giữa công nhân, nông dân, trí thức giữ vị trí và vai trò quan trọng nhất trên lĩnh vực kinh tế.

Câu 25: Giai cấp nào sau đây không có hệ tư tưởng độc lập?
A. Công nhân.
*B. Nông dân.
C. Địa chủ.
D. Tư sản.
Gt: Giai cấp nông dân không có hệ tư tưởng độc lập, tư tưởng của họ phụ thuộc vào hệ tư tưởng của giai cấp thống trị xã hội.

Câu 26: Nguyên tắc cơ bản nhất của liên minh giữa giai cấp công nhân, giai cấp nông dân và tầng lớp trí thức là
A. đảm bảo nguyên tắc dân chủ.
B. đảm bảo nguyên tắc tự nguyện.
*C. kết hợp đúng đắn các lợi ích.
D. kết hợp rộng rãi các lực lượng.
Gt: Nguyên tắc cơ bản nhất của liên minh là kết hợp đúng đắn các lợi ích về chính trị, kinh tế, văn hóa, xã hội.

Câu 27: Theo chủ nghĩa Mác - Lênin, giai cấp, tầng lớp nào sau đây đóng vai trò quan trọng bậc nhất trong việc thực hiện chiến lược của giai cấp công nhân trong sự nghiệp cách mạng xã hội chủ nghĩa?
*A. Trí thức.
B. Thợ thủ công.
C. Nông dân.
D. Tiểu tư sản.
Gt: Theo chủ nghĩa Mác - Lênin, đội ngũ trí thức đóng vai trò quan trọng bậc nhất trong việc thực hiện chiến lược của giai cấp công nhân trong sự nghiệp cách mạng xã hội chủ nghĩa.

Câu 28: Lĩnh vực nào sau đây là quan trọng nhất trong liên minh giữa công nhân, nông dân và trí thức?
A. Văn hóa.
*B. Kinh tế.
C. Tư tưởng.
D. Chính trị.
Gt: Nội dung kinh tế là nội dung cơ bản, quyết định nhất, là cơ sở vật chất - kỹ thuật của liên minh trong thời kỳ quá độ lên chủ nghĩa xã hội.

Câu 29: Từ góc độ chính trị, giai cấp công nhân phải liên minh với các giai cấp, tầng lớp lao động khác nhằm mục đích nào sau đây?
*A. Tập hợp lực lượng để tiến hành cách mạng xã hội chủ nghĩa.
B. Tiến hành công nghiệp hóa, hiện đại hóa đất nước.
C. Xây dựng nền văn hóa cho giai cấp nông dân.
D. Nâng cao trình độ văn hóa cho giai cấp công nhân.
Gt: Dưới sự lãnh đạo của Đảng Cộng sản, giai cấp công nhân phải liên minh với các giai cấp, tầng lớp lao động khác để tạo sức mạnh tổng hợp, đảm bảo thắng lợi cho cuộc cách mạng xã hội chủ nghĩa.

Câu 30: Từ góc độ kinh tế, liên minh giai cấp, tầng lớp trong thời kỳ quá độ lên chủ nghĩa xã hội nhằm mục đích nào sau đây?
A. Xây dựng nền văn hóa cho giai cấp nông dân.
B. Tập hợp lực lượng để tiến hành cách mạng xã hội chủ nghĩa.
*C. Thỏa mãn nhu cầu, lợi ích kinh tế của các giai cấp, tầng lớp.
D. Đảm bảo vai trò lãnh đạo của giai cấp công nhân.
Gt: Dưới góc độ kinh tế, liên minh giai cấp công nhân, giai cấp nông dân và đội ngũ trí thức nhằm thỏa mãn nhu cầu, lợi ích kinh tế của các giai cấp, tầng lớp, cùng nhau xây dựng nền kinh tế mới xã hội chủ nghĩa.

Câu 31: Một trong những nguyên tắc cơ bản xây dựng liên minh giữa công nhân, nông dân và trí thức trong cách mạng xã hội chủ nghĩa là phải đảm bảo vai trò lãnh đạo của
A. tầng lớp trí thức.
B. giai cấp nông dân.
*C. giai cấp công nhân.
D. tầng lớp trung gian.
Gt: Một trong những nguyên tắc cơ bản xây dựng liên minh giai cấp công nhân, giai cấp nông dân và đội ngũ trí thức là phải đảm bảo vai trò lãnh đạo của giai cấp công nhân.

Câu 32: Thực chất việc kết hợp đúng đắn các lợi ích kinh tế của các giai cấp, tầng lớp trong thời kỳ quá độ lên chủ nghĩa xã hội là giải quyết những
*A. mâu thuẫn giữa nhu cầu, lợi ích.
B. mong muốn của các chủ thể.
C. yêu cầu của giai cấp công nhân.
D. đòi hỏi của tầng lớp trí thức.
Gt: Trong khối liên minh, công nhân, nông dân và trí thức tuy thống nhất về cơ bản nhưng vẫn tồn tại sự khác biệt về lợi ích; việc kết hợp đúng đắn các lợi ích thực chất là giải quyết những mâu thuẫn nảy sinh giữa nhu cầu, lợi ích của các chủ thể.

Câu 33: Trong thời kỳ quá độ lên chủ nghĩa xã hội, việc xây dựng khối liên minh giữa công nhân, nông dân, trí thức cần phải xuất phát từ yếu tố nào sau đây?
A. Bản sắc.
*B. Khách quan.
C. Chủ quan.
D. Thời đại.
Gt: Sự liên minh giữa công nhân, nông dân, trí thức là đòi hỏi khách quan, xuất phát từ mối liên hệ tất yếu về kinh tế, chính trị giữa các giai cấp, tầng lớp này với nhau.

Câu 34: Từ góc độ chính trị, giai cấp công nhân phải liên minh với các giai cấp, tầng lớp lao động để thực hiện mục đích nào sau đây?
A. Hòa nhập lợi ích kinh tế.
*B. Tạo sức mạnh tổng hợp.
C. Đáp ứng nhu cầu xã hội.
D. Bảo vệ quyền lợi của thiểu số.
Gt: Dưới sự lãnh đạo của Đảng Cộng sản, giai cấp công nhân phải liên minh với các giai cấp, tầng lớp lao động khác để tạo sức mạnh tổng hợp, đảm bảo thắng lợi cho cách mạng xã hội chủ nghĩa.

Câu 35: Việc thực hiện sự liên minh giữa các giai cấp, tầng lớp trong thời kỳ quá độ lên chủ nghĩa xã hội trước tiên là để thực hiện yêu cầu nào sau đây?
A. Quan hệ phân phối.
B. Lĩnh vực tiêu dùng.
*C. Lĩnh vực kinh tế.
D. Quan hệ trao đổi.
Gt: Liên minh giai cấp, tầng lớp tạo nền tảng kinh tế - xã hội vững chắc cho khối đại đoàn kết toàn dân; do đó việc thực hiện liên minh trước tiên là để thực hiện yêu cầu ở lĩnh vực kinh tế.

Câu 36: Liên minh giai cấp, tầng lớp trong thời kỳ quá độ lên chủ nghĩa xã hội xuất phát từ yêu cầu nào sau đây?
*A. Đáp ứng các đòi hỏi khách quan của giai cấp công nhân.
B. Gắn chặt chẽ với lợi ích kinh tế và chính trị.
C. Tạo sức mạnh tổng hợp cho cách mạng xã hội chủ nghĩa.
D. Thỏa mãn lợi ích của các giai cấp, tầng lớp.
Gt: Theo chủ nghĩa Mác - Lênin, liên minh giai cấp là một tất yếu khách quan, xuất phát từ thực tiễn cách mạng nhằm đáp ứng những đòi hỏi khách quan của giai cấp công nhân trong quá trình thực hiện sứ mệnh lịch sử của mình.

Câu 37: Về mặt kinh tế - kỹ thuật, tính tất yếu của liên minh giai cấp, tầng lớp trong thời kỳ quá độ lên chủ nghĩa xã hội được thể hiện ở yêu cầu nào sau đây?
A. Đáp ứng nhu cầu xã hội.
B. Bảo vệ quyền lợi thiểu số.
*C. Gắn kết chặt chẽ các lĩnh vực kinh tế với nhau.
D. Tạo sức mạnh tổng hợp cho cách mạng xã hội chủ nghĩa.
Gt: Tính tất yếu của liên minh về mặt kinh tế - kỹ thuật xuất phát từ yêu cầu khách quan của quá trình đẩy mạnh công nghiệp hóa, hiện đại hóa, chuyển dịch cơ cấu kinh tế từ nền sản xuất nông nghiệp nhỏ sang sản xuất hàng hóa lớn, gắn kết chặt chẽ công nghiệp, nông nghiệp và khoa học công nghệ với nhau.

Câu 38: Liên minh giữa giai cấp công nhân, nông dân và trí thức phải đặt dưới sự lãnh đạo của Đảng Cộng sản là do yếu tố nào sau đây quy định?
A. Biến đổi về cơ cấu.
B. Tăng nhanh về số lượng.
*C. Địa vị kinh tế - xã hội của giai cấp công nhân.
D. Có quan hệ gắn bó với nông dân.
Gt: Theo chủ nghĩa Mác - Lênin, vai trò lãnh đạo của giai cấp công nhân trong khối liên minh không phải do số lượng đông hay ít quyết định mà do địa vị kinh tế - xã hội của giai cấp công nhân quy định.

Câu 39: Yếu tố nào sau đây quyết định địa vị kinh tế - xã hội của giai cấp công nhân, giai cấp nông dân và tầng lớp trí thức trong khối liên minh?
*A. Sự thống nhất về lợi ích cơ bản.
B. Đặc điểm chính trị, xã hội của mỗi giai cấp.
C. Điều kiện lịch sử cụ thể.
D. Cơ sở hạ tầng kinh tế của xã hội.
Gt: Giai cấp công nhân, nông dân, trí thức vừa là lực lượng sản xuất cơ bản, vừa là lực lượng chính trị - xã hội to lớn; sự thống nhất về lợi ích cơ bản là nền tảng để xây dựng khối liên minh vững chắc.

Câu 40: Một trong những nguyên tắc cơ bản xây dựng liên minh giữa công nhân, nông dân và trí thức trong cách mạng xã hội chủ nghĩa là phải đảm bảo nguyên tắc nào sau đây?
A. liên hợp.
*B. tự nguyện.
C. dân chủ.
D. tự quyết.
Gt: Theo V.I. Lênin, một trong những nguyên tắc cơ bản để xây dựng khối liên minh giữa giai cấp công nhân với giai cấp nông dân và các tầng lớp lao động khác là phải đảm bảo nguyên tắc tự nguyện.

Câu 41: Trong xã hội Việt Nam hiện nay, trí thức là một bộ phận xã hội đặc biệt quan trọng, đặc trưng bởi lao động chủ yếu là lao động
A. tổng hợp.
B. cộng đồng.
*C. trí tuệ.
D. giai cấp.
Gt: Trong xã hội Việt Nam hiện nay, trí thức là một bộ phận xã hội đặc biệt quan trọng, đặc trưng bởi lao động chủ yếu là lao động trí tuệ.

Câu 42: Ở Việt Nam, sự chuyển đổi cơ cấu kinh tế đã dẫn đến việc đa dạng hóa cơ cấu xã hội - giai cấp, bao gồm
*A. công nhân, nông dân, trí thức, doanh nhân, tiểu chủ và các tầng lớp khác.
B. công nhân, nông dân, tư sản, tiểu tư sản, đội ngũ trí thức.
C. địa chủ phong kiến, tư sản, trí thức.
D. công nhân, nông dân và thanh niên.
Gt: Ở Việt Nam, sự chuyển đổi cơ cấu kinh tế đã dẫn đến hình thành cơ cấu xã hội - giai cấp đa dạng, bao gồm giai cấp công nhân, giai cấp nông dân, đội ngũ trí thức, đội ngũ doanh nhân, tiểu chủ và các tầng lớp xã hội khác.

Câu 43: Giai cấp công nhân Việt Nam có vai trò gì đối với quá trình công nghiệp hóa, hiện đại hóa đất nước?
A. Chủ thể sáng tạo đặc biệt.
B. Tiên phong trong chuyển giao công nghệ.
*C. Lực lượng lao động đi đầu.
D. Trực tiếp vận hành các công cụ sản xuất.
Gt: Giai cấp công nhân Việt Nam có vai trò to lớn, là lực lượng lao động đi đầu trong quá trình công nghiệp hóa, hiện đại hóa đất nước.

Câu 44: Xu hướng phát triển cơ cấu xã hội - giai cấp thời kỳ quá độ lên chủ nghĩa xã hội ở Việt Nam hiện nay diễn ra đa dạng và phức tạp do yếu tố nào sau đây quyết định?
A. Quan hệ giữa lực lượng sản xuất.
B. Nền kinh tế kế hoạch hóa.
*C. Nền kinh tế nhiều thành phần.
D. Quan hệ phân phối sản phẩm.
Gt: Tương ứng với nền kinh tế nhiều thành phần là một cơ cấu xã hội - giai cấp đa dạng, phức tạp gồm nhiều giai cấp, tầng lớp vừa hợp tác, vừa đấu tranh với nhau.

Câu 45: Với sự phát triển của cách mạng khoa học công nghệ hiện đại, bộ phận nào sau đây có vai trò đặc biệt quan trọng trong tiến trình đẩy mạnh công nghiệp hóa, hiện đại hóa đất nước?
A. Doanh nhân.
*B. Trí thức.
C. Công nhân.
D. Tiểu tư sản.
Gt: Đội ngũ trí thức là lực lượng lao động sáng tạo đặc biệt quan trọng trong tiến trình đẩy mạnh công nghiệp hóa, hiện đại hóa đất nước.

Câu 46: Đặc điểm nào sau đây phản ánh nguồn gốc xã hội của giai cấp công nhân trong khối liên minh giai cấp, tầng lớp ở Việt Nam?
*A. Đa số công nhân xuất thân từ nông dân.
B. Giai cấp công nhân có hệ tư tưởng tiên tiến.
C. Nông dân xuất thân từ công nhân.
D. Trí thức có năng lực tiếp thu khoa học công nghệ hiện đại.
Gt: Do đặc thù lịch sử của Việt Nam là một nước nông nghiệp, đại đa số giai cấp công nhân có nguồn gốc xuất thân từ nông dân, tạo điều kiện thuận lợi để xây dựng khối liên minh.

Câu 47: Quan điểm của Đảng Cộng sản Việt Nam về "Đại đoàn kết dân tộc phải dựa trên cơ sở giải quyết hài hòa quan hệ lợi ích giữa các thành viên trong xã hội" thể hiện rõ nội dung nào sau đây?
*A. Xây dựng các chính sách phù hợp với từng giai cấp, tầng lớp.
B. Đảm bảo hài hòa lợi ích giữa các giai cấp, tầng lớp.
C. Tạo sự thống nhất về mục tiêu giữa các giai cấp, tầng lớp.
D. Giải quyết mâu thuẫn giữa các giai cấp, tầng lớp.
Gt: Quan điểm trên của Đảng thể hiện việc xây dựng các chính sách phù hợp với từng giai cấp, tầng lớp nhằm giải quyết hài hòa lợi ích trong xã hội.

Câu 48: Giai cấp công nhân Việt Nam trong thời kỳ quá độ lên chủ nghĩa xã hội có xu hướng biến đổi như thế nào?
A. Doanh nhân hóa.
B. Dân tộc hóa.
C. Khu vực hóa.
*D. Tri thức hóa.
Gt: Bộ phận "công nhân hiện đại", "công nhân trí thức" ngày càng lớn mạnh; trình độ chuyên môn kỹ thuật, kỹ năng nghề nghiệp của công nhân ngày càng được nâng lên, chứng tỏ xu hướng tri thức hóa.

Câu 49: Giai cấp nông dân Việt Nam trong thời kỳ quá độ lên chủ nghĩa xã hội có xu hướng biến đổi rõ đặc điểm nào sau đây?
A. Trở thành giai cấp thống trị xã hội.
*B. Trở thành một bộ phận của giai cấp công nhân.
C. Đang dần giữ vai trò lãnh đạo.
D. Đang chuyển sang giai cấp thủ công.
Gt: Trong thời kỳ quá độ lên chủ nghĩa xã hội, giai cấp nông dân giảm dần về số lượng và tỉ lệ; một bộ phận nông dân chuyển sang lao động công nghiệp hoặc dịch vụ, trở thành một bộ phận của giai cấp công nhân.

Câu 50: Sự xuất hiện của đội ngũ doanh nhân Việt Nam hiện nay là kết quả của giai đoạn lịch sử nào sau đây?
A. Từ 1945 đến 1954.
B. Thời kỳ trước đổi mới.
*C. Thời kỳ đổi mới.
D. Từ 1954 đến 1975.
Gt: Trước năm 1986, Việt Nam vận hành theo cơ chế kế hoạch hóa tập trung, bao cấp, không thừa nhận kinh doanh tư nhân độc lập. Từ sau Đại hội Đảng lần thứ VI (1986) - khởi đầu thời kỳ Đổi mới - nhà nước chuyển sang phát triển kinh tế thị trường định hướng xã hội chủ nghĩa, tạo điều kiện cho đội ngũ doanh nhân hình thành và phát triển như hiện nay.

D. da trắng và da màu.
Gt: Căn cứ vào số lượng dân số, các tộc người trong một quốc gia có thể được phân thành tộc người đa số và tộc người thiểu số.

Câu 11: Theo quan điểm của chủ nghĩa Mác - Lênin, một trong hai xu hướng khách quan của sự phát triển quan hệ dân tộc là các cộng đồng dân cư muốn
A. tách khỏi khu vực quốc gia và quốc tế.
B. thiết lập quan hệ thống nhất với liên minh.
*C. tách ra để hình thành dân tộc độc lập.
D. gắn bó với văn hóa dân tộc mình.
Gt: Lênin phát hiện hai xu hướng khách quan: cộng đồng dân cư muốn tách ra để hình thành cộng đồng dân tộc độc lập, và các dân tộc muốn liên hiệp lại với nhau.

Câu 12: Theo quan điểm của chủ nghĩa Mác - Lênin, một trong hai xu hướng khách quan của sự phát triển quan hệ dân tộc là các dân tộc trong từng quốc gia muốn
A. phân chia địa bàn cư trú.
B. áp đặt sự thống trị.
C. thoát ly liên hiệp.
*D. liên hiệp lại với nhau.
Gt: Xu hướng thứ hai là các dân tộc trong từng quốc gia, thậm chí các dân tộc ở nhiều quốc gia muốn liên hiệp lại với nhau.

Câu 13: Một trong những nguyên tắc giải quyết vấn đề dân tộc theo quan điểm của chủ nghĩa Mác - Lênin là
A. giữ gìn bản sắc văn hóa các dân tộc.
B. các dân tộc tương trợ lẫn nhau.
*C. các dân tộc hoàn toàn bình đẳng.
D. tôn trọng tín ngưỡng của các dân tộc.
Gt: Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin gồm ba nguyên tắc: các dân tộc hoàn toàn bình đẳng, các dân tộc được quyền tự quyết, liên hiệp công nhân tất cả các dân tộc.

Câu 14: Một trong những nguyên tắc giải quyết vấn đề dân tộc theo quan điểm của chủ nghĩa Mác - Lênin là
A. các dân tộc giúp đỡ lẫn nhau.
*B. các dân tộc được quyền tự quyết.
C. giữ gìn tiếng nói, chữ viết các dân tộc.
D. tôn trọng tự do tín ngưỡng của các dân tộc.
Gt: Đây là một trong ba nguyên tắc của Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin.

Câu 15: Một trong những nguyên tắc giải quyết vấn đề dân tộc theo quan điểm của chủ nghĩa Mác - Lênin là
*A. liên hiệp công nhân tất cả các dân tộc.
B. giữ gìn tiếng nói, chữ viết các dân tộc.
C. các dân tộc đấu tranh lẫn nhau.
D. tôn trọng tín ngưỡng của các dân tộc.
Gt: Đây là nguyên tắc thứ ba trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin.

Câu 16: Các dân tộc hoàn toàn bình đẳng, các dân tộc được quyền tự quyết và liên hiệp công nhân các dân tộc lại là nội dung của
A. nguyên tắc trong quan hệ đối ngoại giữa các quốc gia.
B. chính sách dân tộc của Đảng và Nhà nước Việt Nam.
*C. Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin.
D. quan điểm đại đoàn kết toàn dân tộc của nước ta.
Gt: Ba nội dung này chính là Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin.

Câu 17: Một trong những đặc điểm dân tộc Việt Nam là dân tộc có
*A. có sự chênh lệch về số dân.
B. tương đồng về trình độ phát triển.
C. tách biệt hoàn toàn về địa bàn cư trú.
D. đồng nhất về mặt tôn giáo.
Gt: Đặc điểm dân tộc Việt Nam có sự chênh lệch về số dân giữa các tộc người, cùng nhiều đặc điểm khác như cư trú xen kẽ, trình độ phát triển không đồng đều.

Câu 18: Một trong những đặc điểm dân tộc Việt Nam là các dân tộc
A. có số dân bằng nhau.
B. tương đồng về trình độ kinh tế.
*C. cư trú xen kẽ nhau.
D. đồng nhất về mặt tín ngưỡng.
Gt: Các dân tộc ở Việt Nam cư trú xen kẽ nhau là một trong những đặc điểm nổi bật của dân tộc Việt Nam.

Câu 19: Một trong những đặc điểm dân tộc Việt Nam là các dân tộc
A. đều có số dân bằng nhau.
*B. có trình độ phát triển không đồng đều.
C. tách biệt hoàn toàn về địa bàn cư trú.
D. đồng nhất về văn hóa, tín ngưỡng.
Gt: Các dân tộc ở Việt Nam có trình độ phát triển không đồng đều là một đặc điểm quan trọng.

Câu 20: Một trong những đặc điểm dân tộc Việt Nam là các dân tộc
*A. có bản sắc văn hóa riêng.
B. tương đồng về trình độ phát triển.
C. có chung tiếng nói, chữ viết.
D. đều có số dân tương đương nhau.
Gt: Mỗi dân tộc Việt Nam có bản sắc văn hóa riêng, góp phần tạo nên sự phong phú, đa dạng của văn hóa Việt Nam thống nhất.

Câu 21: Đặc trưng nào sau đây có vị trí quyết định đối với sự tồn tại và phát triển của mỗi tộc người?
A. Đặc trưng về văn hóa.
B. Cộng đồng về ngôn ngữ.
*C. Ý thức tự giác tộc người.
D. Địa bàn cư trú của tộc người.
Gt: Ý thức tự giác tộc người là tiêu chí quan trọng nhất để phân định một tộc người và có vị trí quyết định với sự tồn tại, phát triển của tộc người đó.

Câu 22: Các dân tộc có quyền lợi và nghĩa vụ ngang nhau trong tất cả các lĩnh vực của đời sống xã hội và nhà nước là nội dung nào sau đây trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
A. Liên hiệp công nhân tất cả các dân tộc.
B. Các dân tộc được quyền tự quyết.
C. Đoàn kết tất cả các dân tộc lại với nhau.
*D. Các dân tộc hoàn toàn bình đẳng.
Gt: Đây chính là nội dung của nguyên tắc các dân tộc hoàn toàn bình đẳng.

Câu 23: Các dân tộc có quyền lựa chọn con đường phát triển của dân tộc mình là nội dung nguyên tắc nào sau đây trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
A. Các dân tộc hoàn toàn bình đẳng.
*B. Các dân tộc được quyền tự quyết.
C. Đoàn kết tất cả các dân tộc lại với nhau.
D. Liên hiệp công nhân tất cả các dân tộc.
Gt: Đây là nội dung của nguyên tắc các dân tộc được quyền tự quyết.

Câu 24: Các dân tộc có quyền tách ra thành lập quốc gia dân tộc độc lập hoặc liên hiệp lại với các dân tộc khác là nội dung nguyên tắc nào sau đây trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
A. Đoàn kết tất cả các dân tộc lại với nhau.
B. Các dân tộc hoàn toàn bình đẳng.
*C. Các dân tộc được quyền tự quyết.
D. Liên hiệp công nhân tất cả các dân tộc.
Gt: Quyền tách ra lập quốc gia độc lập hoặc liên hiệp với dân tộc khác thuộc nội dung nguyên tắc các dân tộc được quyền tự quyết.

Câu 25: Nguyên tắc nào sau đây đóng vai trò liên kết cả ba nguyên tắc thành một giải pháp quan trọng để gắn kết các dân tộc lại với nhau trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
*A. Liên hiệp công nhân tất cả các dân tộc.
B. Các dân tộc hoàn toàn bình đẳng.
C. Các dân tộc được quyền tự quyết.
D. Đoàn kết tất cả các dân tộc lại với nhau.
Gt: Liên hiệp công nhân tất cả các dân tộc đóng vai trò liên kết cả ba nội dung của Cương lĩnh dân tộc thành một chỉnh thể thống nhất.

Câu 26: Việc các dân tộc có xu hướng muốn tách ra để hình thành cộng đồng dân tộc độc lập xuất phát từ nguyên nhân nào sau đây?
A. Lực lượng sản xuất, khoa học kỹ thuật phát triển.
B. Xu thế quốc tế hóa, toàn cầu hóa gia tăng.
*C. Sự thức tỉnh, trưởng thành ý thức dân tộc.
D. Khác biệt về văn hóa, ngôn ngữ giữa các dân tộc.
Gt: Xu hướng tách ra hình thành dân tộc độc lập xuất phát từ sự trưởng thành ý thức dân tộc, sự thức tỉnh về quyền sống của cộng đồng dân cư đó.

Câu 27: Đặc điểm nào sau đây của các dân tộc ở Việt Nam là kết quả của quá trình chuyển cư giữa các dân tộc?
A. Có sự chênh lệch về số dân giữa các tộc người.
*B. Các dân tộc cư trú xen kẽ nhau.
C. Các dân tộc có trình độ phát triển không đồng đều.
D. Mỗi dân tộc có bản sắc văn hóa riêng.
Gt: Đặc điểm các dân tộc cư trú xen kẽ nhau ở Việt Nam hình thành do quá trình chuyển cư qua lại giữa các dân tộc trong lịch sử.

Câu 28: Đặc trưng nào sau đây của các quốc gia đa tộc người là cơ sở liên kết các bộ phận, các thành viên của các dân tộc, tạo nên tính thống nhất của cộng đồng?
A. Có văn hóa riêng của dân tộc.
B. Có lãnh thổ chung ổn định không bị chia cắt.
C. Có ngôn ngữ chung của quốc gia.
*D. Có chung phương thức sinh hoạt kinh tế.
Gt: Chung phương thức sinh hoạt kinh tế là đặc trưng quan trọng gắn kết các bộ phận, thành viên của dân tộc lại với nhau.

Câu 29: Nguyên tắc nào sau đây trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin phản ánh sự thống nhất giữa giải phóng dân tộc và giải phóng giai cấp?
*A. Liên hiệp công nhân tất cả các dân tộc.
B. Các dân tộc hoàn toàn bình đẳng.
C. Các dân tộc được quyền tự quyết.
D. Đoàn kết tất cả các dân tộc lại với nhau.
Gt: Liên hiệp công nhân các dân tộc phản ánh sự thống nhất giữa mục tiêu giải phóng dân tộc và giải phóng giai cấp.

Câu 30: Nguyên tắc nào sau đây trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin là cơ sở để thực hiện quyền tự quyết và xây dựng mối quan hệ hữu nghị, hợp tác giữa các dân tộc?
*A. Các dân tộc hoàn toàn bình đẳng.
B. Các dân tộc được quyền tự quyết.
C. Đoàn kết tất cả các dân tộc lại với nhau.
D. Liên hiệp công nhân tất cả các dân tộc.
Gt: Quyền bình đẳng giữa các dân tộc là cơ sở để thực hiện quyền tự quyết và xây dựng quan hệ hữu nghị, hợp tác giữa các dân tộc.

Câu 31: Có quan điểm cho rằng, trong một quốc gia đa dân tộc, dân tộc nào chiếm đa số về dân số và có trình độ phát triển cao hơn thì được ưu tiên trong mọi lĩnh vực chính trị, kinh tế, văn hóa, xã hội. Quan điểm này vi phạm nguyên tắc nào sau đây trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
A. Các dân tộc được quyền tự quyết.
*B. Các dân tộc hoàn toàn bình đẳng.
C. Đoàn kết tất cả các dân tộc lại với nhau.
D. Liên hiệp công nhân tất cả các dân tộc.
Gt: Nguyên tắc các dân tộc hoàn toàn bình đẳng quy định các dân tộc có quyền lợi, nghĩa vụ ngang nhau, không dân tộc nào có đặc quyền; quan điểm ưu tiên dân tộc đa số vi phạm nguyên tắc này.

Câu 32: Ở các quốc gia đa dân tộc, có tình trạng các thế lực bên ngoài mua chuộc, lôi kéo, kích động chia rẽ trong nội bộ dân tộc và giữa dân tộc này với dân tộc khác. Tình trạng này đe dọa việc thực hiện nguyên tắc nào sau đây trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
A. Liên hiệp công nhân tất cả các dân tộc.
B. Các dân tộc hoàn toàn bình đẳng.
C. Đoàn kết tất cả các dân tộc lại với nhau.
*D. Các dân tộc được quyền tự quyết.
Gt: Hành vi mua chuộc, kích động chia rẽ dân tộc từ bên ngoài đe dọa quyền tự quyết và sự thống nhất, độc lập của các dân tộc.

Câu 33: Điều 5, Hiến pháp 2013 của Việt Nam quy định các dân tộc bình đẳng, đoàn kết, tôn trọng và giúp nhau cùng phát triển, nghiêm cấm mọi hành vi kỳ thị, chia rẽ dân tộc. Quy định này thể hiện sự vận dụng nguyên tắc nào trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
*A. Các dân tộc hoàn toàn bình đẳng.
B. Các dân tộc được quyền tự quyết.
C. Đoàn kết tất cả các dân tộc lại với nhau.
D. Liên hiệp công nhân tất cả các dân tộc.
Gt: Quy định về bình đẳng, đoàn kết, nghiêm cấm kỳ thị chia rẽ dân tộc là sự vận dụng nguyên tắc các dân tộc hoàn toàn bình đẳng.

Câu 34: Nhà nước Việt Nam có chính sách ưu tiên đầu tư phát triển kinh tế - xã hội ở miền núi, vùng đồng bào các dân tộc thiểu số. Chính sách này nhằm khắc phục vấn đề nào sau đây?
A. Sự chênh lệch về số dân giữa các tộc người.
*B. Trình độ phát triển không đồng đều giữa các dân tộc.
C. Tình trạng phân bố không đồng đều về địa bàn cư trú.
D. Mâu thuẫn, xung đột về văn hóa, tín ngưỡng.
Gt: Do điều kiện tự nhiên khó khăn, kinh tế các dân tộc thiểu số thường phát triển thấp hơn, nên chính sách ưu tiên đầu tư nhằm khắc phục sự phát triển không đồng đều giữa các dân tộc.

Câu 35: Pháp luật Việt Nam quy định phải đảm bảo tỷ lệ đại biểu dân tộc thiểu số hợp lý trong tổng số đại biểu Quốc hội và các cơ quan dân cử. Quy định này nhằm thực hiện nguyên tắc nào trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
*A. Các dân tộc hoàn toàn bình đẳng.
B. Các dân tộc được quyền tự quyết.
C. Đoàn kết tất cả các dân tộc lại với nhau.
D. Liên hiệp công nhân tất cả các dân tộc.
Gt: Đảm bảo tỷ lệ đại biểu dân tộc thiểu số giúp các dân tộc đều có điều kiện tham gia vào cơ quan quyền lực nhà nước, thể hiện nguyên tắc các dân tộc hoàn toàn bình đẳng.

Câu 36: Nhà nước Việt Nam có chính sách ưu tiên cho con em các dân tộc ít người như giảm học phí, cộng điểm ưu tiên khi thi vào các trường cao đẳng, đại học. Chính sách này nhằm thực hiện nguyên tắc nào trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
*A. Các dân tộc hoàn toàn bình đẳng.
B. Các dân tộc được quyền tự quyết.
C. Đoàn kết tất cả các dân tộc lại với nhau.
D. Liên hiệp công nhân tất cả các dân tộc.
Gt: Chính sách ưu tiên giáo dục nhằm rút ngắn khoảng cách phát triển giữa các dân tộc, góp phần thực hiện nguyên tắc các dân tộc hoàn toàn bình đẳng.

Câu 37: Trên thế giới, một số quốc gia thực hiện chính sách chia để trị, chia rẽ các dân tộc, phân biệt đối xử giữa các dân tộc. Chính sách này vi phạm nguyên tắc nào trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
A. Đoàn kết tất cả các dân tộc lại với nhau.
B. Các dân tộc được quyền tự quyết.
*C. Các dân tộc hoàn toàn bình đẳng.
D. Liên hiệp công nhân tất cả các dân tộc.
Gt: Chính sách chia để trị, phân biệt đối xử giữa các dân tộc là hành vi vi phạm nguyên tắc các dân tộc hoàn toàn bình đẳng.

Gt: Xây dựng gia đình trong thời kỳ quá độ dựa trên các cơ sở kinh tế - xã hội, chính trị - xã hội, văn hóa và chế độ hôn nhân tiến bộ, không dựa trên hôn nhân bất bình đẳng.

Câu 24: Một trong những biểu hiện của chế độ hôn nhân tiến bộ là hôn nhân được đảm bảo về mặt
A. kinh tế.
*B. pháp lý.
C. nghi lễ.
D. xã hội.
Gt: Hôn nhân được đảm bảo về mặt pháp lý là một trong những biểu hiện của chế độ hôn nhân tiến bộ.

Câu 25: Một trong những cơ sở xây dựng gia đình trong thời kỳ quá độ lên chủ nghĩa xã hội là
A. mô hình gia đình truyền thống.
B. quan hệ khác đối đầu.
*C. chế độ hôn nhân tiến bộ.
D. mô hình gia đình hạt nhân.
Gt: Chế độ hôn nhân tiến bộ là một trong bốn cơ sở xây dựng gia đình trong thời kỳ quá độ lên chủ nghĩa xã hội.

Câu 26: Vấn đề cốt lõi trong cơ sở kinh tế - xã hội của xây dựng gia đình trong thời kỳ quá độ lên chủ nghĩa xã hội là
*A. chế độ sở hữu xã hội đối với tư liệu sản xuất.
B. nền đại công nghiệp phát triển.
C. sự tiến bộ của khoa học, công nghệ hiện đại.
D. chế độ phân phối theo lao động.
Gt: Vấn đề cốt lõi trong cơ sở kinh tế - xã hội là chế độ sở hữu xã hội đối với tư liệu sản xuất từng bước hình thành và củng cố thay thế chế độ sở hữu tư nhân.

Câu 27: Vấn đề cốt lõi trong cơ sở chính trị - xã hội của xây dựng gia đình trong thời kỳ quá độ lên chủ nghĩa xã hội là
A. xây dựng cơ sở pháp lý tiến bộ.
*B. thiết lập chính quyền của giai cấp công nhân.
C. chế độ sở hữu xã hội đối với tư liệu sản xuất.
D. nền đại công nghiệp phát triển.
Gt: Vấn đề cốt lõi trong cơ sở chính trị - xã hội là việc thiết lập chính quyền nhà nước của giai cấp công nhân và nhân dân lao động.

Câu 28: Nội dung nào sau đây không phải là cơ sở văn hóa xây dựng gia đình trong thời kỳ quá độ lên chủ nghĩa xã hội?
*A. Thiết lập chính quyền của giai cấp công nhân và nhân dân lao động.
B. Những giá trị văn hóa của gia đình truyền thống.
C. Các giá trị văn hóa mới tiến bộ theo tư tưởng của giai cấp công nhân.
D. Sự hình thành các giá trị, chuẩn mực điều chỉnh các quan hệ gia đình.
Gt: Việc thiết lập chính quyền của giai cấp công nhân và nhân dân lao động thuộc nội dung của cơ sở chính trị - xã hội, không phải cơ sở văn hóa.

Câu 29: Một trong những biểu hiện của chế độ hôn nhân tiến bộ là hôn nhân dựa trên quan hệ
A. tài sản.
B. nhân thân.
*C. bình đẳng.
D. đạo đức.
Gt: Vợ chồng bình đẳng là một trong những biểu hiện của chế độ hôn nhân tiến bộ.

Câu 30: Chế độ hôn nhân tiến bộ không dựa trên cơ sở nào sau đây?
A. Bình đẳng.
B. Pháp lý.
C. Tự nguyện.
*D. Kinh tế.
Gt: Chế độ hôn nhân tiến bộ dựa trên cơ sở tự nguyện, bình đẳng, một vợ một chồng và đảm bảo pháp lý, không dựa trên cơ sở kinh tế.

Câu 31: Trong xã hội hiện đại, quy mô gia đình Việt Nam đang có xu hướng
A. đa thế hệ.
B. mở rộng.
*C. thu nhỏ.
D. đơn thân.
Gt: Quy mô gia đình Việt Nam ngày càng có xu hướng thu nhỏ hơn so với trước kia, số lượng thành viên trong gia đình ít đi.

Câu 32: Gia đình Việt Nam hiện nay tiếp thu giá trị nào sau đây của gia đình hiện đại?
A. Ít con trong việc sinh con.
B. Tuyệt đối hóa tự do cá nhân.
*C. Tôn trọng quyền tự do cá nhân.
D. Thừa nhận hôn nhân đồng tính.
Gt: Gia đình Việt Nam hiện nay tiếp thu giá trị nhân văn mới, tôn trọng quyền tự do cá nhân, khắc phục tư tưởng gia trưởng, áp đặt của gia đình cũ.

Câu 33: Ở gia đình Việt Nam hiện nay, việc xây dựng gia đình văn hóa không dựa trên cơ sở nào?
*A. Kế thừa mọi yếu tố của gia đình truyền thống.
B. Tiếp thu giá trị tiến bộ của gia đình hiện đại.
C. Xóa bỏ những yếu tố lạc hậu của gia đình cổ.
D. Giữ gìn những giá trị tốt đẹp của dân tộc.
Gt: Không phải mọi yếu tố của gia đình truyền thống đều phù hợp với hiện nay, nên xây dựng gia đình văn hóa cần chọn lọc, kế thừa những giá trị phù hợp.

Câu 34: Xây dựng gia đình mới ở Việt Nam hiện nay phải kế thừa và phát huy giá trị nào sau đây của gia đình truyền thống?
A. Phong tục cưới hỏi.
*B. Sự yêu thương, đùm bọc lẫn nhau.
C. Gia đình đông con.
D. Đề cao vai trò của người đàn ông.
Gt: Tính êm ấm, đoàn kết, yêu thương và đùm bọc lẫn nhau là nét đẹp của gia đình truyền thống Việt Nam cần được phát huy.

Câu 35: Xây dựng và phát triển gia đình Việt Nam trong thời kỳ quá độ lên chủ nghĩa xã hội cần kế thừa giá trị nào sau đây của gia đình truyền thống?
A. Gia đình đông con.
B. Phong tục cưới hỏi.
*C. Sự chung thủy, tình nghĩa vợ chồng.
D. Đề cao vai trò của người đàn ông.
Gt: Sự chung thủy, tình nghĩa vợ chồng là đạo lý, nền tảng đạo đức tốt đẹp cần được kế thừa để xây dựng hôn nhân bền vững.

Câu 36: Gia đình Việt Nam hiện nay cần kế thừa giá trị nào sau đây của gia đình truyền thống?
*A. Con cháu hiếu thảo với cha mẹ, ông bà.
B. Phong tục cưới hỏi.
C. Gia đình đông con.
D. Đề cao vai trò của người đàn ông.
Gt: Đạo hiếu, sự kính trọng thế hệ đi trước là giá trị tốt đẹp của gia đình truyền thống Việt Nam cần được giữ gìn.

Câu 37: Gia đình Việt Nam hiện nay cần tiếp thu giá trị nào sau đây của mô hình gia đình mới?
A. Ít con trong việc sinh con.
B. Tuyệt đối hóa tự do cá nhân.
*C. Bình đẳng giữa các thành viên.
D. Thừa nhận hôn nhân đồng tính.
Gt: Giá trị tiến bộ của gia đình hiện đại là đề cao mối quan hệ bình đẳng giữa các thành viên trong gia đình.

Câu 38: Yếu tố nào sau đây tác động mạnh mẽ đến gia đình Việt Nam trong thời kỳ quá độ lên chủ nghĩa xã hội?
A. Cách mạng khoa học kỹ thuật hiện đại.
*B. Chính sách, pháp luật của Nhà nước.
C. Xu thế toàn cầu hóa và hội nhập quốc tế.
D. Sự phát triển kinh tế thị trường.
Gt: Trong thời kỳ quá độ, chính sách của Đảng và Nhà nước về gia đình đóng vai trò tác động mạnh mẽ, quan trọng nhất đến sự biến đổi của gia đình Việt Nam.

Câu 39: Xu hướng chuyển đổi từ chủ yếu là đơn vị kinh tế sang chủ yếu là đơn vị tình cảm là biểu hiện của biến đổi chức năng nào sau đây của gia đình Việt Nam hiện nay?
A. Nuôi dưỡng, giáo dục.
B. Kinh tế và tổ chức tiêu dùng.
*C. Thoả mãn nhu cầu tâm sinh lý.
D. Sản xuất ra con người.
Gt: Trong gia đình Việt Nam hiện nay, nhu cầu tâm sinh lý, tình cảm được chú trọng, hạnh phúc của các thành viên được đề cao hơn.

Câu 40: Đầu tư tài chính cho việc học hành của con cái tăng lên là biểu hiện của biến đổi chức năng nào sau đây của gia đình Việt Nam hiện nay?
A. Thoả mãn nhu cầu tâm sinh lý.
B. Tái sản xuất ra con người.
C. Kinh tế và tổ chức tiêu dùng.
*D. Nuôi dưỡng, giáo dục.
Gt: Đầu tư tài chính cho việc học hành của con cái ngày càng tăng là biểu hiện của chức năng nuôi dưỡng, giáo dục.

Câu 41: Ở gia đình Việt Nam, dưới ảnh hưởng mạnh mẽ của cách mạng khoa học công nghệ, việc sinh con của người phụ nữ có xu hướng
*A. chủ động hơn.
B. bị động hơn.
C. bị chi phối bởi nhu cầu xã hội.
D. bị chi phối bởi ý chí gia đình.
Gt: Với thành tựu của y học hiện đại, việc sinh đẻ được các gia đình tiến hành chủ động, tự giác khi xác định số lượng và thời điểm sinh con.

Câu 42: Xu hướng chính sách dân số ở Việt Nam hiện nay hướng đến việc thay đổi cách nhìn nhận nào sau đây về sinh con của gia đình?
A. Thực hiện kế hoạch hóa gia đình.
*B. Duy trì mức sinh thay thế.
C. Chỉ nên có từ một đến hai con.
D. Có thể sinh con theo ý muốn.
Gt: Trong giai đoạn hiện nay, thông điệp mới trong chính sách dân số là mỗi cặp vợ chồng nên sinh đủ hai con nhằm duy trì mức sinh thay thế.

Câu 43: Chức năng kinh tế của gia đình Việt Nam có điểm mới nào sau đây do tác động của kinh tế thị trường và hội nhập?
A. Tổ chức kinh tế độc lập.
B. Sản xuất tự cung tự cấp.
C. Tổ chức tiêu dùng.
*D. Sản xuất hàng hoá.
Gt: Kinh tế gia đình đã chuyển mạnh từ kinh tế tự cung, tự cấp sang tham gia sản xuất hàng hóa để trao đổi trên thị trường.

Câu 44: Một số gia đình ở Việt Nam bị suy giảm chức năng chăm sóc, thiếu tri thức khoa học dẫn đến sự phát triển lệch lạc về thể chất, tinh thần của trẻ. Đây là hạn chế trong việc thực hiện chức năng nào của gia đình?
A. Kinh tế và tổ chức tiêu dùng.
B. Tái sản xuất ra con người.
*C. Nuôi dưỡng, giáo dục.
D. Thoả mãn nhu cầu tâm sinh lý.
Gt: Việc thiếu tri thức khoa học trong chăm sóc, giáo dục con dẫn đến trẻ phát triển lệch lạc là hạn chế trong chức năng nuôi dưỡng, giáo dục của gia đình.

Câu 45: Nội dung giáo dục gia đình hiện nay ngoài giáo dục đạo đức, tri thức, kinh nghiệm còn chú trọng hướng đến giáo dục kiến thức khoa học hiện đại. Đây là biểu hiện của biến đổi yếu tố nào sau đây trong chức năng giáo dục ở gia đình Việt Nam hiện nay?
*A. Nội dung giáo dục gia đình.
B. Phương pháp giáo dục gia đình.
C. Vai trò giáo dục gia đình.
D. Đầu tư tài chính cho giáo dục ở gia đình Việt Nam hiện nay.
Gt: Việc mở rộng sang giáo dục kiến thức khoa học hiện đại là biểu hiện của biến đổi nội dung giáo dục gia đình.

Câu 46: Ở các gia đình Việt Nam hiện nay có tình trạng bố mẹ mải kiếm tiền, bỏ bê con cái, không quản lý con cái, chạy theo đồng tiền hơn quan tâm con. Đây là biểu hiện không tích cực trong thực hiện chức năng nào sau đây của gia đình?
A. Kinh tế và tổ chức tiêu dùng.
*B. Nuôi dưỡng, giáo dục.
C. Thoả mãn nhu cầu tâm sinh lý tình cảm.
D. Tái sản xuất ra con người.
Gt: Việc bố mẹ mải kiếm tiền, bỏ bê, không quan tâm con cái là biểu hiện không tích cực trong chức năng nuôi dưỡng, giáo dục của gia đình.

Câu 47: Những biến đổi trong quan hệ gia đình đặt ra thách thức nào sau đây cho gia đình Việt Nam hiện nay?
A. Ít quan tâm, chăm sóc lẫn nhau.
B. Tình cảm anh chị em bị phai nhạt.
C. Trẻ em hư, bỏ học sớm.
*D. Mâu thuẫn giữa các thế hệ tăng.
Gt: Thách thức lớn đặt ra cho gia đình Việt Nam hiện nay là mâu thuẫn giữa các thế hệ tăng do sự khác biệt về tuổi tác khi cùng chung sống.

Câu 48: Việc thực hiện chức năng giáo dục của gia đình Việt Nam hiện nay có xu hướng nào sau đây?
A. Giáo dục chủ yếu dựa vào kinh nghiệm.
*B. Tăng đầu tư tài chính cho giáo dục con cái.
C. Chú trọng giáo dục đạo đức con cái.
D. Tăng vai trò giáo dục của các thể chế gia đình.
Gt: Giáo dục gia đình hiện nay phát triển theo xu hướng đầu tư tài chính của gia đình cho giáo dục con cái ngày càng tăng lên.

Câu 49: Do xã hội ngày càng phát triển, gia đình Việt Nam hiện nay có xu hướng nào sau đây trong quan hệ giữa các thành viên?
A. Tình cảm gia đình vơi bớt lạnh nhạt.
B. Coi trọng kinh tế, đặt kinh tế lên hàng đầu.
C. Thời gian dành cho gia đình ngày càng ít.
*D. Mối quan hệ gia đình trở nên rời rạc, lỏng lẻo.
Gt: Xã hội ngày càng phát triển, các thành viên có ít thời gian quan tâm nhau hơn, khiến mối quan hệ gia đình trở nên rời rạc, lỏng lẻo.

Câu 50: Quan điểm tiếp tục chuyển trọng tâm chính sách dân số từ kế hoạch hóa gia đình sang dân số và phát triển ở Việt Nam hiện nay đòi hỏi phải chú trọng điều gì?
A. Phát triển phong trào xây dựng gia đình văn hóa.
B. Nâng cao đời sống vật chất, tinh thần cho gia đình.
C. Kế thừa những giá trị tốt đẹp của gia đình truyền thống.
*D. Tăng cường sự lãnh đạo của Đảng và quản lý của Nhà nước.
Gt: Việc chuyển trọng tâm chính sách dân số là một quyết định quan trọng, cần có sự chỉ đạo và quản lý chặt chẽ của Đảng và Nhà nước.

*C. Tuyên ngôn của Đảng Cộng sản.
D. Biện chứng của tự nhiên.
Gt: Lênin khẳng định: "Từ khi bộ Tư bản ra đời, quan điểm duy vật lịch sử không còn là một giả thuyết nữa, mà là một nguyên lý đã được chứng minh một cách khoa học".

Câu 4: Sự ra đời của tổ chức nào sau đây được thể hiện thông qua sự cải cách xã hội cộng sản?
A. Nhóm lợi ích.
B. Nhà nước xã hội chủ nghĩa.
C. Nghiệp đoàn.
*D. Đảng Cộng sản.
Gt: Đảng Cộng sản - đội tiên phong của giai cấp công nhân ra đời và đảm nhận sứ mệnh lãnh đạo cuộc cách mạng nhằm xóa bỏ chế độ tư bản chủ nghĩa, xây dựng chế độ mới.

Câu 5: Lật đổ sự thống trị của giai cấp tư sản, giành chính quyền là nội dung sứ mệnh của giai cấp công nhân trên lĩnh vực nào sau đây?
A. Văn hóa.
*B. Chính trị.
C. Xã hội.
D. Quốc phòng.
Gt: Lật đổ sự thống trị của giai cấp tư sản, giành chính quyền về tay giai cấp công nhân trên thực chất là nội dung sứ mệnh lịch sử của giai cấp công nhân trên lĩnh vực chính trị.

Câu 6: Nhiệm vụ nào sau đây không thuộc sứ mệnh lịch sử của giai cấp công nhân?
*A. Thiết lập thể chế dân chủ tập trung.
B. Giành chính quyền và xây dựng chính quyền mới.
C. Xóa bỏ chế độ tư hữu tư nhân tư bản chủ nghĩa.
D. Xây dựng thành công chủ nghĩa xã hội.
Gt: Sứ mệnh lịch sử của giai cấp công nhân gồm giành và xây dựng chính quyền, xóa bỏ chế độ tư hữu tư bản chủ nghĩa, xây dựng thành công chủ nghĩa xã hội; "thiết lập thể chế dân chủ tập trung" không thuộc các nội dung này.

Câu 7: Trong quá trình công nghiệp hóa, hiện đại hóa, giai cấp công nhân Việt Nam có xu hướng
A. giảm trong khu vực kinh tế dịch vụ.
B. bần cùng hóa.
*C. đa dạng về cơ cấu nghề nghiệp.
D. ổn định cơ cấu.
Gt: Trong quá trình công nghiệp hóa, hiện đại hóa, giai cấp công nhân Việt Nam có xu hướng đa dạng về cơ cấu nghề nghiệp.

Câu 8: Cuối thế kỷ XIX, đầu thế kỷ XX, giai cấp công nhân Việt Nam có lợi ích đối lập trực tiếp với giai cấp nào sau đây?
*A. Tư bản thực dân Pháp.
B. Tư sản Việt Nam.
C. Giai cấp địa chủ.
D. Giai cấp nông dân.
Gt: Giai cấp công nhân Việt Nam ra đời trước giai cấp tư sản Việt Nam vào đầu thế kỷ XX, là giai cấp trực tiếp đối kháng với tư bản thực dân Pháp và tay sai của chúng.

Câu 9: Theo C. Mác và Ph. Ăngghen, tiền đề trực tiếp của sự ra đời của chủ nghĩa xã hội là
*A. lực lượng sản xuất xã hội hóa ngày càng cao.
B. quan hệ sản xuất tiến bộ.
C. quan hệ sản xuất hiện đại.
D. kiến trúc thượng tầng mới.
Gt: Theo C. Mác và Ph. Ăngghen, tiền đề trực tiếp của sự ra đời chủ nghĩa xã hội là sự phát triển của lực lượng sản xuất ngày càng mang tính xã hội hóa cao.

Câu 10: Mục tiêu của cách mạng xã hội chủ nghĩa là
A. thay thế chế độ phong kiến bằng chế độ tư bản.
B. thiết lập chế độ tư hữu về tư liệu sản xuất chủ yếu.
*C. thay thế chủ nghĩa tư bản bằng chủ nghĩa xã hội.
D. thiết lập kiến trúc thượng tầng tư bản chủ nghĩa.
Gt: Mục tiêu của cách mạng xã hội chủ nghĩa là thay thế chế độ tư bản chủ nghĩa bằng chủ nghĩa xã hội.

Câu 11: Thực chất của thời kỳ quá độ lên chủ nghĩa xã hội trong lĩnh vực chính trị là
A. kết thúc đấu tranh giai cấp.
*B. tiếp tục đấu tranh giai cấp.
C. xóa bỏ chế độ tư hữu.
D. xóa bỏ áp bức bóc lột.
Gt: Thực chất của thời kỳ quá độ lên chủ nghĩa xã hội trong lĩnh vực chính trị là tiếp tục cuộc đấu tranh giai cấp giữa giai cấp vô sản đã chiến thắng nhưng chưa toàn thắng với giai cấp tư sản thất bại nhưng chưa bị tiêu diệt hoàn toàn.

Câu 12: Theo C. Mác và Ph. Ăngghen, nhà nước trong thời kỳ quá độ lên chủ nghĩa xã hội là
*A. chuyên chính cách mạng của giai cấp vô sản.
B. chuyên chính cách mạng của giai cấp tư sản.
C. tổ chức quyền lực đặc biệt của giai cấp tư sản.
D. tổ chức quyền lực đặc biệt của tầng lớp trí thức.
Gt: Theo C. Mác và Ph. Ăngghen, nhà nước trong thời kỳ quá độ lên chủ nghĩa xã hội là nền chuyên chính cách mạng của giai cấp vô sản.

Câu 13: Việt Nam có thuận lợi nào sau đây trước thời kỳ quá độ lên chủ nghĩa xã hội?
A. Dây chuyền sản xuất hiện đại.
B. Khoa học công nghệ hiện đại.
C. Lực lượng sản xuất tiên bộ.
*D. Lực lượng lao động dồi dào.
Gt: Việt Nam có lợi thế về quy mô dân số đông, cơ cấu dân số trẻ, nên có nguồn lực lao động dồi dào để thực hiện quá trình công nghiệp hóa, hiện đại hóa đất nước.

Câu 14: Đảng Cộng sản Việt Nam xác định quá độ lên chủ nghĩa xã hội ở nước ta là không qua giai đoạn nào sau đây?
A. Nhà nước tư sản trị.
B. Chế độ tư hữu về tư liệu sản xuất.
*C. Thành tựu khoa học công nghệ.
D. Đảng tư sản cầm quyền.
Gt: Đại hội IX của Đảng xác định con đường đi lên chủ nghĩa xã hội ở nước ta là bỏ qua việc xác lập vị trí thống trị của quan hệ sản xuất và kiến trúc thượng tầng tư bản chủ nghĩa, tuy nhiên vẫn tiếp thu, kế thừa những thành tựu khoa học công nghệ hiện đại.

Câu 15: Thuật ngữ "democratos" được tiếng nào sau đây?
*A. Nhân dân cai trị.
B. Nhân dân lãnh đạo.
C. Quyền lực vòng vòng.
D. Quyền lực nhà nước.
Gt: Các nhà tư tưởng Hy Lạp cổ đại đã dùng cụm từ "demokratos" để nói lên dân chủ chính là việc nhân dân cai trị.

Câu 16: Theo quan điểm của chủ nghĩa Mác - Lênin, nền dân chủ xã hội chủ nghĩa có đặc điểm nào sau đây?
A. Bảo đảm thực hiện bằng nhà nước.
*B. Mang bản chất của giai cấp tiền phong.
C. Bảo vệ lợi ích cho số đông nhân dân.
D. Được xây dựng trên cơ sở chế độ tư hữu.
Gt: Dân chủ vô sản mang bản chất giai cấp công nhân, có tính nhân dân rộng rãi và tính dân tộc sâu sắc; cuộc cách mạng do giai cấp công nhân lãnh đạo thực hiện quyền lực của số đông nhân dân, bảo vệ quyền lợi cho số đông chống lại thiểu số lợi ích của giai cấp thống trị.

Câu 17: Theo quan điểm của chủ nghĩa Mác - Lênin, dân chủ trong thời kỳ hiện đại được thể hiện đầy đủ nhất trên lĩnh vực nào sau đây?
*A. Kinh tế và chính trị.
B. Chính trị và văn hóa.
C. Chính trị và xã hội.
D. Tư tưởng và xã hội.
Gt: Theo quan điểm của chủ nghĩa Mác - Lênin, dân chủ trong nền kinh tế và chính trị là hai lĩnh vực hàng đầu và nổi bật nhất thể hiện quan điểm về dân chủ.

Câu 18: "Bất cứ một nhà nước nào cũng chỉ do sự thắng lợi của giai cấp này đối với giai cấp khác, là chỉ một trong những giai cấp đó" là khẳng định của ai sau đây?
A. Hồ Chí Minh.
*B. V.I. Lênin.
C. C. Mác.
D. Ph. Ăngghen.
Gt: Lênin khẳng định: "Bất cứ một nhà nước nào cũng chỉ là công cụ chuyên chính của một giai cấp thắng lợi đối với những giai cấp khác đã bị đánh bại".

Câu 19: Nội dung nào sau đây thể hiện bản chất kinh tế của nhà nước xã hội chủ nghĩa?
A. Mang bản chất của giai cấp công nhân.
B. Lấy chủ nghĩa Mác - Lênin làm nền tảng.
*C. Thực hiện phân phối theo lao động.
D. Được xây dựng trên chế độ tư hữu.
Gt: Thực hiện phân phối theo lao động thể hiện bản chất kinh tế của nhà nước xã hội chủ nghĩa.

Câu 20: Một trong những đặc điểm cơ bản của nhà nước pháp quyền xã hội chủ nghĩa ở Việt Nam hiện nay là
*A. tôn trọng quyền con người.
B. bảo vệ thiểu số thống trị.
C. thực hiện nguyên tắc tam quyền phân lập.
D. áp dụng lợi quyền vô hạn.
Gt: Nhà nước pháp quyền xã hội chủ nghĩa ở Việt Nam tôn trọng quyền con người, coi con người là chủ thể và mục tiêu của sự phát triển.

Câu 21: Công dân Việt Nam tham gia góp ý dự thảo Luật Đất đai (sửa đổi) là thực hiện dân chủ trong lĩnh vực nào sau đây?
A. Văn hoá.
B. Kinh tế.
*C. Chính trị.
D. Xã hội.
Gt: Việc công dân tham gia góp ý trực tiếp thực hiện quyền tham gia quản lý nhà nước và xây dựng pháp luật thể hiện đây là nội dung dân chủ trên lĩnh vực chính trị.

Câu 22: Năm 2018, Đoàn Đại biểu Quốc hội tỉnh A tổ chức Hội nghị lấy ý kiến nhân dân đóng góp ý dự thảo Luật An ninh mạng là thực hiện dân chủ trong lĩnh vực nào sau đây?
*A. Chính trị.
B. Kinh tế.
C. Văn hoá.
D. Xã hội.
Gt: Việc tổ chức hội nghị lấy ý kiến nhân dân đóng góp về dự thảo luật thể hiện quyền tham gia bàn luận, xây dựng hệ thống pháp luật chính trị là biểu hiện dân chủ trong lĩnh vực chính trị.

Câu 23: Những cộng đồng người cùng toàn bộ những mối quan hệ xã hội do sự tác động lẫn nhau giữa các cộng đồng ấy tạo nên gọi là
A. lợi ích giai cấp.
*B. cơ cấu xã hội.
C. quan hệ xã hội.
D. đấu tranh giai cấp.
Gt: Cơ cấu xã hội là những cộng đồng người cùng toàn bộ những mối quan hệ xã hội do sự tác động lẫn nhau của các cộng đồng ấy tạo nên.

Câu 24: Trong thời kỳ quá độ lên chủ nghĩa xã hội, cơ cấu xã hội - giai cấp biến đổi phức tạp, đa dạng và
*A. chế độ chính trị mới.
B. thành phần kinh tế mới.
C. tầng lớp xã hội mới.
D. quan hệ sản xuất mới.
Gt: Trong thời kỳ quá độ lên chủ nghĩa xã hội, cơ cấu xã hội - giai cấp biến đổi phức tạp, đa dạng và làm xuất hiện các tầng lớp xã hội mới.

Câu 25: Theo quan điểm của chủ nghĩa Mác - Lênin, chủ thể nào sau đây giữ vị trí lãnh đạo trong cơ cấu xã hội - giai cấp trong thời kỳ quá độ lên chủ nghĩa xã hội?
A. Tầng lớp trí thức.
B. Giai cấp nông dân.
*C. Giai cấp công nhân.
D. Tầng lớp doanh nhân.
Gt: Theo quan điểm của chủ nghĩa Mác - Lênin, giai cấp công nhân giữ vị trí lãnh đạo trong cơ cấu xã hội - giai cấp trong thời kỳ quá độ lên chủ nghĩa xã hội, do lãnh đạo được cách mạng thành công và đóng vai trò cầm quyền, xây dựng vững chắc xã hội mới.

Câu 26: Theo quan điểm của chủ nghĩa Mác - Lênin, mối quan hệ nào sau đây quyết định nhất đến sự biến đổi mang tính đa dạng, phức tạp của cơ cấu xã hội - giai cấp trong thời kỳ quá độ lên chủ nghĩa xã hội?
A. Công nhân, nông dân, tri thức.
*B. Công nhân, nông dân, doanh nhân.
C. Công nhân, tri thức, doanh nhân.
D. Công nhân, tri thức, tiểu tư sản.
Gt: Trong cơ cấu xã hội - giai cấp thời kỳ quá độ, giai cấp công nhân giữ vai trò lãnh đạo, giai cấp nông dân có vai trò to lớn, tầng lớp doanh nhân có vai trò tích cực trong phát triển kinh tế - xã hội.

Câu 27: Ở Việt Nam, việc chuyển sang nền kinh tế thị trường nhiều thành phần từ năm 1986 đến nay dần hình thành nên cơ cấu xã hội - giai cấp đa dạng, phức tạp về mặt nào sau đây?
A. Quan điểm chính trị.
*B. Cơ cấu kinh tế.
C. Cơ cấu xã hội - nghề nghiệp.
D. Quan hệ xã hội.
Gt: Việc chuyển sang nền kinh tế thị trường nhiều thành phần dẫn đến sự biến đổi đa dạng, phức tạp về cơ cấu xã hội - nghề nghiệp do sự phân công lao động, cơ cấu ngành nghề đa dạng và phù hợp hơn.

Câu 28: Một trong những đặc trưng cơ bản của dân tộc hiểu theo nghĩa quốc gia dân tộc là
A. có chung một thứ tiếng.
*B. cộng đồng về văn hóa.
C. có chung phương thức sinh hoạt tế.
D. có lãnh thổ thống nhất.
Gt: Một trong những đặc trưng cơ bản của dân tộc hiểu theo nghĩa quốc gia dân tộc là cộng đồng về văn hóa.

Câu 29: Nhà tư tưởng nào sau đây đã nêu ra "Cương lĩnh dân tộc" của chủ nghĩa Mác - Lênin?
*A. V.I. Lênin.
B. C. Mác.
C. Ph. Ăngghen.
D. Xuân.
Gt: Lênin đã nêu ra "Cương lĩnh dân tộc" của chủ nghĩa Mác - Lênin.

Câu 30: Nguyên tắc nào sau đây có vai trò là sự giải pháp quan trọng liên kết các nội dung của Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin thành một chỉnh thể?
A. Các dân tộc được quyền tự quyết.
*B. Liên hiệp công nhân tất cả các dân tộc.
C. Các dân tộc hoàn toàn bình đẳng.
D. Đoàn kết tất cả các dân tộc.
Gt: Liên hiệp công nhân tất cả các dân tộc là nguyên tắc có vai trò liên kết các nội dung của Cương lĩnh dân tộc thành một chỉnh thể.

Câu 31: Sự kiện Timor Leste tách ra từ Indonesia và chính thức trở thành một quốc gia độc lập vào năm 2002 là biểu hiện cho nội dung nào sau đây của Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
A. Các dân tộc hoàn toàn bình đẳng.
*B. Các dân tộc được quyền tự quyết.
C. Đoàn kết tất cả các dân tộc.
D. Liên hiệp công nhân tất cả các dân tộc.
Gt: Việc Timor Leste tách khỏi Indonesia để trở thành quốc gia độc lập là sự thể hiện nguyên tắc các dân tộc được quyền tự quyết trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin.

Câu 32: Tôn giáo phản ánh khát vọng, nguyện vọng của các giai cấp khác nhau trong xã hội là thể hiện nội dung nào sau đây của tôn giáo?
A. Tư tưởng.
B. Lịch sử.
C. Quần chúng.
*D. Chính trị.
Gt: Tôn giáo phản ánh khát vọng, nguyện vọng của các giai cấp khác nhau trong xã hội là thể hiện tính chính trị của tôn giáo.

Câu 33: Sự hình thành, tồn tại, phát triển và biến đổi của các tôn giáo trong từng giai đoạn lịch sử cụ thể được thể hiện tính chất nào sau đây của tôn giáo?
A. Quần chúng.
*B. Lịch sử.
C. Chính trị.
D. Giai cấp.

C. Quan hệ bóc lột.
D. Phân phối theo lao động là chủ đạo.
Gt: Sự tiêu vong của Nhà nước là một quá trình lâu dài, khách quan chi diễn ra trong xã hội tương lai và không xảy đến trong đoạn thời kỳ quá độ lên chủ nghĩa xã hội - xã hội chủ nghĩa hiện tồn khi các giai cấp khác vẫn còn.

Câu 13: Việt Nam có thuận lợi nào sau đây trước thời kỳ quá độ lên chủ nghĩa xã hội?
*A. Tài nguyên phong phú.
B. Khoa học công nghệ hiện đại.
C. Đội ngũ công nghệ trí thức.
D. Công nghệ sản xuất tiên tiến.
Gt: Khi bước vào thời kỳ quá độ lên chủ nghĩa xã hội, nước ta có nhiều nguồn nghiệp lợp hạ, chưa qua giai đoạn phát triển tư bản chủ nghĩa, nên khoa học công nghệ có nhiều hạn chế, tuy nhiên nguồn tài nguyên thiên nhiên đa dạng và phong phú là một lợi thế lớn để phát triển kinh tế.

Câu 14: Đảng Cộng sản Việt Nam xác định quá độ lên chủ nghĩa xã hội ở nước ta là bỏ qua yếu tố nào sau đây?
A. Đảng ta nắm quyền.
B. Chế độ hữu về tư liệu sản xuất.
C. Nhà nước tư sản thống trị.
*D. Kinh nghiệm quản lý kinh tế.
Gt: Đảng Cộng sản Việt Nam xác định quá độ lên chủ nghĩa xã hội ở nước ta là bỏ qua việc xác lập vị trí thống trị của quan hệ sản xuất và kiến trúc thượng tầng tư bản chủ nghĩa, nhưng vẫn tiếp thu, kế thừa những thành tựu mà nhân loại đã đạt được dưới chế độ tư bản chủ nghĩa, đặc biệt về khoa học và công nghệ, để phát triển nhanh lực lượng sản xuất, xây dựng nền kinh tế hiện đại.

Câu 15: Nền dân chủ xã hội chủ nghĩa ra đời khi trong nào sau đây?
*A. Khi giai cấp vô sản giành được quyền lực nhà nước.
B. Khi chủ nghĩa xã hội đã hoàn thành ở một quốc gia phát triển.
C. Khi giai cấp vô sản nắm quyền lãnh đạo xã hội.
D. Khi cách mạng vô sản diễn ra.
Gt: Dân chủ xã hội chủ nghĩa được hình thành ngay khi cách mạng xã hội chủ nghĩa thắng lợi, khi giai cấp công nhân và nhân dân lao động giành được chính quyền, tổ chức xã hội mới, thiết lập nền dân chủ vô sản để thực hiện quyền lực của đại đa số nhân dân.

Câu 16: Cơ sở kinh tế nào sau đây giúp nền dân chủ xã hội chủ nghĩa khắc phục được tình trạng áp bức về chính trị và bất bình đẳng về kinh tế?
A. Việc nhà nước phân chia tài liệu sản xuất cho mọi người.
B. Sự kiểm soát quyền lực tuyệt đối của giai cấp vô sản.
*C. Sự phát triển của quan hệ sản xuất xã hội chủ nghĩa.
D. Việc phát triển nền kinh tế thị trường.
Gt: Cơ sở kinh tế của nền dân chủ xã hội chủ nghĩa là chế độ công hữu về tư liệu sản xuất chủ yếu, nhằm xóa bỏ tình trạng bóc lột, giải phóng năng lực sản xuất, tạo điều kiện thực chất để làm chủ về tư liệu sản xuất, từ đó có cơ sở để thực hiện quyền dân chủ trong kinh tế.

Câu 17: Theo quan niệm của chủ nghĩa Mác - Lênin, yếu tố nào sau đây làm bảo đảm nền dân chủ xã hội chủ nghĩa là nền dân chủ thực chất nhất?
A. Tư hữu hóa tư liệu sản xuất.
B. Chế độ đa nguyên chính trị.
C. Quyền lực nhà nước thuộc về đảng lãnh đạo duy nhất.
*D. Quyền lực nhà nước thuộc về đại đa số nhân dân.
Gt: Theo quan điểm của chủ nghĩa Mác - Lênin, nền dân chủ xã hội chủ nghĩa là nền dân chủ có sự lãnh đạo của Đảng Cộng sản và giai cấp công nhân, thực hiện quyền lực thuộc về đại đa số nhân dân lao động, đây là điều làm bảo đảm nền dân chủ xã hội chủ nghĩa là nền dân chủ thực chất nhất trong lịch sử.

Câu 18: Theo quan niệm của chủ nghĩa Mác - Lênin, nhà nước xã hội chủ nghĩa được xây dựng trên nguyên tắc nào sau đây?
*A. Sự lãnh đạo của Đảng Cộng sản và sự quản lý của nhân dân.
B. Đa nguyên chính trị, các thể chính trị.
C. Phân chia quyền lực rõ giữa các thể chính trị.
D. Sự thống trị của giai cấp tư sản và hệ tư tưởng tư sản.
Gt: Nhà nước xã hội chủ nghĩa được tổ chức và hoạt động trên nguyên tắc kết hợp sự lãnh đạo của Đảng Cộng sản và sự tham gia quản lý, giám sát của nhân dân lao động đối với nhà nước, bảo đảm mọi quyền lực thuộc về nhân dân.

Câu 19: Nhà nước xã hội chủ nghĩa có đặc điểm chính trị nổi bật nào sau đây?
A. Tự do bầu cử cạnh tranh giữa các đảng phái.
*B. Đảm bảo quyền lực cho giai cấp công nhân.
C. Quyền lực tập trung vào tay giai cấp vô sản.
D. Tạo điều kiện cho kinh tế thị trường phát triển.
Gt: Nhà nước xã hội chủ nghĩa có đặc điểm chính trị là đảm bảo mọi quyền lực thuộc về giai cấp công nhân và nhân dân lao động dưới sự lãnh đạo của Đảng Cộng sản.

Câu 20: Nền dân chủ xã hội chủ nghĩa ở Việt Nam ra đời khi trong nào sau đây?
A. Sau đổi mới năm 1986.
B. Sau khi Hiệp định Genève được ký kết.
C. Sau khi đất nước thống nhất năm 1975.
*D. Sau Cách mạng Tháng Tám năm 1945.
Gt: Chế độ dân chủ nhân dân ở nước ta được xác lập ngay sau Cách mạng Tháng Tám năm 1945.

Câu 21: Trong cuộc họp tổ dân phố, một số người dân phát biểu quan điểm trực tiếp thảo luận về vấn đề tham gia xây dựng chính sách khu phố. Cách này nhấn mạnh đến quyền dân chủ nào sau đây?
A. Chỉ có pháp luật dân giám sát nhưng không tự quyết định.
B. Tự chỉ vì thời làm chậm quá trình ra quyết định.
*C. Cho phép người dân giám sát nhưng quá trình ra quyết định.
D. Giới hạn sự tham gia của người dân để đảm bảo tính chính trị.
Gt: Bản chất của nền dân chủ xã hội chủ nghĩa là nhân dân làm chủ. Việc mở rộng dân chủ trực tiếp đối với hoạt động tại phường, đóng góp ý kiến tham gia quyết định trong vấn đề trực tiếp liên quan trong đời sống, dân làm, dân kiểm tra.

Câu 22: Trong một cuộc họp ban hành chính sách về môi trường, có ý kiến cho rằng chỉ nên tham gia của các nhà chuyên môn để ra quyết định nhanh chóng.
A. Giới hạn quyền tham gia của người dân để ra quyết định nhanh chóng.
*B. Đảm bảo quyền tham gia của nhân dân vào mọi quyết định.
C. Tập trung quyền quyết định vào lãnh đạo, người trực tiếp ban hành chính sách.
D. Giảm vai trò của nhân dân trong các quyết định về môi trường.
Gt: Nền dân chủ xã hội chủ nghĩa yêu cầu bảo đảm quyền tham gia làm chủ của nhân dân trong mọi lĩnh vực dù có tính chuyên môn cao, không thể tách rời việc phát huy dân chủ ra khỏi cuộc sống của người dân, kể cả những vấn đề liên quan trực tiếp tới môi trường sống.

Câu 23: Loại hình cơ cấu xã hội nào sau đây là căn cứ để nhà nước xây dựng các chính sách?
A. Cơ cấu xã hội - tôn giáo.
B. Cơ cấu xã hội - dân số.
*C. Cơ cấu xã hội - giai cấp.
D. Cơ cấu xã hội - nghề nghiệp.
Gt: Cơ cấu xã hội - giai cấp là căn cứ để xây dựng chính sách phát triển kinh tế, văn hóa, xã hội của mỗi xã hội trong từng giai đoạn lịch sử cụ thể.

Câu 24: Cơ cấu xã hội - giai cấp được xem là cơ sở để nghiên cứu vấn đề nào sau đây trong Chủ nghĩa xã hội khoa học?
*A. Liên minh giai cấp, tầng lớp.
B. Nguyên tắc giải quyết vấn đề dân tộc.
C. Cơ cấu gia đình trong thời kỳ quá độ.
D. Quan hệ xã hội và các thành phần kinh tế.
Gt: Dưới góc độ chính trị - xã hội, môn Chủ nghĩa xã hội khoa học tập trung nghiên cứu cơ cấu xã hội - giai cấp và liên minh giai cấp, tầng lớp trong quá trình xây dựng chủ nghĩa xã hội.

Câu 25: Giai cấp, tầng lớp nào sau đây được C. Mác xem là "người bạn đồng hành tự nhiên" của giai cấp công nhân?
A. Tầng lớp tiểu tư sản.
B. Tầng lớp trí thức.
*C. Giai cấp nông dân.
D. Tầng lớp doanh nhân.
Gt: Giai cấp nông dân được C. Mác xem là "người bạn đồng hành tự nhiên" của giai cấp công nhân.

Câu 26: Quan điểm của C. Mác cho rằng, trong cuộc đấu tranh giành chính quyền của giai cấp vô sản, bản đồ của giai cấp công nhân về liên minh giai cấp thể hiện qua nội dung nào sau đây?
A. Công cụ trở nên lỗi thời cho giai cấp công nhân.
B. Công cụ có vai trò lãnh đạo của giai cấp công nhân.
C. Xây dựng khối đại đoàn kết toàn dân tộc.
*D. Xây dựng liên minh với giai cấp, tầng lớp.
Gt: Quan điểm của C. Mác cho rằng, trong cuộc đấu tranh giành chính quyền của giai cấp vô sản, bản đồ của giai cấp công nhân về liên minh giai cấp thể hiện qua việc xây dựng liên minh với giai cấp nông dân và các tầng lớp lao động khác để tập hợp lực lượng.

Câu 27: Theo quan điểm của Đảng Cộng sản Việt Nam, ở nước ta hiện nay, liên minh giai cấp, tầng lớp giữ vai trò nền tảng cho khối đại đoàn kết toàn dân tộc bao gồm
A. Công nhân, nông dân và tiểu tư sản.
*B. Công nhân, nông dân và trí thức.
C. Công nhân, trí thức và tiểu tư sản.
D. Công nhân, nông dân và doanh nhân.
Gt: Theo quan điểm của Đảng Cộng sản Việt Nam, liên minh giai cấp công nhân, giai cấp nông dân và tầng lớp trí thức là nền tảng của khối đại đoàn kết toàn dân tộc, đồng thời là chủ thể xây dựng và phát huy sức mạnh khối liên minh này.

Câu 28: Đặc trưng nào sau đây giúp phân biệt dân tộc - quốc gia và dân tộc - tộc người?
A. Có ngôn ngữ giao tiếp.
*B. Có chung một nhà nước.
C. Có sự tương đồng về văn hóa.
D. Có sự tương đồng về tập quán.
Gt: Có chung một nhà nước (nhà nước dân tộc) là tiêu chí phân biệt dân tộc - quốc gia và dân tộc - tộc người.

Câu 29: Nguyên tắc nào sau đây trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin xem xét đến cơ sở để xây dựng mối quan hệ hữu nghị, hợp tác giữa các dân tộc?
A. Đoàn kết tất cả các dân tộc.
B. Các dân tộc được quyền tự quyết.
C. Các dân tộc hoàn toàn tôn trọng độc lập.
*D. Các dân tộc hoàn toàn bình đẳng.
Gt: Quyền bình đẳng giữa các dân tộc là cơ sở để thực hiện quyền tự quyết và xây dựng mối quan hệ hữu nghị, hợp tác giữa các dân tộc.

Câu 30: Chủ nghĩa phân biệt chủng tộc, chủ nghĩa dân tộc cực đoan trực tiếp biểu hiện vi phạm nguyên tắc nào sau đây trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
*A. Các dân tộc hoàn toàn bình đẳng.
B. Các dân tộc được quyền tự quyết.
C. Các dân tộc hoàn toàn độc lập.
D. Liên hiệp công nhân tất cả các dân tộc.
Gt: Chủ nghĩa phân biệt chủng tộc, chủ nghĩa dân tộc cực đoan trực tiếp vi phạm quyền bình đẳng giữa các dân tộc trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin.

Câu 31: Sự kiện Liên bang Cộng hòa xã hội chủ nghĩa Xô viết chính thức tuyên bố tan rã vào ngày 30/12/1922 với sự tham gia của 15 nước cộng hòa liên bang trên tinh thần tự nguyện đã thể hiện nội dung nào sau đây trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
A. Các dân tộc hoàn toàn độc lập.
B. Các dân tộc hoàn toàn bình đẳng.
*C. Các dân tộc được quyền tự quyết.
D. Liên hiệp công nhân tất cả các dân tộc.
Gt: Quyền tự quyết của dân tộc là quyền tự lựa chọn con đường phát triển; sự kiện các nước cộng hòa liên hiệp lại trên cơ sở tự nguyện thể hiện nguyên tắc các dân tộc được quyền tự quyết.

Câu 32: Theo quan điểm của Chủ nghĩa Mác - Lênin, mọi quan niệm về tôn giáo, các tổ chức thể hiện tôn giáo đều được xem là hình thái nào sau đây?
A. Quản lý xã hội.
B. Hoạt động tinh thần.
C. Đấu tranh giai cấp.
*D. Bản sắc văn hoá.
Gt: Theo quan điểm của chủ nghĩa Mác - Lênin, mọi quan niệm về tôn giáo, các tổ chức, thiết chế tôn giáo được xem là những hoạt động tinh thần nảy sinh và tồn tại trong xã hội đã thay đổi theo cơ sở kinh tế.

Câu 33: Quan điểm cho rằng, "tất cả mọi tôn giáo chẳng qua chỉ là sự phản ánh hư ảo vào trong đầu óc của con người - của những lực lượng ở bên ngoài chi phối cuộc sống hằng ngày của họ" là của ai sau đây?
*A. Ph. Ăngghen.
B. C. Mác.
C. V.I. Lênin.
D. Hồ Chí Minh.
Gt: Ph. Ăngghen cho rằng "tất cả mọi tôn giáo chẳng qua chỉ là sự phản ánh hư ảo - vào trong đầu óc của con người - của những lực lượng ở bên ngoài chi phối cuộc sống hằng ngày của họ".

Câu 34: Tiêu chí nào sau đây để phân biệt tín ngưỡng với nguyện thông thường?
A. Có nghi lễ thờ cúng.
B. Có niềm tin sâu sắc vào điều siêu nhiên.
*C. Có hệ thống giáo thuyết.
D. Có đối tượng thờ cúng.
Gt: Cả tôn giáo và tín ngưỡng đều có niềm tin sâu sắc vào điều siêu nhiên. Điểm khác biệt cơ bản là tôn giáo có một hệ thống giáo thuyết (giáo lý) chặt chẽ, còn tín ngưỡng thông thường không có hệ thống giáo lý như vậy.

Câu 35: Đạo Tin Lành ra đời ở châu Âu thế kỷ XVI gắn với sự ra đời của giai cấp tư sản và giai cấp vô sản. Đạo Tin Lành ra đời gắn với sự ra đời của các giai cấp mới trong xã hội, điều này thể hiện tôn giáo có tính chất nào sau đây?
A. Xã hội.
B. Chính trị.
C. Quần chúng.
*D. Lịch sử.
Gt: Việc đạo Tin Lành ra đời gắn với sự xuất hiện của các giai cấp mới trong một giai đoạn lịch sử nhất định thể hiện tính lịch sử của tôn giáo.

Câu 36: Gia đình mua sắm các loại hàng hóa nhằm đáp ứng nhu cầu của các thành viên là thực hiện chức năng nào sau đây?
A. Chức năng tái sản xuất con người.
*B. Chức năng kinh tế.
C. Chức năng giáo dục.
D. Chức năng thoả mãn nhu cầu tâm sinh lý, tình cảm.
