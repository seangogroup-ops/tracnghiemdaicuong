Câu 22: Trong trường hợp một cán bộ có vi phạm đạo đức công vụ, gây ảnh hưởng xấu đến uy tín cơ quan nhà nước, giải pháp nào sau đây thể hiện đúng tinh thần của Nhà nước pháp quyền xã hội chủ nghĩa?
A. Phê bình trước tổ chức đoàn thể.
B. Nhắc nhở trong nội bộ cơ quan.
C. Không xem xét trách nhiệm pháp lý.
*D. Xử lý theo đúng quy định của pháp luật.
Gt: "Mọi công dân bình đẳng trước pháp luật" nên khi cán bộ vi phạm đạo đức công vụ, dù người vi phạm nắm giữ chức vụ nào, đều phải được xử lý theo đúng quy định của pháp luật.

Câu 23: Một trong những mối quan hệ cơ bản giữa các giai cấp, tầng lớp trong cơ cấu xã hội - giai cấp là gì?
A. Quan hệ tôn giáo, tín ngưỡng.
B. Quan hệ hành chính, dân cư.
*C. Quan hệ sở hữu tư liệu sản xuất.
D. Quan hệ chuyên môn nghề nghiệp.
Gt: Cơ cấu xã hội - giai cấp là hệ thống các giai cấp, tầng lớp xã hội tồn tại khách quan trong một chế độ xã hội nhất định, thông qua những mối quan hệ về sở hữu tư liệu sản xuất, về tổ chức quản lý quá trình sản xuất, về địa vị chính trị - xã hội... giữa các giai cấp, tầng lớp đó.

Câu 24: Trong các loại hình cơ cấu xã hội, cơ cấu xã hội - giai cấp có vị trí trung tâm vì lý do nào sau đây?
A. Đăng phái chính trị và nhà nước.
B. Các chế độ văn hóa và tôn giáo.
C. Quy mô và chất lượng nguồn lao động.
*D. Các thiết chế gia đình và dòng họ.
Gt: Trong các loại hình cơ cấu xã hội, cơ cấu xã hội - giai cấp có vị trí quan trọng hàng đầu vì có liên quan trực tiếp đến các đảng phái chính trị và nhà nước, đến quyền sở hữu tư liệu sản xuất, quản lý tổ chức lao động, vấn đề phân phối thu nhập trong một hệ thống sản xuất nhất định.

Câu 25: Về mặt kinh tế, sự phát triển lực lượng sản xuất và cơ cấu kinh tế thời kỳ quá độ lên chủ nghĩa xã hội tất yếu dẫn đến việc mở rộng chủ thể kinh tế đa dạng như thế nào?
A. Kế hoạch hóa, tập trung hóa.
B. Tư nhân hóa triệt để mọi ngành.
C. Phát triển hình thức tự do tự do.
*D. Công nghiệp hóa, hiện đại hóa.
Gt: Tính tất yếu kinh tế của thời kỳ quá độ lên chủ nghĩa xã hội đòi hỏi phát triển lực lượng sản xuất thông qua quá trình công nghiệp hóa, hiện đại hóa, làm biến đổi cơ cấu xã hội - giai cấp mạnh mẽ theo hướng phát triển các thành phần kinh tế đa dạng.

Câu 26: Nhà tư tưởng nào sau đây đã chủ trương mở rộng liên minh giữa công nhân với giai cấp nông dân và giai cấp tầng lớp khác trong quá trình xây dựng chủ nghĩa xã hội?
A. C. Mác.
*B. V.I. Lênin.
C. Ph. Ăngghen.
D. Xtalin.
Gt: Lênin đã chủ trương mở rộng khối liên minh giữa giai cấp công nhân với giai cấp nông dân và các tầng lớp lao động khác trong thời kỳ quá độ lên chủ nghĩa xã hội.

Câu 27: Ở Việt Nam, quá trình đẩy mạnh công nghiệp hóa, hiện đại hóa và hội nhập quốc tế hiện nay khiến cơ cấu xã hội biến đổi mạnh mẽ nhất về mặt nào sau đây?
A. Cơ cấu xã hội - nghề nghiệp.
B. Chính sách của nhà nước.
*C. Cơ cấu kinh tế.
D. Quan hệ xã hội.
Gt: Theo chủ nghĩa Mác - Lênin, cơ cấu xã hội - giai cấp có mối liên hệ chặt chẽ với cơ cấu kinh tế của thời kỳ quá độ, chính vì thế, khi phương thức sản xuất thay đổi, tất yếu dẫn đến biến đổi cơ cấu xã hội - giai cấp.

Câu 28: Sự thức tỉnh, trưởng thành về ý thức dân tộc và mong muốn vươn tới độc lập, tự do là nội dung nào sau đây trong quan hệ dân tộc?
A. Liên hiệp lại với nhau để hình thành quốc gia lớn hơn.
*B. Tách ra để hình thành các cộng đồng dân tộc độc lập.
C. Hình thành các liên minh khu vực hoặc quốc tế.
D. Các dân tộc xích lại gần nhau, hòa hợp với nhau và mở rộng giao lưu.
Gt: Quan hệ dân tộc phát triển theo hai xu hướng, trong đó ở xu hướng thứ nhất, cộng đồng dân cư muốn tách ra để hình thành cộng đồng dân tộc độc lập.

Câu 29: Đấu tranh chống chủ nghĩa phân biệt chủng tộc, chủ nghĩa dân tộc cực đoan là biểu hiện của nguyên tắc nào sau đây trong Cương lĩnh dân tộc?
*A. Liên hiệp công nhân tất cả các dân tộc.
B. Các dân tộc hoàn toàn bình đẳng.
C. Các dân tộc được quyền tự quyết.
D. Đoàn kết quốc tế của các dân tộc.
Gt: Để thực hiện quyền bình đẳng dân tộc, trước hết phải thủ tiêu tình trạng áp bức giai cấp, trên cơ sở đó xóa bỏ tình trạng áp bức dân tộc; phải đấu tranh chống chủ nghĩa phân biệt chủng tộc, chủ nghĩa dân tộc cực đoan, là nội dung của nguyên tắc "các dân tộc hoàn toàn bình đẳng" trong Cương lĩnh dân tộc.

Câu 30: Để thực hiện bình đẳng giữa các dân tộc ở Việt Nam, cần ưu tiên thực hiện giải pháp nào sau đây?
*A. Sự chênh lệch về trình độ phát triển giữa các dân tộc.
B. Sự khác biệt về số lượng dân cư giữa các dân tộc.
C. Sự khác biệt về phân bố dân cư giữa các dân tộc.
D. Sự khác biệt về văn hóa giữa các dân tộc người.
Gt: Muốn thực hiện bình đẳng giữa các dân tộc, trước hết phải khắc phục sự chênh lệch về trình độ phát triển kinh tế, văn hóa, xã hội giữa các dân tộc do lịch sử để lại.

Câu 31: Sự kiện Nam Sudan tách ra từ Sudan và chính thức trở thành một quốc gia độc lập vào năm 2011 là biểu hiện của nguyên tắc nào sau đây trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin?
A. Liên hiệp công nhân tất cả các dân tộc.
B. Các dân tộc hoàn toàn bình đẳng.
C. Đoàn kết tất cả các dân tộc.
*D. Các dân tộc được quyền tự quyết.
Gt: Quyền tự quyết của các dân tộc thể hiện ở quyền tự quyết định lập ra quốc gia dân tộc độc lập, do vậy sự kiện Nam Sudan tách ra từ Sudan và chính thức trở thành quốc gia độc lập là biểu hiện của nguyên tắc "các dân tộc được quyền tự quyết" trong Cương lĩnh dân tộc của chủ nghĩa Mác - Lênin.

Câu 32: Theo quan điểm của chủ nghĩa Mác - Lênin, xét đến cùng, mọi quan niệm về tôn giáo, các tổ chức, thiết chế tôn giáo đều được sinh ra từ đâu?
A. Tín ngưỡng.
B. Tư tưởng.
*C. Sản xuất.
D. Tính thân.
Gt: Theo quan điểm chủ nghĩa Mác - Lênin, xét đến cùng, mọi quan niệm về tôn giáo, mọi tổ chức tôn giáo đều được sinh ra từ những điều kiện kinh tế - xã hội, mà trong hoạt động sản xuất vật chất là nền tảng cơ bản của đời sống xã hội.

Câu 33: Khi xã hội chưa có giai cấp, tôn giáo chỉ phản ánh nhận thức ngây thơ của con người xung quanh thế nào?
A. Lịch sử.
B. Quần chúng.
*C. Chính trị.
D. Xã hội.
Gt: Khi xã hội chưa có giai cấp, tôn giáo chỉ phản ánh nhận thức ngây thơ, ngộ nhận của con người xung quanh thế giới tự nhiên đầy bí ẩn quanh mình, khi đó chưa có tính chính trị.

Câu 34: Sự vận động, biến đổi không ngừng của tôn giáo đòi hỏi giải pháp quản lý nào sau đây phù hợp nhất?
A. Khắc phục dần các ảnh hưởng tiêu cực của tôn giáo.
B. Đảm bảo tự do tín ngưỡng của tôn giáo.
C. Phân biệt mặt chính trị và mặt tư tưởng.
*D. Lịch sử - cụ thể.
Gt: Tín ngưỡng, tôn giáo không phải là hiện tượng xã hội bất biến, các lực lượng chính trị hoặc những nhóm lợi ích khác nhau lợi dụng tôn giáo vào những thời điểm khác nhau vì vậy phải có quan điểm lịch sử - cụ thể khi xem xét, đánh giá và ứng xử với những vấn đề liên quan đến tôn giáo.

Câu 35: Ngày 13 tháng 11 năm 2015, các phần tử khủng bố Nhà nước Hồi giáo (IS) đã tấn công thủ đô Paris (Pháp) làm hơn 100 người thiệt mạng và hàng trăm người bị thương, sự kiện này thể hiện tôn giáo bị biến tướng dẫn tới điều gì?
A. Xã hội.
B. Lịch sử.
C. Quần chúng.
*D. Chính trị.
Gt: Tôn giáo mang tính chính trị khi nó bị các lực lượng chính trị hoặc những nhóm lợi ích khác nhau lợi dụng để thực hiện các mưu đồ chính trị, có khi khoác áo tôn giáo để gây bất ổn xã hội, gây tổn hại đến lợi ích nhân loại, khiến tôn giáo bị biến tướng thành công cụ chính trị cực đoan.

Câu 36: Chức năng nào sau đây của gia đình góp phần đào tạo thế hệ trẻ và xây dựng con người mới xã hội chủ nghĩa?
*A. Giáo dục, hình thành và phát triển nhân cách con người.
B. Kinh tế, tổ chức đời sống và hoạt động tiêu dùng gia đình.
C. Sinh đẻ, duy trì nòi giống và cung cấp thế hệ con người.
D. Thỏa mãn nhu cầu tâm sinh lý của các thành viên.
Gt: Với chức năng giáo dục, nuôi dưỡng, gia đình góp phần to lớn vào việc đào tạo thế hệ trẻ, thể hiện lại tương lai thế hệ trẻ cho xã hội.

Câu 37: Chức năng tái sản xuất con người của gia đình tác động trực tiếp đến vấn đề nào sau đây của xã hội?
A. Nghĩa vụ pháp lý của các thành viên gia đình.
B. Sức khỏe bà mẹ và trẻ em.
*C. Quy mô dân số và nguồn lao động của quốc gia.
D. Mức sống của các tầng lớp dân cư.
Gt: Chức năng tái sản xuất quyết định đến mật độ dân cư và nguồn lực lao động của một quốc gia, thể hiện ở việc quy mô gia đình tác động trực tiếp đến quy mô dân số và nguồn lao động của quốc gia.

Câu 38: Một trong những biểu hiện của hôn nhân tự nguyện là gì?
A. Theo tập quán vùng miền.
*B. Môn đăng hộ đối.
C. Tự do ly hôn.
D. Hợp tuổi, hợp mệnh.
Gt: Hôn nhân tiến bộ (tự nguyện) còn bao hàm cả quyền tự do ly hôn khi tình yêu giữa nam và nữ không còn nữa.

Câu 39: Loại hình gia đình nào sau đây phổ biến ở Việt Nam hiện nay?
A. Gia đình tập thể.
B. Gia đình truyền thống.
C. Gia đình đơn thân.
*D. Gia đình hạt nhân.
Gt: Gia đình đơn (còn gọi là gia đình hạt nhân) đang trở nên phổ biến ở đô thị và nông thôn ở Việt Nam.

Câu 40: Gia đình anh P có mức thu nhập cao, đời sống vật chất đầy đủ nhưng các thành viên trong gia đình ít có sự gắn kết, giao tiếp trực tiếp với nhau, mỗi người chỉ tập trung vào công việc riêng, ít có mối quan tâm sẻ chia. Thực trạng này đang tồn tại phổ biến trong nhiều gia đình đô thị của Việt Nam hiện nay. Hiện tượng trên phản ánh sự xuất hiện xu hướng nào sau đây của biến đổi gia đình Việt Nam?
*A. Sự rời rạc về liên kết trong quan hệ gia đình.
B. Sự biến đổi về quy mô gia đình.
C. Sự biến đổi chức năng kinh tế của gia đình.
D. Sự biến đổi chức năng tái sản xuất con người.
Gt: Hiện tượng "ít chia sẻ", "thiếu giao tiếp trực tiếp" và "tập trung vào công việc riêng" là biểu hiện rõ nét của sự rời rạc, lỏng lẻo trong liên kết tình cảm giữa các thành viên gia đình đô thị.
`
        },
];

let exam=[], submitted=false, timeLeft=3600, timerID=null, answered=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function parse(text, src){
    return text.trim().split(/(?=Câu \d+:)/).filter(b=>b.trim()).map(block=>{
        const lines=block.trim().split('\n');
        const q=lines[0].replace(/Câu \d+:\s*/,'').trim();
        const opts=[]; let ci=-1, ex='';
        lines.forEach(l=>{
            l=l.trim();
            if(/^[*]?[A-D]\./.test(l)){if(l.startsWith('*'))ci=opts.length;opts.push(l.replace('*','').replace(/^[A-D]\.\s*/,'').trim())}
            else if(l.startsWith('Gt:'))ex=l.replace('Gt:','').trim();
        });
        if(!q||opts.length<2||ci===-1)return null;
        return{q,opts,ci,ex,src};
    }).filter(Boolean);
}

function getPool(){
    const v=document.getElementById('sel-src').value;
    let pool=[];
    if(v==='all') database.forEach(p=>pool=pool.concat(parse(p.content,p.name)));
    else{const p=database[+v];pool=parse(p.content,p.name)}
    return pool;
}

function updateStat(){
    const n=getPool().length;
    document.getElementById('stat-badge').textContent=n+' câu trong NHCH';
}

function shuffleOptions(q){
    const idx=q.opts.map((_,i)=>i);
    shuffle(idx);
    const opts=idx.map(i=>q.opts[i]);
    const ci=idx.indexOf(q.ci);
    return{q:q.q, opts, ci, ex:q.ex, src:q.src};
}

function generateExam(){
    const n=Math.min(+document.getElementById('sel-num').value||60, 9999);
    const mins=+document.getElementById('sel-time').value||60;
    let pool=getPool(); shuffle(pool);
    exam=pool.slice(0,Math.min(n,pool.length)).map(shuffleOptions);
    submitted=false; answered=0;
    clearInterval(timerID);
    timeLeft=mins*60;
    updateTimerDisp();
    document.getElementById('timer-wrap').classList.remove('warn');
    timerID=setInterval(()=>{
        if(submitted)return;
        timeLeft--;updateTimerDisp();
        if(timeLeft<=300)document.getElementById('timer-wrap').classList.add('warn');
        if(timeLeft<=0)submitExam();
    },1000);
    render();
}

function updateTimerDisp(){
    const m=String(Math.floor(timeLeft/60)).padStart(2,'0');
    const s=String(timeLeft%60).padStart(2,'0');
    document.getElementById('timer-disp').textContent=m+':'+s;
}

function render(){
    const qc=document.getElementById('q-container'), ng=document.getElementById('nav-grid');
    qc.innerHTML=''; ng.innerHTML='';
    exam.forEach((q,i)=>{
        const card=document.createElement('div'); card.className='q-card'; card.id='q-'+i;
        card.innerHTML=`
            <div class="q-num">Câu ${i+1} / ${exam.length}</div>
            <div class="q-src"><i class="fa-solid fa-tag"></i> ${q.src}</div>
            <div style="font-size:1.05rem">${q.q}</div>
            <div class="opts">${q.opts.map((o,oi)=>`
                <label class="opt" id="L-${i}-${oi}">
                    <input type="radio" name="q${i}" value="${oi}" onchange="markAns(${i})">
                    <div class="opt-l">${String.fromCharCode(65+oi)}</div>
                    <div class="opt-t">${o}</div>
                </label>`).join('')}
            </div>
            <div class="ex-box" id="ex-${i}"><b><i class="fa-solid fa-lightbulb" style="color:#f59e0b"></i> Giải thích:</b><br>${q.ex||'Không có giải thích.'}</div>`;
        qc.appendChild(card);
        const btn=document.createElement('div');
        btn.className='nav-btn'; btn.id='nav-'+i; btn.textContent=i+1;
        btn.onclick=()=>card.scrollIntoView({behavior:'smooth',block:'start'});
        ng.appendChild(btn);
    });
    updateProg();
    if(window.renderMathInElement) renderMathInElement(document.body,{delimiters:[{left:'$',right:'$',display:false}]});
}

function markAns(i){
    if(submitted)return;
    const btn=document.getElementById('nav-'+i);
    if(!btn.classList.contains('answered')){btn.classList.add('answered');answered++;updateProg()}
}

function updateProg(){
    const t=exam.length;
    document.getElementById('prog-text').textContent=answered+' / '+t+' câu đã trả lời';
    document.getElementById('prog-bar').style.width=(t>0?answered/t*100:0)+'%';
}

function submitExam(){
    if(submitted)return;
    if(!confirm('Bạn có chắc chắn muốn nộp bài?'))return;
    submitted=true; clearInterval(timerID);
    let ok=0,bad=0,skip=0;
    exam.forEach((q,i)=>{
        const sel=document.querySelector(`input[name="q${i}"]:checked`);
        document.getElementById('ex-'+i).classList.add('show');
        document.getElementById('L-'+i+'-'+q.ci).classList.add('ok');
        const nav=document.getElementById('nav-'+i);
        if(sel){
            const v=+sel.value;
            if(v===q.ci){ok++;nav.className='nav-btn correct'}
            else{bad++;nav.className='nav-btn wrong';document.getElementById('L-'+i+'-'+v).classList.add('bad')}
        } else{skip++;nav.className='nav-btn wrong'}
    });
    const t=exam.length, score=(ok/t*10).toFixed(1), pct=(ok/t*100).toFixed(0);
    document.getElementById('final-score').textContent=score;
    document.getElementById('r-ok').textContent=ok;
    document.getElementById('r-bad').textContent=bad;
    document.getElementById('r-skip').textContent=skip;
    document.getElementById('r-text').textContent='Đúng '+ok+'/'+t+' câu ('+pct+'%)';
    const color=ok/t>=0.5?'var(--blue)':'var(--bad)';
    document.getElementById('score-ring').style.background=`conic-gradient(${color} ${pct}%,#e5e7eb ${pct}%)`;
    document.getElementById('final-score').style.color=color;
    document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');window.scrollTo({top:0,behavior:'smooth'})}
function reloadExam(){document.getElementById('modal').classList.remove('open');generateExam();window.scrollTo({top:0,behavior:'smooth'})}

document.getElementById('sel-src').addEventListener('change',updateStat);
window.onload=()=>{updateStat();generateExam()};
</script>
</body>
