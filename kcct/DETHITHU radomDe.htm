            content: `
Câu 1: Thuật ngữ Kinh tế chính trị xuất hiện đầu tiên ở
A. Châu Á.
*B. Châu Âu.
C. Châu Mỹ.
D. Châu Phi.

Gt: Thuật ngữ "Kinh tế chính trị" xuất hiện đầu tiên ở Châu Âu, do Antoine de Montchrestien đặt ra năm 1615 trong tác phẩm "Traité d'économie politique".

Câu 2: Nhà kinh tế học nào sau đây là đại biểu tiêu biểu của Chủ nghĩa trọng thương?
*A. Gasparo Scaruffi.
B. D. Ricardo.
C. W. Petty.
D. Jacques Turgot.

Gt: Gasparo Scaruffi là đại biểu tiêu biểu của Chủ nghĩa trọng thương. D. Ricardo và W. Petty là đại biểu Kinh tế chính trị cổ điển Anh; Jacques Turgot thuộc Chủ nghĩa trọng nông.

Câu 3: Nhà kinh tế học Antonso Serra là đại biểu tiêu biểu của
*A. Chủ nghĩa trọng thương.
B. Chủ nghĩa trọng nông.
C. Kinh tế chính trị tầm thường.
D. Kinh tế chính trị cổ điển Anh.

Gt: Antonio Serra (người Ý) là đại biểu tiêu biểu của Chủ nghĩa trọng thương với tác phẩm "Luận về các nguyên nhân làm cho vương quốc Naples có nhiều vàng bạc" (1613).

Câu 4: C. Mác đã kế thừa trực tiếp những giá trị khoa học của học thuyết kinh tế nào sau đây để phát triển lý luận kinh tế chính trị về phương thức sản xuất tư bản chủ nghĩa?
A. Chủ nghĩa trọng thương.
B. Chủ nghĩa trọng nông.
C. Kinh tế chính trị tầm thường.
*D. Kinh tế chính trị cổ điển Anh.

Gt: C. Mác kế thừa trực tiếp Kinh tế chính trị cổ điển Anh (A. Smith, D. Ricardo) với lý thuyết giá trị - lao động để xây dựng học thuyết kinh tế về PTSX TBCN.

Câu 5: Phát hiện ra các quy luật kinh tế chi phối các quan hệ giữa người với người trong sản xuất và trao đổi, là mục đích nghiên cứu của
A. Chủ nghĩa trọng thương.
B. Chủ nghĩa trọng nông.
C. Kinh tế chính trị cổ điển Anh.
*D. Kinh tế chính trị Mác - Lênin.

Gt: Kinh tế chính trị Mác - Lênin có mục đích nghiên cứu các quy luật kinh tế chi phối quan hệ giữa người với người trong sản xuất và trao đổi dưới PTSX TBCN và trong thời kỳ quá độ lên CNXH.

Câu 6: Trên cơ sở nhận thức được mở rộng và ngày càng sâu sắc, người lao động hình thành được năng lực, kỹ năng vận dụng các quy luật kinh tế vào thực tiễn hoạt động lao động là chức năng thực tiễn của
A. Chủ nghĩa trọng thương.
B. Chủ nghĩa trọng nông.
C. Kinh tế chính trị cổ điển Anh.
*D. Kinh tế chính trị Mác - Lênin.

Gt: Chức năng thực tiễn của Kinh tế chính trị Mác - Lênin là giúp người lao động vận dụng quy luật kinh tế vào thực tiễn lao động sản xuất.

Câu 7: Nhiều giá trị sử dụng khác nhau của hàng hoá được con người phát hiện nhờ vào sự phát triển của nền sản xuất và
A. sự quản lý của nhà nước.
*B. khoa học, công nghệ.
C. thể chế chính trị.
D. cơ chế kinh tế.

Gt: Giá trị sử dụng của hàng hoá ngày càng được phát hiện phong phú hơn nhờ sự phát triển của khoa học, công nghệ, mở ra các công dụng mới của cùng một vật.

Câu 8: Hàng hoá có hai thuộc tính là do lao động của người sản xuất hàng hoá có tính hai mặt là lao động cụ thể và
A. lao động cá biệt.
*B. lao động trừu tượng.
C. lao động tư nhân.
D. lao động xã hội.

Gt: Lao động sản xuất hàng hoá có tính hai mặt: lao động cụ thể (tạo ra giá trị sử dụng) và lao động trừu tượng (tạo ra giá trị). Đây là phát hiện của C. Mác.

Câu 9: Cơ sở để so sánh, trao đổi các giá trị sử dụng khác nhau là
*A. lao động trừu tượng.
B. lao động cụ thể.
C. lao động tư nhân.
D. lao động xã hội.

Gt: Lao động trừu tượng (hao phí lao động thuần tuý về mặt sinh lý) là cơ sở để so sánh và trao đổi các hàng hoá có giá trị sử dụng khác nhau.

Câu 10: Việc sản xuất và trao đổi hàng hoá phải được tiến hành trên cơ sở của hao phí lao động xã hội cần thiết là yêu cầu của quy luật
*A. giá trị.
B. cung - cầu.
C. cạnh tranh.
D. lưu thông tiền tệ.

Gt: Quy luật giá trị yêu cầu sản xuất và trao đổi hàng hoá phải dựa trên cơ sở hao phí lao động xã hội cần thiết, không phải hao phí lao động cá biệt.

Câu 11: Người sản xuất muốn bán được hàng hoá trên thị trường, muốn được xã hội thừa nhận sản phẩm thì lượng giá trị của một hàng hoá cá biệt phải phù hợp với thời gian lao động xã hội cần thiết, là yêu cầu của quy luật
*A. giá trị.
B. cung - cầu.
C. cạnh tranh.
D. lưu thông tiền tệ.

Gt: Quy luật giá trị đòi hỏi hàng hoá phải được sản xuất với hao phí lao động cá biệt không vượt quá thời gian lao động xã hội cần thiết thì mới được xã hội thừa nhận.

Câu 12: Giá trị hàng hoá là nội dung, là cơ sở của giá trị
A. sử dụng.
*B. trao đổi.
C. thặng dư.
D. tiêu dùng.

Gt: Giá trị là lao động xã hội của người sản xuất kết tinh trong hàng hoá, là nội dung và cơ sở của giá trị trao đổi. Giá trị trao đổi là hình thức biểu hiện bên ngoài của giá trị.

Câu 13: Việc phát hiện ra tính hai mặt của lao động sản xuất hàng hoá giúp C. Mác luận giải triệt để và khoa học về nguồn gốc, bản chất của
A. giá cả.
*B. giá trị.
C. giá trị sử dụng.
D. giá trị thị trường.

Gt: Phát hiện tính hai mặt của lao động sản xuất hàng hoá (lao động cụ thể và lao động trừu tượng) là cơ sở để C. Mác luận giải nguồn gốc và bản chất của giá trị hàng hoá.

Câu 14: Quy luật cạnh tranh điều tiết một cách khách quan mối quan hệ ganh đua kinh tế giữa các chủ thể trong
A. các nền kinh tế.
*B. sản xuất và trao đổi hàng hoá.
C. các chế độ kinh tế.
D. phương thức sản xuất tư bản chủ nghĩa.

Gt: Quy luật cạnh tranh điều tiết khách quan mối quan hệ ganh đua kinh tế giữa các chủ thể trong quá trình sản xuất và trao đổi hàng hoá.

Câu 15: Kết quả cạnh tranh trong nội bộ ngành là hình thành giá trị thị trường của từng
A. nền kinh tế.
B. doanh nghiệp.
*C. loại hàng hoá.
D. quốc gia.

Gt: Cạnh tranh trong nội bộ ngành dẫn đến hình thành giá trị thị trường của từng loại hàng hoá (mức hao phí lao động xã hội cần thiết trung bình của ngành).

Câu 16: Vai trò của người tiêu dùng là định hướng
*A. sản xuất.
B. lưu thông.
C. phân phối.
D. tiêu dùng.

Gt: Người tiêu dùng (thông qua nhu cầu và cầu trên thị trường) có vai trò định hướng sản xuất - quyết định doanh nghiệp sản xuất cái gì, số lượng bao nhiêu.

Câu 17: Giá trị sử dụng của hàng hoá sức lao động nhằm thoả mãn nhu cầu của
*A. người mua.
B. người bán.
C. người sản xuất.
D. nhà nước.

Gt: Sức lao động là hàng hoá đặc biệt. Giá trị sử dụng của nó (khả năng lao động, tạo ra giá trị mới lớn hơn giá trị bản thân nó) nhằm thoả mãn nhu cầu của người mua (nhà tư bản).

Câu 18: Hình thái tư bản đầu tiên trong tuần hoàn của tư bản là
A. tư bản sản xuất.
B. tư bản hàng hoá.
*C. tư bản tiền tệ.
D. tư bản cho vay.

Gt: Tuần hoàn tư bản bắt đầu bằng tư bản tiền tệ (T), sau đó chuyển thành tư bản sản xuất (SX), rồi tư bản hàng hoá (H'), cuối cùng trở về hình thái tiền tệ (T').

Câu 19: Ba hình thái kế tiếp nhau của tuần hoàn tư bản là tư bản tiền tệ, tư bản sản xuất,
*A. tư bản hàng hoá.
B. tư bản tiền tệ.
C. tư bản sản xuất.
D. tư bản cho vay.

Gt: Ba hình thái kế tiếp trong tuần hoàn tư bản: tư bản tiền tệ -> tư bản sản xuất -> tư bản hàng hoá, theo công thức T - H - SX - H' - T'.

Câu 20: Chu chuyển tư bản được đo lường bằng thời gian chu chuyển tư bản hoặc
A. tốc độ tích luỹ tư bản.
B. thời gian lưu thông.
C. thời gian sản xuất.
*D. tốc độ chu chuyển tư bản.

Gt: Chu chuyển tư bản được đo bằng hai đại lượng: thời gian chu chuyển tư bản (tổng thời gian sản xuất + lưu thông) và tốc độ chu chuyển tư bản (số vòng quay trong năm).

Câu 21: Xí nghiệp A có lượng tư bản đầu tư 100.000.000 đồng, cấu tạo hữu cơ của tư bản 4/1. Vậy giá trị cũ là bao nhiêu?
A. 40.000.000 đồng.
B. 10.000.000 đồng.
*C. 80.000.000 đồng.
D. 20.000.000 đồng.

Gt: CTHC = c/v = 4/1, tổng = 5 phần. Tư bản bất biến c (giá trị cũ) = 4/5 x 100tr = 80tr đồng. Tư bản khả biến v = 1/5 x 100tr = 20tr đồng.

Câu 22: Quá trình tích luỹ tư bản không ngừng làm tăng cấu tạo hữu cơ của
*A. tư bản.
B. tiêu dùng.
C. hàng hoá.
D. trao đổi.

Gt: Tích luỹ tư bản gắn liền với tiến bộ kỹ thuật, tăng tư bản bất biến (máy móc) nhanh hơn tư bản khả biến (lao động), dẫn đến cấu tạo hữu cơ của tư bản (c/v) không ngừng tăng lên.

Câu 23: Trình độ khai thác sức lao động là một trong những nhân tố chủ yếu ảnh hưởng đến quy mô
*A. tích luỹ tư bản.
B. tiêu dùng hàng hoá.
C. trao đổi.
D. phân phối.

Gt: Quy mô tích luỹ tư bản phụ thuộc vào khối lượng giá trị thặng dư và tỷ lệ phân chia thành tích luỹ/tiêu dùng. Trình độ khai thác sức lao động (tỷ suất m') quyết định khối lượng m, từ đó ảnh hưởng quy mô tích luỹ.

Câu 24: Xí nghiệp A có chi phí tư bản 100.000.000 đồng, cấu tạo hữu cơ của tư bản 3/2, tỷ suất giá trị thặng dư 30%. Vậy giá trị mới là bao nhiêu?
A. 42.000.000 đồng.
*B. 52.000.000 đồng.
C. 40.000.000 đồng.
D. 60.000.000 đồng.

Gt: CTHC = c/v = 3/2, tổng = 5 phần. v = 2/5 x 100tr = 40tr. m = m' x v = 30% x 40tr = 12tr. Giá trị mới = v + m = 40tr + 12tr = 52tr đồng.

Câu 25: Theo quan điểm của P.Samuelson, lợi nhuận là phần thu nhập thặng dư tính bằng hiệu quả giữa tổng doanh thu trừ đi
A. tổng giá trị hàng hoá.
*B. tổng chi phí.
C. giá trị hàng hoá.
D. giá trị tăng thêm.

Gt: Theo P.Samuelson, lợi nhuận = Tổng doanh thu - Tổng chi phí (bao gồm cả chi phí cơ hội). Đây là cách tiếp cận của kinh tế học hiện đại.

Câu 26: Tỷ suất lợi nhuận phản ánh mức doanh lợi
A. trao đổi hàng hoá.
B. tiêu dùng hàng hoá.
*C. đầu tư tư bản.
D. cho vay tư bản.

Gt: Tỷ suất lợi nhuận (p' = m/K x 100%) phản ánh mức doanh lợi của đầu tư tư bản, cho biết cứ 100 đơn vị tư bản đầu tư thu được bao nhiêu đơn vị lợi nhuận.

Câu 27: Địa tô là một trong những căn cứ để tính toán giá cả ruộng đất khi thực hiện bán
A. quyền sử dụng đất.
B. quyền sở hữu đất.
*C. đất đai.
D. hàng hoá.

Gt: Giá cả ruộng đất = Địa tô / Tỷ suất lợi tức ngân hàng. Địa tô là căn cứ chính để xác định giá cả đất đai khi mua bán.

Câu 28: Mảnh đất có diện tích 100m2, giá cả mảnh đất 2 tỷ đồng, tỷ suất ngân hàng nhận gửi hiện hành 7%. Vậy địa tô của mảnh đất là bao nhiêu?
*A. 140.000.000 đồng.
B. 120.000.000 đồng.
C. 130.000.000 đồng.
D. 170.000.000 đồng.

Gt: Địa tô = Giá cả đất x Tỷ suất lợi tức = 2.000.000.000 x 7% = 140.000.000 đồng.

Câu 29: Trong nền kinh tế thị trường, độc quyền có thể được hình thành một cách tự nhiên, cũng có thể được hình thành bởi
A. điều kiện tự nhiên.
B. điều kiện xã hội.
*C. ý chí của nhà nước.
D. tư bản thương nghiệp.

Gt: Độc quyền hình thành theo hai con đường: tự nhiên (do cạnh tranh, tích tụ tập trung tư bản) hoặc do ý chí của nhà nước (nhà nước cấp phép độc quyền, bảo hộ).

Câu 30: Độc quyền có thể làm tăng năng suất lao động, nâng cao năng lực cạnh tranh của
*A. tổ chức độc quyền.
B. tổ chức chính trị.
C. nhà nước.
D. tổ chức xã hội.

Gt: Tổ chức độc quyền với ưu thế về quy mô, vốn, công nghệ có thể đầu tư R&D, nâng cao năng suất và năng lực cạnh tranh của chính tổ chức đó trên thị trường quốc tế.

Câu 31: Tổ chức độc quyền có ưu thế tập trung được sức mạnh kinh tế to lớn, nhất là sức mạnh về
A. đất đai.
B. thị trường.
C. xuất khẩu.
*D. tài chính.

Gt: Tổ chức độc quyền tập trung sức mạnh kinh tế to lớn, đặc biệt là sức mạnh tài chính (vốn, tín dụng, ngân hàng), tạo nền tảng chi phối toàn bộ nền kinh tế.

Câu 32: Sự kết hợp về nhân sự trong độc quyền nhà nước được thực hiện thông qua các đảng phái. Đứng sau các đảng phái là một lực lượng có quyền lực, đó chính là
A. các cơ quan quản lý nhà nước về kinh tế.
B. nhà tư bản kếch xù.
*C. các hội chủ xí nghiệp độc quyền.
D. nhà tài phiệt.

Gt: Đứng sau các đảng phái chính trị là các hội chủ xí nghiệp độc quyền - lực lượng tài trợ và chi phối hoạt động chính trị nhằm bảo vệ lợi ích của tư bản độc quyền.

Câu 33: Các tổ chức độc quyền công nghiệp tham gia vào công việc của ngân hàng bằng cách
A. bán tài sản cho các ngân hàng lớn.
*B. mua cổ phần của các ngân hàng lớn.
C. bán cổ phần cho các ngân hàng lớn.
D. cử đại diện tham gia vào cơ quan quản lý nhà nước.

Gt: Tổ chức độc quyền công nghiệp tham gia vào hoạt động ngân hàng bằng cách mua cổ phần của các ngân hàng lớn, từ đó kiểm soát và chi phối hoạt động ngân hàng.

Câu 34: Trong chủ nghĩa tư bản hiện đại, để cùng tồn tại và cùng phân chia quyền lực giữa các thế lực tư bản độc quyền, tại các nước tư bản phát triển nhất, quan hệ nhân sự xuất hiện cơ chế sau đây?
A. Thỏa hiệp.
B. Tham dự.
*C. Ủy nhiệm.
D. Phân cấp.

Gt: Cơ chế ủy nhiệm (hay ủy quyền) xuất hiện trong CNTB hiện đại, cho phép các thế lực tư bản độc quyền cùng tồn tại và phân chia quyền lực thông qua việc ủy nhiệm đại diện quản lý.

Câu 35: Thành phần kinh tế nào sau đây được xác định là một động lực quan trọng của nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam hiện nay?
A. Kinh tế nhà nước.
B. Kinh tế tập thể.
*C. Kinh tế tư nhân.
D. Kinh tế có vốn đầu tư nước ngoài.

Gt: Theo Nghị quyết Đại hội XIII của Đảng, kinh tế tư nhân được xác định là một động lực quan trọng của nền kinh tế thị trường định hướng XHCN ở Việt Nam.

Câu 36: Luận giải nào sau đây không đúng về tính tất yếu khách quan của việc phát triển kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?
A. Phát triển kinh tế thị trường định hướng xã hội chủ nghĩa là phù hợp với xu hướng phát triển khách quan của Việt Nam trong bối cảnh thế giới hiện nay.
B. Do tính ưu việt của kinh tế thị trường trong thúc đẩy phát triển Việt Nam theo định hướng xã hội chủ nghĩa.
C. Kinh tế thị trường định hướng xã hội chủ nghĩa phù hợp với nguyện vọng, mong muốn của nhân dân Việt Nam.
*D. Kinh tế thị trường là mục tiêu của chủ nghĩa xã hội.

Gt: Kinh tế thị trường không phải là mục tiêu mà là phương tiện, công cụ để xây dựng CNXH. Mục tiêu của CNXH là "dân giàu, nước mạnh, dân chủ, công bằng, văn minh". Đây là luận giải không đúng.

Câu 37: Nội dung nào sau đây không phản ánh đặc trưng của kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?
A. Kinh tế thị trường định hướng xã hội chủ nghĩa hướng tới thực hiện mục tiêu "dân giàu, nước mạnh, dân chủ, công bằng, văn minh".
B. Kinh tế thị trường định hướng xã hội chủ nghĩa là nền kinh tế có nhiều hình thức sở hữu, nhiều thành phần kinh tế, trong đó kinh tế nhà nước giữ vai trò chủ đạo.
C. Kinh tế thị trường định hướng xã hội chủ nghĩa gắn tăng trưởng kinh tế với công bằng xã hội.
*D. Kinh tế thị trường định hướng xã hội chủ nghĩa xây dựng trên nền tảng sở hữu tư nhân về tư liệu sản xuất.

Gt: KTTT định hướng XHCN ở Việt Nam xây dựng trên nền tảng sở hữu toàn dân (đất đai, tài nguyên) và sở hữu nhà nước đóng vai trò chủ đạo, không phải nền tảng sở hữu tư nhân như CNTB. Đây là nội dung không phản ánh đặc trưng.

Câu 38: Mục tiêu của công nghiệp hoá, hiện đại hoá nền kinh tế quốc dân ở Việt Nam là nhằm xây dựng
A. kinh tế thị trường.
*B. chủ nghĩa xã hội.
C. kinh tế tri thức.
D. đội ngũ tri thức.

Gt: CNH, HĐH ở Việt Nam nhằm mục tiêu tổng quát là xây dựng chủ nghĩa xã hội - tạo nền tảng vật chất kỹ thuật cho chế độ xã hội chủ nghĩa.

Câu 39: Cách mạng công nghiệp lần thứ tư làm thay đổi hệ thống sản xuất, chuyển sản xuất từ
A. tập trung sang độc quyền.
B. cạnh tranh sang độc quyền.
C. phân cấp sang tập trung.
*D. tập trung sang phân cấp.

Gt: Cách mạng công nghiệp lần thứ tư (với AI, IoT, in 3D...) cho phép sản xuất linh hoạt, phi tập trung hoá, chuyển từ mô hình sản xuất tập trung sang phân cấp (sản xuất phân tán, cá nhân hoá).

Câu 40: Chủ thể làm lực lượng nòng cốt của hội nhập quốc tế là
A. các cơ quan quản lý nhà nước.
*B. đội ngũ trí thức.
C. giai cấp công nhân.
D. doanh nghiệp và đội ngũ doanh nhân.

Gt: Đội ngũ trí thức là lực lượng nòng cốt trong hội nhập quốc tế, có vai trò tiên phong trong tiếp thu, ứng dụng khoa học công nghệ và tri thức toàn cầu vào phát triển đất nước.
`
        }
];

let exam=[], submitted=false, timeLeft=3600, timerID=null, answered=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function parse(text, src){
    return text.trim().split(/(?=Câu \d+:)/).filter(b=>b.trim()).map(block=>{
        const lines=block.trim().split('\n');
        const q=lines[0].replace(/Câu \d+:\s*/,'').trim();
        const opts=[]; let ci=-1, ex='';
        lines.forEach(l=>{
            l=l.trim();
            if(/^[*]?[A-D]\./.test(l)){if(l.startsWith('*'))ci=opts.length;opts.push(l.replace('*','').replace(/^[A-D]\.\s*/,'').trim())}
            else if(l.startsWith('Gt:'))ex=l.replace('Gt:','').trim();
        });
        if(!q||opts.length<2||ci===-1)return null;
        return{q,opts,ci,ex,src};
    }).filter(Boolean);
}

function getPool(){
    const v=document.getElementById('sel-src').value;
    let pool=[];
    if(v==='all') database.forEach(p=>pool=pool.concat(parse(p.content,p.name)));
    else{const p=database[+v];pool=parse(p.content,p.name)}
    return pool;
}

function updateStat(){
    const n=getPool().length;
    document.getElementById('stat-badge').textContent=n+' câu trong NHCH';
}

function shuffleOptions(q){
    const idx=q.opts.map((_,i)=>i);
    shuffle(idx);
    const opts=idx.map(i=>q.opts[i]);
    const ci=idx.indexOf(q.ci);
    return{q:q.q, opts, ci, ex:q.ex, src:q.src};
}

function generateExam(){
    const n=Math.min(+document.getElementById('sel-num').value||60, 9999);
    const mins=+document.getElementById('sel-time').value||60;
    let pool=getPool(); shuffle(pool);
    exam=pool.slice(0,Math.min(n,pool.length)).map(shuffleOptions);
    submitted=false; answered=0;
    clearInterval(timerID);
    timeLeft=mins*60;
    updateTimerDisp();
    document.getElementById('timer-wrap').classList.remove('warn');
    timerID=setInterval(()=>{
        if(submitted)return;
        timeLeft--;updateTimerDisp();
        if(timeLeft<=300)document.getElementById('timer-wrap').classList.add('warn');
        if(timeLeft<=0)submitExam();
    },1000);
    render();
}

function updateTimerDisp(){
    const m=String(Math.floor(timeLeft/60)).padStart(2,'0');
    const s=String(timeLeft%60).padStart(2,'0');
    document.getElementById('timer-disp').textContent=m+':'+s;
}

function render(){
    const qc=document.getElementById('q-container'), ng=document.getElementById('nav-grid');
    qc.innerHTML=''; ng.innerHTML='';
    exam.forEach((q,i)=>{
        const card=document.createElement('div'); card.className='q-card'; card.id='q-'+i;
        card.innerHTML=`
            <div class="q-num">Câu ${i+1} / ${exam.length}</div>
            <div class="q-src"><i class="fa-solid fa-tag"></i> ${q.src}</div>
            <div style="font-size:1.05rem">${q.q}</div>
            <div class="opts">${q.opts.map((o,oi)=>`
                <label class="opt" id="L-${i}-${oi}">
                    <input type="radio" name="q${i}" value="${oi}" onchange="markAns(${i})">
                    <div class="opt-l">${String.fromCharCode(65+oi)}</div>
                    <div class="opt-t">${o}</div>
                </label>`).join('')}
            </div>
            <div class="ex-box" id="ex-${i}"><b><i class="fa-solid fa-lightbulb" style="color:#f59e0b"></i> Giải thích:</b><br>${q.ex||'Không có giải thích.'}</div>`;
        qc.appendChild(card);
        const btn=document.createElement('div');
        btn.className='nav-btn'; btn.id='nav-'+i; btn.textContent=i+1;
        btn.onclick=()=>card.scrollIntoView({behavior:'smooth',block:'start'});
        ng.appendChild(btn);
    });
    updateProg();
    if(window.renderMathInElement) renderMathInElement(document.body,{delimiters:[{left:'$',right:'$',display:false}]});
}

function markAns(i){
    if(submitted)return;
    const btn=document.getElementById('nav-'+i);
    if(!btn.classList.contains('answered')){btn.classList.add('answered');answered++;updateProg()}
}

function updateProg(){
    const t=exam.length;
    document.getElementById('prog-text').textContent=answered+' / '+t+' câu đã trả lời';
    document.getElementById('prog-bar').style.width=(t>0?answered/t*100:0)+'%';
}

function submitExam(){
    if(submitted)return;
    if(!confirm('Bạn có chắc chắn muốn nộp bài?'))return;
    submitted=true; clearInterval(timerID);
    let ok=0,bad=0,skip=0;
    exam.forEach((q,i)=>{
        const sel=document.querySelector(`input[name="q${i}"]:checked`);
        document.getElementById('ex-'+i).classList.add('show');
        document.getElementById('L-'+i+'-'+q.ci).classList.add('ok');
        const nav=document.getElementById('nav-'+i);
        if(sel){
            const v=+sel.value;
            if(v===q.ci){ok++;nav.className='nav-btn correct'}
            else{bad++;nav.className='nav-btn wrong';document.getElementById('L-'+i+'-'+v).classList.add('bad')}
        } else{skip++;nav.className='nav-btn wrong'}
    });
    const t=exam.length, score=(ok/t*10).toFixed(1), pct=(ok/t*100).toFixed(0);
    document.getElementById('final-score').textContent=score;
    document.getElementById('r-ok').textContent=ok;
    document.getElementById('r-bad').textContent=bad;
    document.getElementById('r-skip').textContent=skip;
    document.getElementById('r-text').textContent='Đúng '+ok+'/'+t+' câu ('+pct+'%)';
    const color=ok/t>=0.5?'var(--blue)':'var(--bad)';
    document.getElementById('score-ring').style.background=`conic-gradient(${color} ${pct}%,#e5e7eb ${pct}%)`;
    document.getElementById('final-score').style.color=color;
    document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');window.scrollTo({top:0,behavior:'smooth'})}
function reloadExam(){document.getElementById('modal').classList.remove('open');generateExam();window.scrollTo({top:0,behavior:'smooth'})}

document.getElementById('sel-src').addEventListener('change',updateStat);
window.onload=()=>{updateStat();generateExam()};
</script>
