Gt: Mục đích của các tổ chức độc quyền khi định ra giá cả độc quyền là nhằm thu lợi nhuận độc quyền cao.
Câu 5: Chiếm tỷ lệ cổ phần khống chế là mục đích cạnh tranh
A. trong nội bộ ngành.
B. giữa các ngành.
*C. trong nội bộ các tổ chức độc quyền.
D. giữa các nền kinh tế.
Gt: Các thành viên trong tổ chức độc quyền cạnh tranh nhau để chiếm tỷ lệ cổ phần khống chế nhằm giành địa vị chi phối.
Câu 6: Các tổ chức độc quyền định ra giá cả độc quyền nhằm thu được
A. lợi nhuận siêu ngạch.
B. lợi nhuận bình quân.
C. lợi nhuận độc quyền tương đối.
*D. lợi nhuận độc quyền cao.
Gt: Tổ chức độc quyền ấn định giá cả độc quyền mua, độc quyền bán để thu lợi nhuận độc quyền cao.
Câu 7: Một sự thỏa hiệp hoặc một bên phá sản là kết quả cạnh tranh giữa các tổ chức độc quyền
A. giữa các ngành khác nhau.
B. tư nhân.
*C. trong cùng một ngành.
D. nhà nước.
Gt: Cạnh tranh giữa các tổ chức độc quyền trong cùng một ngành thường kết thúc bằng thỏa hiệp hoặc một bên bị phá sản.
Câu 8: Độc quyền mua nguyên liệu đầu vào, độc quyền phương tiện vận tải, tín dụng... là một số biện pháp cạnh tranh mà tổ chức độc quyền thường áp dụng đối với các doanh nghiệp
*A. ngoài độc quyền.
B. độc quyền tư nhân.
C. độc quyền nhà nước.
D. ngoài nhà nước.
Gt: Các tổ chức độc quyền thôn tính doanh nghiệp ngoài độc quyền bằng cách chèn ép nguồn nguyên liệu, vận tải và tín dụng.
Câu 9: Trong nền kinh tế thị trường, loại cạnh tranh nào sau đây không phải là cạnh tranh giữa các tổ chức độc quyền?
A. Cạnh tranh giữa các tổ chức độc quyền với các doanh nghiệp ngoài độc quyền.
*B. Cạnh tranh giữa các tổ chức độc quyền với các doanh nghiệp vừa và nhỏ.
C. Cạnh tranh giữa các tổ chức độc quyền với nhau.
D. Cạnh tranh trong nội bộ các tổ chức độc quyền.
Gt: Cạnh tranh của các tổ chức độc quyền gồm ba loại: với doanh nghiệp ngoài độc quyền, với nhau, và trong nội bộ tổ chức độc quyền.
Câu 10: Mục đích cạnh tranh trong nội bộ các tổ chức độc quyền là để
A. hỗ trợ nhau.
B. thôn tính nhau.
*C. chiếm tỷ lệ cổ phần khống chế.
D. hợp tác với nhau.
Gt: Các thành viên cạnh tranh để chiếm tỷ lệ cổ phần khống chế nhằm chi phối và phân chia lợi ích có lợi hơn.
Câu 11: Sự phát triển của hệ thống tín dụng trở thành đòn bẩy thúc đẩy tập trung sản xuất, tạo tiền đề cho sự ra đời của
A. các tổ chức tài chính.
*B. các tổ chức độc quyền.
C. độc quyền nhà nước.
D. độc quyền ngân hàng.
Gt: Hệ thống tín dụng thúc đẩy hình thành các công ty cổ phần, tạo tiền đề cho sự ra đời của các tổ chức độc quyền.
Câu 12: Một trong những nguyên nhân hình thành độc quyền nhà nước trong nền kinh tế thị trường tư bản chủ nghĩa là
A. sự cạnh tranh gay gắt.
*B. xu hướng quốc tế hóa đời sống kinh tế.
C. sự phát triển của hệ thống tín dụng.
D. khủng hoảng kinh tế trong chủ nghĩa tư bản.
Gt: Quốc tế hóa đời sống kinh tế là một trong những nguyên nhân đòi hỏi sự can thiệp và hình thành độc quyền nhà nước.
Câu 13: Độc quyền không có tác động nào sau đây đối với nền kinh tế?
A. Tăng năng suất lao động.
B. Nâng cao năng lực cạnh tranh của các tổ chức độc quyền.
C. Thúc đẩy nền kinh tế phát triển theo hướng sản xuất lớn hiện đại.
*D. Bảo vệ lợi ích người tiêu dùng.
Gt: Độc quyền gây tác động tiêu cực và gây thiệt hại trực tiếp cho người tiêu dùng.
Câu 14: Một trong những tác động tích cực của độc quyền đối với nền kinh tế là
A. bảo vệ lợi ích người tiêu dùng.
B. giảm bớt sự cạnh tranh, tạo điều kiện cho doanh nghiệp phát triển.
*C. thúc đẩy nền kinh tế phát triển theo hướng sản xuất lớn hiện đại.
D. giảm sự phân hóa giàu nghèo.
Gt: Độc quyền tạo ra sức mạnh kinh tế to lớn góp phần thúc đẩy sản xuất lớn hiện đại.
Câu 15: Một trong những nguyên nhân hình thành độc quyền nhà nước trong nền kinh tế thị trường tư bản chủ nghĩa là
A. sự cạnh tranh gay gắt.
*B. sự phát triển của phân công lao động xã hội.
C. sự phát triển của hệ thống tín dụng.
D. khủng hoảng kinh tế trong chủ nghĩa tư bản.
Gt: Phân công lao động xã hội phát triển làm xuất hiện một số ngành quy mô lớn cần sự quản lý của nhà nước.
Câu 16: Sự hình thành độc quyền nhà nước trong chủ nghĩa tư bản nhằm mục đích phục vụ lợi ích của
A. chủ nghĩa tư bản.
B. các tổ chức độc quyền nhà nước và tiếp tục duy trì, phát triển chủ nghĩa tư bản.
C. nhà nước tư sản.
*D. các tổ chức độc quyền tư nhân và tiếp tục duy trì, phát triển chủ nghĩa tư bản.
Gt: Độc quyền nhà nước hình thành nhằm phục vụ lợi ích của các tổ chức độc quyền tư nhân và duy trì hệ thống tư bản chủ nghĩa.
Câu 17: Độc quyền nhà nước trong chủ nghĩa tư bản là kiểu độc quyền trong đó nhà nước
A. tách biệt với độc quyền tư nhân.
B. chi phối độc quyền tư nhân.
C. cạnh tranh với độc quyền tư nhân trong các ngành thuộc kết cấu hạ tầng.
*D. nắm giữ vị thế độc quyền.
Gt: Độc quyền nhà nước là kiểu độc quyền trong đó bản thân nhà nước nắm giữ vị thế độc quyền ở những lĩnh vực nhất định.
Câu 18: Để ứng dụng những tiến bộ kỹ thuật mới vào sản xuất kinh doanh, các doanh nghiệp phải đẩy nhanh quá trình tích tụ và tập trung sản xuất, hình thành các doanh nghiệp quy mô lớn là một trong những nguyên nhân hình thành
*A. độc quyền.
B. lợi nhuận độc quyền.
C. giá cả độc quyền.
D. độc quyền nhà nước.
Gt: Yêu cầu ứng dụng tiến bộ khoa học kỹ thuật mới đòi hỏi vốn lớn, thúc đẩy tích tụ tập trung sản xuất và hình thành độc quyền.
Câu 19: Cạnh tranh gay gắt làm cho các doanh nghiệp bị phá sản hoặc suy yếu. Để tiếp tục phát triển, các doanh nghiệp còn tồn tại phải tăng cường tích tụ, tập trung sản xuất, liên kết với nhau thành các doanh nghiệp với quy mô ngày càng lớn hơn là một trong những nguyên nhân hình thành
A. lợi nhuận độc quyền.
B. giá cả độc quyền.
C. độc quyền nhà nước.
*D. độc quyền.
Gt: Cạnh tranh gay gắt dẫn đến sự thương lượng, liên kết giữa các doanh nghiệp lớn còn tồn tại để hình thành tổ chức độc quyền.
Câu 20: Hình thức đầu tư thông qua việc cho vay để thu lợi tức là
A. đầu tư trực tiếp.
*B. đầu tư gián tiếp.
C. đầu tư tư nhân.
D. đầu tư nhà nước.
Gt: Đầu tư gián tiếp là hình thức đầu tư không trực tiếp điều hành sản xuất mà thông qua việc cho vay để thu lợi tức.
Câu 21: Nhà kinh điển chủ nghĩa Mác Lênin nào sau đây đã khẳng định: "tự do cạnh tranh đẻ ra tập trung sản xuất và sự tập trung sản xuất này, khi phát triển tới một mức độ nhất định, lại dẫn đến độc quyền"?
A. C. Mác.
B. Ph. Ăngghen.
C. C. Mác và Ph. Ăngghen.
*D. V.I.Lênin.
Gt: C. Mác dự báo về xu hướng này, còn V.I. Lênin là người trực tiếp khẳng định và phát triển lý luận độc quyền từ luận điểm trên.
Câu 22: Lao động của công nhân làm việc trong các xí nghiệp độc quyền là một trong những nguồn gốc của
A. giá trị thặng dư.
B. giá trị thặng dư siêu ngạch.
*C. lợi nhuận độc quyền cao.
D. lợi nhuận siêu ngạch.
Gt: Thực chất nguồn gốc của lợi nhuận độc quyền cao có nguồn gốc căn bản từ lao động của công nhân trong các xí nghiệp độc quyền.
Câu 23: Lao động không công của công nhân làm việc trong các xí nghiệp ngoài độc quyền là một trong những nguồn gốc của
A. giá trị thặng dư.
*B. lợi nhuận độc quyền cao.
C. giá trị thặng dư siêu ngạch.
D. lợi nhuận siêu ngạch.
Gt: Nguồn gốc của lợi nhuận độc quyền cao bao gồm cả phần lao động không công của công nhân ở các xí nghiệp ngoài độc quyền bị thu tóm.
Câu 24: Giá cả độc quyền gồm có giá cả độc quyền cao và
*A. giá cả độc quyền thấp.
B. giá cả thị trường.
C. giá cả độc quyền trung bình.
D. giá cả sản xuất.
Gt: Giá cả độc quyền bao gồm giá cả độc quyền cao khi bán và giá cả độc quyền thấp khi mua.
Câu 25: Do chiếm được địa vị độc quyền, các tổ chức độc quyền áp đặt
A. giá cả thị trường.
B. giá cả sản xuất.
*C. giá cả độc quyền.
D. giá cả hàng hóa.
Gt: Khi nắm độc quyền sản xuất và tiêu thụ, các tổ chức này có khả năng áp đặt giá cả độc quyền trên thị trường.
Câu 26: Mục đích của xuất khẩu tư bản là để thu được giá trị thặng dư và
A. giải quyết lượng "tư bản thừa" trong nước.
B. giải quyết lượng hàng hóa thừa trong nước.
*C. các nguồn lợi nhuận khác ở nước nhập khẩu tư bản.
D. hỗ trợ nguồn lực cho các nước nhập khẩu tư bản phát triển.
Gt: Xuất khẩu tư bản nhằm mục đích tối thượng là thu về giá trị thặng dư và các nguồn lợi nhuận kinh tế khác từ nước tiếp nhận đầu tư.
Câu 27: Đặc quyền nhà nước trong chủ nghĩa tư bản là hình thức vận động mới của
A. nền kinh tế thị trường.
*B. quan hệ sản xuất tư bản chủ nghĩa.
C. lực lượng sản xuất.
D. chủ nghĩa tư bản cạnh tranh tự do.
Gt: Độc quyền nhà nước là nấc thang phát triển mới, hình thức vận động mới của quan hệ sản xuất tư bản chủ nghĩa.
Câu 28: Sở hữu trong độc quyền nhà nước là sự kết hợp
A. sở hữu của các doanh nghiệp nhà nước.
B. sở hữu nhà nước và sở hữu tư nhân.
*C. sở hữu nhà nước và sở hữu độc quyền tư nhân.
D. sở hữu của các tổ chức độc quyền quốc tế.
Gt: Bản chất sở hữu độc quyền nhà nước là sự tăng cường mối quan hệ và kết hợp giữa sở hữu nhà nước và sở hữu độc quyền tư nhân.
Câu 29: Đối với các tập đoàn độc quyền, thu được giá trị thặng dư và các nguồn lợi nhuận khác ở nước nhập khẩu tư bản là mục đích của
A. xuất khẩu hàng hóa.
*B. xuất khẩu tư bản.
C. nhập khẩu hàng hóa.
D. nhập khẩu tư bản.
Gt: Đưa tư bản ra nước ngoài tìm kiếm nơi đầu tư sinh lợi cao chính là hoạt động xuất khẩu tư bản.
Câu 30: Ngày nay, nhà nước tư sản không chỉ can thiệp vào nền sản xuất xã hội bằng thuế, luật pháp mà còn điều tiết bằng
A. cơ chế thị trường.
*B. các đòn bẩy kinh tế.
C. lực lượng quân sự.
D. hệ thống cơ quan hành chính nhà nước.
Gt: Nhà nước tư sản tăng cường điều tiết sâu rộng vào các khâu tái sản xuất bằng các đòn bẩy kinh tế.
Câu 31: Lý luận về độc quyền trong nền kinh tế thị trường là nghiên cứu của
*A. V.I. Lênin.
B. Ph. Ăngghen.
C. C. Mác.
D. C. Mác và Ph. Ăngghen.
Gt: V.I. Lênin là người có công phát triển toàn diện và hệ thống hóa lý luận về độc quyền và độc quyền nhà nước dưới chủ nghĩa tư bản.
Câu 32: Các tổ chức độc quyền trong nền kinh tế thị trường các nước tư bản chủ nghĩa xuất hiện vào khoảng thời gian nào sau đây?
A. Cuối thế kỷ XVII - đầu thế kỷ XVIII.
B. Cuối thế kỷ XVIII - đầu thế kỷ XIX.
*C. Cuối thế kỷ XIX - đầu thế kỷ XX.
D. Những năm giữa thế kỷ XX.
Gt: Các tổ chức độc quyền hình thành rõ nét và trở thành đặc trưng kinh tế vào giai đoạn cuối thế kỷ XIX - đầu thế kỷ XX.
Câu 33: Một trong những đặc điểm của độc quyền trong chủ nghĩa tư bản là
*A. sức mạnh của các tổ chức độc quyền do tư bản tài chính và hệ thống tài phiệt chi phối.
B. sự kết hợp về nhân sự giữa tổ chức độc quyền và nhà nước.
C. sự hình thành, phát triển sở hữu nhà nước.
D. sự điều tiết kinh tế của nhà nước tư sản.
Gt: Một trong 5 đặc điểm kinh tế của độc quyền là sức mạnh thuộc về sự chi phối của tư bản tài chính và tài phiệt.
Câu 34: Một trong những đặc điểm của độc quyền trong chủ nghĩa tư bản là
A. sự kết hợp về nhân sự giữa tổ chức độc quyền và nhà nước.
*B. các tổ chức độc quyền có quy mô tích tụ và tập trung tư bản lớn.
C. sự hình thành, phát triển sở hữu nhà nước.
D. sự điều tiết kinh tế của nhà nước tư sản.
Gt: Tập trung sản xuất dẫn đến các tổ chức độc quyền có quy mô tích tụ và tập trung tư bản rất lớn.
Câu 35: Một trong những đặc điểm của độc quyền trong chủ nghĩa tư bản là
A. sự kết hợp về nhân sự giữa tổ chức độc quyền và nhà nước.
B. sự hình thành, phát triển sở hữu nhà nước.
*C. xuất khẩu tư bản trở thành phổ biến.
D. sự điều tiết kinh tế của nhà nước tư sản.
Gt: Xuất khẩu tư bản trở thành phổ biến là một đặc điểm cốt lõi của độc quyền kinh tế giai đoạn này.
Câu 36: Một trong những đặc điểm của độc quyền trong chủ nghĩa tư bản là
A. sự kết hợp về nhân sự giữa tổ chức độc quyền và nhà nước.
B. sự hình thành, phát triển sở hữu nhà nước.
C. sự điều tiết kinh tế của nhà nước tư sản.
*D. cạnh tranh để phân chia thị trường thế giới là tất yếu giữa các tập đoàn độc quyền.
Gt: Các liên minh độc quyền hình thành và phân chia thị trường tiêu thụ, nguồn nguyên liệu trên phạm vi thế giới.
Câu 37: Một trong những đặc điểm của độc quyền trong chủ nghĩa tư bản là
*A. lôi kéo, thúc đẩy các chính phủ vào việc phân định khu vực lãnh thổ ảnh hưởng là cách thức để bảo vệ lợi ích độc quyền.
B. sự kết hợp về nhân sự giữa tổ chức độc quyền và nhà nước.
C. sự hình thành, phát triển sở hữu nhà nước.
D. sự điều tiết kinh tế của nhà nước tư sản.
Gt: Việc phân chia lãnh thổ ảnh hưởng chính trị, kinh tế giữa các cường quốc là để bảo vệ lợi ích cho các tập đoàn độc quyền.
Câu 38: Các tổ chức độc quyền có quy mô tích tụ và tập trung tư bản lớn là một trong những đặc điểm của
*A. độc quyền trong chủ nghĩa tư bản.
B. độc quyền nhà nước trong chủ nghĩa tư bản.
C. độc quyền tự nhiên.
D. độc quyền doanh nghiệp.
Gt: Đây là đặc điểm kinh tế đầu tiên của độc quyền trong giai đoạn phát triển của chủ nghĩa tư bản độc quyền.
Câu 39: Xét về hình thức, xuất khẩu tư bản được thực hiện dưới hai hình thức chủ yếu là
A. xuất khẩu tư bản tư nhân và xuất khẩu tư bản nhà nước.
B. xuất khẩu hàng hóa hữu hình và xuất khẩu hàng hóa vô hình.
*C. đầu tư trực tiếp và đầu tư gián tiếp.
D. đầu tư theo hình thức góp vốn và đầu tư thông qua việc cho vay.
Gt: Xét về hình thức đầu tư, xuất khẩu tư bản bao gồm đầu tư trực tiếp (FDI) và đầu tư gián tiếp.
Câu 40: Sự kết hợp về nhân sự giữa tổ chức độc quyền và nhà nước là một trong những đặc trưng kinh tế chủ yếu của
A. độc quyền trong chủ nghĩa tư bản.
B. độc quyền doanh nghiệp.
C. độc quyền tự nhiên.
*D. độc quyền nhà nước trong chủ nghĩa tư bản.
Gt: Sự kết hợp nhân sự (gài người vào bộ máy chính quyền) là đặc trưng của độc quyền nhà nước.
Câu 41: Về mặt lịch sử, các hình thức tổ chức độc quyền cơ bản phát triển từ thấp đến cao theo thứ tự
*A. Cartel - Syndicate - Trust - Consortium.
B. Syndicate - Trust - Cartel - Consortium.
C. Trust - Cartel - Syndicate - Consortium.
D. Cartel - Trust - Syndicate - Consortium.
Gt: Thứ tự phát triển các hình thức tổ chức độc quyền từ thấp đến cao lần lượt là cácten, xanhđica, tòrớt, coongxaócxiom.
Câu 42: Đặc điểm của các xí nghiệp tư bản tham gia Cartel là
*A. độc lập về sản xuất và lưu thông.
B. độc lập về sản xuất, phụ thuộc về lưu thông.
C. phụ thuộc về sản xuất và lưu thông.
D. phụ thuộc về sản xuất, độc lập về lưu thông.
Gt: Cartel là hình thức độc quyền thấp, các xí nghiệp tham gia chỉ thỏa thuận về giá cả, thị trường nhưng vẫn độc lập sản xuất và tiêu thụ.
Câu 43: Đặc điểm của các xí nghiệp tư bản tham gia Syndicate là
A. độc lập về sản xuất và lưu thông.
*B. độc lập về sản xuất, phụ thuộc về lưu thông.
C. phụ thuộc về sản xuất và lưu thông.
D. phụ thuộc về sản xuất, độc lập về lưu thông.
Gt: Trong Syndicate, các xí nghiệp giữ độc lập về sản xuất nhưng việc lưu thông hàng hóa (mua, bán) do ban quản trị chung đảm nhiệm.
Câu 44: Đặc điểm của các xí nghiệp tư bản tham gia Trust là
A. độc lập về sản xuất và lưu thông.
B. độc lập về sản xuất, phụ thuộc về lưu thông.
*C. phụ thuộc về sản xuất và lưu thông.
D. phụ thuộc về sản xuất, độc lập về lưu thông.
Gt: Trust là hình thức độc quyền cao hơn, các xí nghiệp mất tính độc lập cả về sản xuất lẫn lưu thông, do ban quản trị chung thống nhất quản lý.
Câu 45: Sự ra đời của tư bản tài chính là kết quả của sự hợp nhất giữa
A. độc quyền công nghiệp và độc quyền thương nghiệp.
B. độc quyền ngân hàng và độc quyền tài chính.
C. độc quyền thương nghiệp và độc quyền ngân hàng.
*D. độc quyền ngân hàng với độc quyền công nghiệp.
Gt: Tư bản tài chính hình thành do sự liên kết, xâm nhập và hợp nhất giữa tư bản ngân hàng độc quyền và tư bản công nghiệp độc quyền.
Câu 46: Sự xuất hiện, phát triển của các tổ chức độc quyền trong ngân hàng đã làm thay đổi quan hệ giữa các ngân hàng và doanh nghiệp công nghiệp, làm cho ngân hàng có vai trò mới là
A. xuất khẩu tư bản.
B. phát triển hoạt động đầu tư trong nền kinh tế tư bản chủ nghĩa.
C. trở thành trung tâm thanh toán và tín dụng.
*D. khống chế mọi hoạt động của nền kinh tế - xã hội.
Gt: Ngân hàng độc quyền nắm giữ hầu hết tư bản tiền tệ nên có vai trò vạn năng, khống chế các hoạt động sản xuất kinh doanh của xã hội.
Câu 47: Lôi kéo, thúc đẩy các chính phủ vào việc phân định khu vực lãnh thổ ảnh hưởng là cách thức
A. thi hành chính sách thực dân mới.
B. để bảo vệ lợi ích nhà nước.
*C. để bảo vệ lợi ích độc quyền.
D. thi hành chính sách kinh tế mới.
Gt: Các tổ chức độc quyền sử dụng sức mạnh chính trị của chính phủ để phân chia lãnh thổ thế giới nhằm mục đích bảo vệ lợi ích kinh tế độc quyền.
Câu 48: Các tài phiệt thực hiện sự thống trị của mình thông qua
A. cơ chế thị trường.
B. thị trường chứng khoán.
C. chế độ "ủy quyền".
*D. chế độ "tham dự".
Gt: Hệ thống tài phiệt thống trị kinh tế bằng "chế độ tham dự", thông qua việc sở hữu số lượng cổ phần khống chế ở các công ty mẹ, công ty con.
Câu 49: Các tổ chức độc quyền của các quốc gia cạnh tranh trên thị trường quốc tế sẽ dẫn đến xu hướng
*A. thỏa hiệp với nhau hình thành các liên minh độc quyền quốc tế.
B. thôn tính nhau để hình thành các tổ chức độc quyền quốc tế.
C. đấu tranh không khoan nhượng.
D. một số tổ chức độc quyền bị phá sản.
Gt: Cạnh tranh quốc tế khốc liệt buộc các tổ chức độc quyền của các nước phải thỏa hiệp để thành lập các liên minh độc quyền quốc tế.
Câu 50: Cơ chế điều tiết kinh tế độc quyền nhà nước là sự dung hợp của những cơ chế nào sau đây?
*A. Thị trường, độc quyền tư nhân và điều tiết của nhà nước.
B. Thị trường và độc quyền tư nhân.
C. Thị trường, độc quyền nhà nước và điều tiết của nhà nước.
D. Độc quyền tư nhân và độc quyền nhà nước.
Gt: Cơ chế điều tiết của độc quyền nhà nước là sự dung hợp cả ba cơ chế: thị trường, độc quyền tư nhân và sự can thiệp của nhà nước tư sản.
Câu 51: Nhà nước tư sản đứng ra đảm nhận phát triển các ngành
A. vốn đầu tư nhỏ, thu hồi vốn nhanh và lợi nhuận cao.
B. vốn đầu tư lớn, thu hồi vốn chậm và lợi nhuận cao.
C. vốn đầu tư lớn, thu hồi vốn nhanh và ít lợi nhuận.
*D. vốn đầu tư lớn, thu hồi vốn chậm và ít lợi nhuận.
Gt: Nhà nước đứng ra phát triển các ngành kết cấu hạ tầng có vốn lớn, sinh lời chậm vì các tổ chức độc quyền tư nhân không muốn hoặc không thể đầu tư.
Câu 52: Trong những thập kỷ gần đây, xuất khẩu tư bản chủ yếu theo hướng
*A. các nước tư bản phát triển xuất khẩu qua lại lẫn nhau.
B. nước tư bản phát triển xuất khẩu sang các nước kém phát triển.
C. các nước kém phát triển xuất khẩu qua lại lẫn nhau.
D. nước tư bản phát triển xuất khẩu sang các nước kém phát triển và sang một số nước tư bản phát triển.
Gt: Hiện nay, phần lớn dòng đầu tư của xuất khẩu tư bản dịch chuyển qua lại giữa các quốc gia tư bản phát triển với nhau.
Câu 53: Từ cuối thế kỷ XX đến nay, cơ chế thống trị của tư bản tài chính được thực hiện thông qua "chế độ tham dự" bổ sung thêm
A. sự điều tiết của nhà nước tư sản.
B. sự tham gia của các tổ chức tài chính quốc tế.
*C. chế độ ủy nhiệm.
D. chế độ giao nhận.
Gt: Sự phát triển của thị trường tài chính hiện đại làm cho "chế độ tham dự" của tài phiệt được bổ sung thêm "chế độ ủy nhiệm".
Câu 54: Ngày nay, sự phân chia thị trường thế giới giữa các liên minh độc quyền có biểu hiện mới là xu hướng quốc tế hóa, toàn cầu hóa kinh tế ngày càng tăng bên cạnh xu hướng
*A. khu vực hóa nền kinh tế.
B. hợp tác hóa kinh tế.
C. đa dạng hóa quan hệ kinh tế.
D. đa phương hóa quan hệ kinh tế.
Gt: Sự phân chia thị trường thế giới ngày nay gắn liền với xu hướng toàn cầu hóa và khu vực hóa kinh tế (hình thành các khối liên minh kinh tế khu vực).
Câu 55: Ở các nước tư bản phát triển hiện nay, bên cạnh các tổ chức độc quyền lớn ngày càng xuất hiện nhiều doanh nghiệp
A. nhà nước.
*B. vừa và nhỏ.
C. tư nhân.
D. nước ngoài.
Gt: Doanh nghiệp vừa và nhỏ phát triển mạnh mẽ bên cạnh tập đoàn lớn vì có ưu thế về sự năng động, linh hoạt và ứng dụng công nghệ mới.
Câu 56: Hiện nay, sự phân chia thế giới về lãnh thổ giữa các cường quốc tư bản
A. đã chấm dứt.
B. đang dần mất đi.
C. vẫn tiếp tục dưới những hình thức phân chia mới.
*D. vẫn tiếp tục dưới những hình thức cạnh tranh và thống trị mới.
Gt: Cuộc chiến phân chia lãnh thổ và vùng ảnh hưởng ngày nay vẫn tiếp diễn dưới các hình thức tinh vi như chiến tranh thương mại, cạnh tranh công nghệ.
Câu 57: Sự phát triển của trình độ dân trí và quy luật cạnh tranh trong xã hội tư bản ngày nay dẫn tới sự thay đổi về
A. hoạt động xuất khẩu tư bản của nhà nước.
B. cạnh tranh kinh tế giữa nhà nước và độc quyền tư nhân.
*C. quan hệ nhân sự trong bộ máy chính quyền nhà nước.
D. chính sách giáo dục của nhà nước.
Gt: Cạnh tranh và dân trí cao làm thay đổi cơ chế lựa chọn chính trị gia, kéo theo sự thay đổi về mặt quan hệ nhân sự trong bộ máy chính trị tư sản.
Câu 58: Nguyên tắc nào sau đây được đề cao trong biểu hiện mới của xuất khẩu tư bản hiện nay?
*A. Cùng có lợi trong đầu tư.
B. Tôn trọng lẫn nhau.
C. Hợp tác đa phương.
D. Hợp tác bình đẳng.
Gt: Xuất khẩu tư bản hiện nay chú trọng hình thức hợp tác kinh tế song phương hoặc đa phương dựa trên nguyên tắc các bên cùng có lợi.
Câu 59: Kết quả hoạt động của các tập đoàn tài chính quốc tế trong chủ nghĩa tư bản hiện đại dẫn tới sự ra đời của các
A. nhà tài phiệt quốc tế.
B. công ty xuyên quốc gia.
C. ngân hàng quốc tế.
*D. trung tâm tài chính của thế giới.
Gt: Hoạt động toàn cầu của các tập đoàn tài chính lớn thúc đẩy việc hình thành các trung tâm tài chính quốc tế như New York, London, Tokyo.
Câu 60: Một trong những hình thức hình thành sở hữu nhà nước của độc quyền nhà nước trong chủ nghĩa tư bản là
A. nhận viện trợ của nước ngoài.
*B. nhà nước mua cổ phần của các doanh nghiệp tư nhân.
C. thu hồi tài sản của doanh nghiệp tư nhân.
D. đóng góp tự nguyện của các doanh nghiệp tư nhân.
Gt: Sở hữu nhà nước được mở rộng thông qua ngân sách mua lại toàn bộ hoặc một phần cổ phần tại các doanh nghiệp tư nhân.

C. Mô hình kinh tế thị trường phù hợp với nguyện vọng của nhân dân.
*D. Mô hình kinh tế này đã và đang là mục tiêu của nhân loại.
Gt: Tính tất yếu khách quan xuất phát từ sự phù hợp xu hướng khách quan, tính ưu việt của kinh tế thị trường và nguyện vọng của nhân dân; việc trở thành mục tiêu của nhân loại không phải lý do luận giải.
Câu 5: Một trong những tính tất yếu khách quan của việc phát triển kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là vì mô hình kinh tế này
A. phù hợp với sự phát triển của quan hệ sản xuất.
B. được nhiều nước trên thế giới lựa chọn.
*C. phù hợp với nguyện vọng của nhân dân.
D. đang được thử nghiệm theo mô hình kinh tế mới.
Gt: Kinh tế thị trường định hướng xã hội chủ nghĩa phù hợp với nguyện vọng mong muốn dân giàu, nước mạnh, dân chủ, công bằng, văn minh của người dân Việt Nam.
Câu 6: Một trong những tính tất yếu khách quan của việc phát triển kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là vì mô hình kinh tế này
*A. phù hợp với tính quy luật phát triển khách quan.
B. phù hợp với sự phát triển của quan hệ sản xuất.
C. được nhiều nước trên thế giới lựa chọn.
D. đang được thử nghiệm theo mô hình kinh tế mới.
Gt: Phát triển kinh tế thị trường định hướng xã hội chủ nghĩa là phù hợp với xu hướng phát triển khách quan của Việt Nam trong bối cảnh thế giới hiện nay.
Câu 7: Một trong những tính tất yếu khách quan của việc phát triển kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là do
A. phát triển theo mô hình kinh tế mới của thế giới.
*B. tính ưu việt của kinh tế thị trường trong thúc đẩy phát triển.
C. đây là mô hình kinh tế nhiều nước trên thế giới lựa chọn.
D. thử nghiệm theo mô hình kinh tế mới.
Gt: Do tính ưu việt của kinh tế thị trường trong thúc đẩy phát triển Việt Nam theo định hướng xã hội chủ nghĩa.
Câu 8: Nội dung nào sau đây không luận giải về tính tất yếu khách quan của việc phát triển kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?
A. Phù hợp với quy luật phát triển khách quan.
B. Do tính ưu việt của kinh tế thị trường mang lại.
C. Mô hình kinh tế này phù hợp với nguyện vọng của nhân dân.
*D. Mô hình này đã và đang là mục tiêu của nhân loại.
Gt: Các nội dung A, B, C đều luận giải về tính tất yếu khách quan, nội dung D không thuộc phần luận giải này.
Câu 9: Quan hệ nào sau đây không phải là quan hệ lợi ích kinh tế cơ bản trong nền kinh tế thị trường?
A. Quan hệ lợi ích giữa người lao động và người sử dụng lao động.
B. Quan hệ lợi ích giữa những người sử dụng lao động.
C. Quan hệ giữa lợi ích cá nhân, lợi ích nhóm và lợi ích xã hội.
*D. Quan hệ giữa Đảng, Nhà nước và nhân dân.
Gt: Quan hệ giữa Đảng, Nhà nước và nhân dân là quan hệ thuộc hệ thống chính trị, không nằm trong các quan hệ lợi ích kinh tế cơ bản của nền kinh tế thị trường.
Câu 10: Trong nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam, kinh tế nhà nước, kinh tế tập thể cùng với kinh tế tư nhân là nòng cốt để phát triển một nền kinh tế
A. bền vững.
*B. độc lập, tự chủ.
C. tiến bộ.
D. tiên tiến, hiện đại.
Gt: Theo định hướng, các thành phần kinh tế này phối hợp làm nòng cốt để xây dựng nền kinh tế độc lập, tự chủ.
Câu 11: Nội dung nào sau đây không phải là lý do phải hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?
A. Thể chế kinh tế thị trường định hướng xã hội chủ nghĩa còn chưa đồng bộ.
*B. Thể chế kinh tế thị trường định hướng xã hội chủ nghĩa không phù hợp.
C. Hệ thống thể chế chưa đầy đủ.
D. Hệ thống thể chế còn kém hiệu lực, hiệu quả, thiếu các yếu tố thị trường và các loại thị trường.
Gt: Hệ thống thể chế hiện tại cần hoàn thiện vì chưa đồng bộ, chưa đầy đủ và kém hiệu lực, chứ không phải do mô hình này không phù hợp với Việt Nam.
Câu 12: Một trong những lý do phải hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là thể chế kinh tế thị trường định hướng xã hội chủ nghĩa
*A. còn chưa đồng bộ.
B. không phù hợp.
C. khác với các nước trên trên thế giới.
D. còn mới mẻ.
Gt: Thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở nước ta còn hạn chế là chưa đồng bộ, nên cần phải hoàn thiện.
Câu 13: Một trong những lý do phải hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là hệ thống thể chế
A. không phù hợp.
*B. chưa đầy đủ.
C. khác với các nước trên trên thế giới.
D. còn mới mẻ.
Gt: Một trong những lý do khách quan cần hoàn thiện là do hệ thống thể chế kinh tế của chúng ta hiện nay chưa đầy đủ.
Câu 14: Một trong những lý do phải hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là hệ thống thể chế
A. không phù hợp với điều kiện của đất nước.
B. khác với các nước trên trên thế giới.
*C. còn kém hiệu lực, hiệu quả, thiếu các yếu tố thị trường và các loại thị trường.
D. còn mới mẻ, chưa thật sự phù hợp với điều kiện kinh tế, chính trị, xã hội.
Gt: Lý do cần hoàn thiện xuất phát từ việc hệ thống thể chế cũ vận hành còn kém hiệu lực, hiệu quả và chưa đồng bộ các loại thị trường.
Câu 15: Nội dung nào sau đây không phải là nội dung hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?
A. Hoàn thiện thể chế về sở hữu, phát triển các thành phần kinh tế, các loại hình doanh nghiệp.
B. Hoàn thiện thể chế để phát triển đồng bộ các yếu tố thị trường và các loại thị trường.
*C. Hoàn thiện thể chế mới cho phù hợp với điều kiện phát triển của đất nước.
D. Hoàn thiện thể chế, đẩy mạnh, nâng cao năng lực lãnh đạo của Đảng và hệ thống chính trị.
Gt: Các nội dung A, B, D đều là các định hướng hoàn thiện thể chế cụ thể, phương án C là phát biểu chung chung và không nằm trong các nội dung lớn của giáo trình.
Câu 16: Một trong những nội dung hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là hoàn thiện thể chế
*A. để phát triển đồng bộ các yếu tố thị trường và các loại thị trường.
B. cho phù hợp với điều kiện phát triển của đất nước.
C. để tăng trưởng kinh tế.
D. để phát triển văn hóa.
Gt: Hoàn thiện thể chế phát triển đồng bộ các yếu tố thị trường và các loại thị trường là một trong bốn nội dung cốt lõi.
Câu 17: Một trong những nội dung hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là hoàn thiện thể chế gắn kết tăng trưởng kinh tế với bảo đảm phát triển bền vững, tiến bộ và công bằng xã hội, thúc đẩy
A. mở rộng hoạt động kinh tế đối ngoại.
B. nền sản xuất phát triển.
*C. hội nhập quốc tế.
D. phát triển kinh tế, chính trị, văn hóa.
Gt: Nội dung hoàn chỉnh là hoàn thiện thể chế gắn kết tăng trưởng kinh tế với bảo đảm phát triển bền vững, tiến bộ và công bằng xã hội và thúc đẩy hội nhập quốc tế.
Câu 18: Nội dung nào sau đây không phải là nội dung hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?
A. Hoàn thiện thể chế về sở hữu, phát triển các thành phần kinh tế, các loại hình doanh nghiệp.
B. Hoàn thiện thể chế để phát triển đồng bộ các yếu tố thị trường và các loại thị trường.
C. Hoàn thiện thể chế, đẩy mạnh, nâng cao năng lực lãnh đạo của Đảng và hệ thống chính trị.
*D. Hoàn thiện thể chế kinh tế, chính trị, văn hoá, xã hội.
Gt: Hoàn thiện thể chế ở đây tập trung vào khía cạnh kinh tế thị trường định hướng xã hội chủ nghĩa, không bao gồm toàn bộ hệ thống văn hóa chính trị xã hội diện rộng như phương án D.
Câu 19: Một trong những nội dung hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là hoàn thiện thể chế
A. nâng cao năng lực cạnh tranh.
B. thúc đẩy sản xuất phát triển.
C. nâng cao vị thế Việt Nam trên trường quốc tế.
*D. đẩy mạnh, nâng cao năng lực lãnh đạo của Đảng và hệ thống chính trị.
Gt: Hoàn thiện thể chế, đẩy mạnh, nâng cao năng lực lãnh đạo của Đảng và hệ thống chính trị là một nội dung quan trọng được nêu trong giáo trình.
Câu 20: Một trong những nội dung hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là hoàn thiện thể chế về
*A. sở hữu, phát triển các thành phần kinh tế, các loại hình doanh nghiệp.
B. bảo đảm tạo việc làm cho người lao động.
C. mở rộng hoạt động kinh tế đối ngoại.
D. nâng cao năng lực cạnh tranh.
Gt: Nội dung hàng đầu là hoàn thiện thể chế về sở hữu, phát triển các thành phần kinh tế và các loại hình doanh nghiệp.
Câu 21: Trong điều kiện cơ chế thị trường, quan điểm của Đảng và Nhà nước ta xác định vai trò của lợi ích kinh tế là
A. nguyện vọng của các chủ thể kinh tế.
B. trách nhiệm của các chủ thể kinh tế.
*C. động lực trực tiếp của các chủ thể và hoạt động kinh tế xã hội.
D. quyền lợi của các chủ thể kinh tế.
Gt: Lợi ích kinh tế giữ vai trò là động lực trực tiếp thúc đẩy các chủ thể tham gia vào các hoạt động kinh tế - xã hội.
Câu 22: Sự khác biệt cơ bản giữa kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam với kinh tế thị trường tư bản chủ nghĩa là
A. tồn tại nhiều hình thức sở hữu, nhiều thành phần kinh tế.
B. có sự điều tiết của Nhà nước.
C. tồn tại nhiều hình thức phân phối.
*D. xây dựng trên nền tảng chế độ công hữu về những tư liệu sản xuất chủ yếu.
Gt: Khác biệt cốt lõi nằm ở quan hệ sở hữu; kinh tế thị trường định hướng xã hội chủ nghĩa lấy chế độ công hữu về các tư liệu sản xuất chủ yếu làm nền tảng, còn kinh tế tư bản chủ nghĩa dựa trên tư hữu.
Câu 23: Lý do trực tiếp trong nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam hiện nay tồn tại nhiều thành phần kinh tế vì
*A. tồn tại nhiều hình thức sở hữu tư liệu sản xuất.
B. tồn tại nhiều hình thức phân phối.
C. sự phát triển của lực lượng sản xuất.
D. sự phát triển của quan hệ sản xuất.
Gt: Hình thức sở hữu quyết định thành phần kinh tế; do nước ta tồn tại nhiều hình thức sở hữu tư liệu sản xuất nên trực tiếp dẫn đến việc có nhiều thành phần kinh tế.
Câu 24: Vai trò của lợi ích kinh tế là
*A. động lực trực tiếp của các chủ thể kinh tế và hoạt động kinh tế - xã hội.
B. nguyện vọng của các chủ thể kinh tế.
C. trách nhiệm trực tiếp của các chủ thể kinh tế.
D. quyền lợi của các chủ thể kinh tế.
Gt: Theo giáo trình Kinh tế chính trị Mác - Lênin, lợi ích kinh tế đóng vai trò là động lực trực tiếp của các chủ thể và hoạt động kinh tế - xã hội.
Câu 25: Trong nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam, sở hữu nhà nước giữ vai trò
A. thống trị.
B. nền tảng.
*C. chủ đạo.
D. quan trọng.
Gt: Trong nền kinh tế nhiều thành phần ở Việt Nam, kinh tế nhà nước (dựa trên sở hữu nhà nước) giữ vai trò chủ đạo.
Câu 26: Trong nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam, sở hữu tư nhân
A. bị xem nhẹ và bị hạn chế phát triển.
*B. có vai trò quan trọng.
C. đóng vai trò chủ đạo.
D. là hình thức sở hữu thống trị.
Gt: Kinh tế tư nhân (dựa trên sở hữu tư nhân) được xác định là một động lực quan trọng của nền kinh tế.
Câu 27: Đặc trưng nào sau đây phản ánh thuộc tính quan trọng mang tính định hướng xã hội chủ nghĩa nền kinh tế thị trường ở Việt Nam?
A. Về mục tiêu.
B. Về quan hệ sở hữu và thành phần kinh tế.
C. Về quan hệ quản lý nền kinh tế và quan hệ phân phối.
*D. Về quan hệ giữa gắn tăng trưởng kinh tế với công bằng xã hội.
Gt: Gắn kết giữa tăng trưởng kinh tế với bảo đảm tiến bộ và công bằng xã hội ngay trong từng bước, từng chính sách phát triển là đặc trưng thể hiện rõ bản chất định hướng xã hội chủ nghĩa.
Câu 28: Những hình thức phân phối nào sau đây phản ảnh định hướng xã hội chủ nghĩa của nền kinh tế thị trường ở Việt Nam?
A. Phân phối công bằng các yếu tố sản xuất.
*B. Phân phối theo lao động và hiệu quả kinh tế, phân phối theo phúc lợi.
C. Phân phối theo vốn và tài sản.
D. Phân phối công bằng việc tiếp cận và sử dụng các cơ hội và điều kiện phát triển của mọi chủ thể kinh tế.
Gt: Thực hiện phân phối chủ yếu theo kết quả lao động, hiệu quả kinh tế, đồng thời theo mức đóng góp vốn cùng các nguồn lực khác và phân phối thông qua hệ thống an sinh xã hội, phúc lợi xã hội là đặc trưng của định hướng xã hội chủ nghĩa.

Câu 29: Nội dung nào sau đây không đúng khi nói về vai trò chủ đạo của kinh tế nhà nước trong nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?
*A. Kinh tế nhà nước nắm giữ hầu hết các ngành, các lĩnh vực trong nền kinh tế quốc dân.
B. Kinh tế nhà nước là đòn bẩy thúc đẩy nền kinh tế tăng trưởng nhanh, bền vững và giải quyết các vấn đề xã hội.
C. Kinh tế nhà nước hướng dẫn, mở đường, hỗ trợ các thành phần kinh tế khác phát triển.
D. Là lực lượng vật chất để Nhà nước quản lý, điều tiết nền kinh tế.

*D. Kinh tế chính trị cổ điển Anh.
Gt: Học thuyết kinh tế cổ điển Anh là nguồn gốc lý luận trực tiếp giúp C. Mác xây dựng lý luận kinh tế của mình.
Câu 404: Phát hiện ra các quy luật chi phối quan hệ giữa người với người trong sản xuất và trao đổi là mục đích nghiên cứu ở cấp độ cao nhất của
A. Chủ nghĩa trọng thương.
B. Chủ nghĩa trọng nông.
C. Kinh tế chính trị tầm thường.
*D. Kinh tế chính trị Mác - Lênin.
Gt: Mục đích nghiên cứu cao nhất của kinh tế chính trị Mác - Lênin là tìm ra các quy luật kinh tế chi phối quan hệ giữa con người trong nền sản xuất.
Câu 405: Phát hiện ra những nguyên lý và quy luật chi phối các quan hệ lợi ích giữa con người với con người trong sản xuất và trao đổi là giá trị khoa học của học thuyết kinh tế nào sau đây?
A. Chủ nghĩa trọng thương.
B. Chủ nghĩa trọng nông.
C. Kinh tế chính trị tầm thường.
*D. Kinh tế chính trị Mác - Lênin.
Gt: Kinh tế chính trị Mác - Lênin làm rõ các nguyên lý và quy luật khách quan chi phối hệ thống lợi ích kinh tế.
Câu 406: Chức năng thực tiễn của Kinh tế chính trị Mác - Lênin góp phần xây dựng tư duy và tầm nhìn, kỹ năng thực hiện các hoạt động kinh tế - xã hội trên mọi lĩnh vực ngành nghề của đời sống xã hội phù hợp với
A. thói quen cá nhân.
B. xu hướng chung của thế giới.
*C. quy luật khách quan.
D. sự quản lý của nhà nước.
Gt: Chức năng thực tiễn giúp cải tạo thế giới thông qua việc hành động dựa trên nhận thức đúng đắn về quy luật khách quan.
Câu 407: Nền kinh tế hàng hoá có thể hình thành và phát triển khi có các điều kiện là phân công lao động xã hội và
A. sự phụ thuộc lẫn nhau về mặt kinh tế giữa các chủ thể sản xuất.
B. sự phát triển của khoa học, kỹ thuật.
*C. sự tách biệt về mặt kinh tế của các chủ thể sản xuất.
D. sự phát triển của lực lượng sản xuất.
Gt: Sự tách biệt về mặt kinh tế giữa các chủ thể dựa trên quan hệ sở hữu là điều kiện đủ để sản xuất hàng hóa ra đời.
Câu 408: Giá trị hàng hoá biểu hiện mối quan hệ kinh tế giữa những người sản xuất, trao đổi hàng hoá và là phạm trù có tính
*A. lịch sử.
B. phổ biến.
C. đặc thù.
D. vĩnh viễn.
Gt: Giá trị là một phạm trù lịch sử vì nó chỉ tồn tại trong các nền kinh tế có sản xuất và trao đổi hàng hóa.
Câu 409: Theo C. Mác, sở dĩ hàng hoá có hai thuộc tính là do lao động của người sản xuất hàng hoá có tính hai mặt là lao động cụ thể và lao động
A. giản đơn.
B. phức tạp.
*C. trừu tượng.
D. cần thiết.
Gt: Lao động cụ thể tạo ra giá trị sử dụng còn lao động trừu tượng tạo ra giá trị của hàng hóa.
Câu 410: Cơ sở để so sánh, trao đổi các giá trị sử dụng khác nhau là lao động
*A. trừu tượng.
B. cụ thể.
C. giản đơn.
D. phức tạp.
Gt: Lao động trừu tượng là sự hao phí sức lao động nói chung, tạo nên giá trị đồng nhất làm cơ sở so sánh hàng hóa.
Câu 411: Mâu thuẫn giữa lao động cụ thể và lao động trừu tượng xuất hiện khi sản phẩm do những người sản xuất hàng hoá riêng biệt tạo ra không phù hợp
A. với nhu cầu cá nhân.
*B. nhu cầu xã hội.
C. thói quen tiêu dùng.
D. thị hiếu cá nhân.
Gt: Nếu sản phẩm không phù hợp với nhu cầu xã hội thì hao phí lao động cá biệt không được thừa nhận là lao động xã hội.
Câu 412: Theo yêu cầu của quy luật lưu thông tiền tệ, việc đưa số lượng tiền cần thiết cho lưu thông trong mỗi thời kỳ nhất định phải thống nhất với
A. sản xuất.
B. tiêu dùng.
C. nhu cầu cá nhân.
*D. lưu thông hàng hoá.
Gt: Số lượng tiền cần thiết phụ thuộc khách quan vào tổng giá cả hàng hóa được đưa vào lưu thông trong thời kỳ đó.
Câu 413: Quy luật kinh tế nào sau đây điều tiết quan hệ giữa bên bán và bên mua hàng hoá trên thị trường?
A. Giá trị.
*B. Cung - cầu.
C. Cạnh tranh.
D. Lưu thông tiền tệ.
Gt: Quy luật cung - cầu là quy luật trực tiếp điều tiết tỷ lệ giữa người bán và người mua, ảnh hưởng đến giá cả thị trường.
Câu 414: Quy luật kinh tế nào sau đây điều tiết một cách khách quan mối quan hệ ganh đua kinh tế giữa các chủ thể trong sản xuất và trao đổi hàng hoá?
A. Giá trị.
B. Cung - cầu.
*C. Cạnh tranh.
D. Lưu thông tiền tệ.
Gt: Cạnh tranh là cơ chế ganh đua giành các điều kiện thuận lợi nhằm thu lợi nhuận cao hơn của các chủ thể kinh tế.
Câu 415: Kết quả của cạnh tranh trong nội bộ ngành là hình thành
*A. giá trị thị trường.
B. giá trị sử dụng.
C. giá trị.
D. giá trị trao đổi.
Gt: Cạnh tranh giữa các doanh nghiệp cùng sản xuất một loại hàng hóa buộc giá trị cá biệt phải đưa về mức giá trị thị trường xã hội.
Câu 416: Thực hiện quản trị phát triển nền kinh tế thông qua việc tạo lập môi trường kinh tế tốt nhất cho các chủ thể kinh tế phát huy sức sáng tạo của họ là vai trò của
*A. nhà nước.
B. người tiêu dùng.
C. người sản xuất.
D. chủ thể trung gian.
Gt: Nhà nước quản lý vĩ mô nhằm kiến tạo môi trường thể chế thuận lợi cho nền kinh tế vận hành thông suốt.
Câu 417: Tiền trong nền sản xuất tư bản chủ nghĩa vận động theo công thức
A. H - H - T.
B. T - H - T.
*C. T - H - T'.
D. H - T - H'.
Gt: Tiền vận động với tư cách là tư bản có công thức chung là T - H - T' nhằm mục đích thu về số tiền lớn hơn.
Câu 418: Tiền biến thành tư bản khi được dùng để mang lại
A. giá trị sử dụng.
B. giá trị.
*C. giá trị thặng dư.
D. giá trị trao đổi.
Gt: Mục đích duy nhất của tư bản là sự lớn lên của giá trị, tức là tạo ra giá trị thặng dư.
Câu 419: Một trong những điều kiện để sức lao động trở thành hàng hóa là người lao động
A. muốn bán sức lao động.
B. có sức lao động.
*C. được tự do về thân thể.
D. có sức khỏe và trí tuệ.
Gt: Người lao động phải là người tự do mới có quyền sở hữu và bán quyền sử dụng sức lao động của mình.
Câu 420: Giá trị thặng dư trong nền kinh tế thị trường tư bản chủ nghĩa mang bản chất kinh tế - xã hội là quan hệ
A. xã hội.
B. trao đổi.
C. lợi ích.
*D. giai cấp.
Gt: Giá trị thặng dư phản ánh mối quan hệ bóc lột giai cấp giữa nhà tư bản và người công nhân làm thuê.
Câu 421: Xí nghiệp A có lượng tư bản đầu tư 200.000.000 đồng, cấu tạo hữu cơ của tư bản 4/1, tỷ suất giá trị thặng dư 100%. Vậy lượng giá trị mới là bao nhiêu?
A. 30.000.000 đồng.
B. 25.000.000 đồng.
*C. 80.000.000 đồng.
D. 40.000.000 đồng.
Gt: Tư bản khả biến v = 200tr / 5 = 40tr; m = 40tr * 100% = 40tr; giá trị mới v + m = 40tr + 40tr = 80 triệu đồng.
Câu 422: Bản chất của tích lũy tư bản là quá trình
*A. tái sản xuất mở rộng tư bản chủ nghĩa.
B. tái sản xuất giản đơn.
C. lưu thông hàng hoá.
D. lưu thông tiền tệ.
Gt: Tích lũy tư bản là biến một phần giá trị thặng dư thành tư bản phụ thêm để thực hiện tái sản xuất mở rộng.
Câu 423: Một trong những nhân tố chủ yếu ảnh hưởng đến quy mô tích lũy tư bản là
A. lao động cụ thể.
*B. năng suất lao động xã hội.
C. phân công lao động xã hội.
D. lao động trừu tượng.
Gt: Năng suất lao động xã hội tăng giúp làm giảm giá trị các yếu tố sản xuất, tăng khối lượng thặng dư để tích lũy.
Câu 424: Xí nghiệp A có chi phí tư bản 100.000.000 đồng, cấu tạo hữu cơ của tư bản 7/3, tỷ suất giá trị thặng dư 50%. Vậy giá trị cũ là bao nhiêu?
*A. 70.000.000 đồng.
B. 45.000.000 đồng.
C. 15.000.000 đồng.
D. 30.000.000 đồng.
Gt: Chi phí tư bản k = c + v = 100tr, cấu tạo hữu cơ c/v = 7/3 nên giá trị cũ chuyển vào (tư bản bất biến c) là 70 triệu đồng.
Câu 425: Phần giá trị của hàng hóa, bù lại giá cả của những tư liệu sản xuất đã tiêu dùng và giá cả của sức lao động đã được sử dụng để sản xuất ra hàng hóa ấy gọi là
*A. chi phí sản xuất.
B. chi phí hàng hóa.
C. tư bản bất biến.
D. tư bản khả biến.
Gt: Chi phí sản xuất tư bản chủ nghĩa (k = c + v) là chi phí về tư bản mà nhà tư bản bỏ ra để sản xuất hàng hóa.
Câu 426: Tiết kiệm tư bản bất biến là một trong những nhân tố ảnh hưởng đến
A. lợi nhuận bình quân.
B. tỷ suất lợi nhuận bình quân.
*C. tỷ suất lợi nhuận.
D. tỷ suất lợi tức.
Gt: Giảm bớt lượng chi phí cho tư bản bất biến c sẽ trực tiếp làm tăng tỷ suất lợi nhuận p' = m / (c + v).
Câu 427: Người bán không mất quyền sở hữu, người mua chỉ được quyền sử dụng trong một thời gian là đặc điểm của
*A. tư bản cho vay.
B. tư bản hàng hóa.
C. tư bản sản xuất.
D. tư bản thương nghiệp.
Gt: Tư bản cho vay được chuyển nhượng quyền sử dụng trong một thời hạn nhất định và người cho vay giữ nguyên quyền sở hữu.
Câu 428: Tổng số tư bản công nghiệp và tư bản thương nghiệp là 1.000.000.000 đồng, tỷ suất lợi nhuận bình quân 18%, lợi nhuận bình quân công nghiệp là 162.000.000 đồng. Vậy lợi nhuận bình quân của thương nghiệp là bao nhiêu?
*A. 18.000.000 đồng.
B. 180.000.000 đồng.
C. 14.800.000 đồng.
D. 148.000.000 đồng.
Gt: Tổng lợi nhuận bình quân = 1 tỷ * 18% = 180tr. Lợi nhuận thương nghiệp = 180tr - 162tr = 18 triệu đồng.
Câu 429: Cuộc khủng hoảng kinh tế nào sau đây dẫn tới hình thành các doanh nghiệp độc quyền?
A. 1914.
*B. 1873.
C. 1997.
D. 2008.
Gt: Cuộc khủng hoảng kinh tế thế giới năm 1873 làm phá sản hàng loạt doanh nghiệp nhỏ, đẩy nhanh tiến trình tích tụ và tập trung tư bản độc quyền.
Câu 430: Trong cơ cấu của độc quyền nhà nước trong chủ nghĩa tư bản, nhà nước đã trở thành
*A. một tập thế tư bản khổng lồ.
B. một doanh nghiệp độc quyền.
C. một nhà tư bản lớn.
D. một tổ chức xã hội.
Gt: Nhà nước tư sản sở hữu lượng tư bản công cộng cực lớn, hoạt động như một tập thể tư bản khổng lồ hỗ trợ các tổ chức độc quyền tư nhân.
Câu 431: Cạnh tranh giữa các tổ chức độc quyền và các xí nghiệp ngoài độc quyền nhằm
A. thôn tính, loại bỏ các xí nghiệp độc quyền.
B. hỗ trợ cho các xí nghiệp ngoài độc quyền phát triển.
C. mở rộng thị trường cho các xí nghiệp ngoài độc quyền.
*D. thôn tính, loại bỏ các xí nghiệp ngoài độc quyền.
Gt: Các tổ chức độc quyền dùng sức mạnh kinh tế để chèn ép, thôn tính hoặc tiêu diệt các đối thủ ngoài độc quyền.
Câu 432: Sự kết hợp về nhân sự giữa tổ chức độc quyền và nhà nước được thực hiện thông qua
A. thị trường.
B. hội đồng quản trị.
*C. các đảng phái.
D. doanh nghiệp.
Gt: Sự thâm nhập lẫn nhau về nhân sự giữa các tập đoàn và bộ máy nhà nước được thực hiện chủ yếu thông qua các đảng phái chính trị.
Câu 433: Các nhà tài phiệt sử dụng nhiều thủ đoạn như lập công ty mới, phát hành trái khoản, kinh doanh công trái, đầu cơ chứng khoán, đầu cơ ruộng đất để
*A. thu lợi nhuận độc quyền cao.
B. thu lợi nhuận độc quyền.
C. thu lợi nhuận siêu ngạch.
D. thu giá trị thặng dư siêu ngạch.
Gt: Đầu cơ và lũng đoạn thị trường là những thủ đoạn then chốt giúp các nhà tài phiệt thu được lợi nhuận độc quyền cao.
Câu 434: Quá trình hình thành những sự liên kết giữa các độc quyền theo cả hai chiều dọc và ngang, ở cả trong và ngoài nước dẫn đến sự ra đời của các
A. cartel và các syndicate.
B. syndicate và các trust.
C. trust và các cartel.
*D. concern và các conglomerate.
Gt: Sự liên kết đa ngành, đa lĩnh vực quy mô lớn dẫn tới các hình thức độc quyền hiện đại là concern và conglomerate.
Câu 435: Kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là nền kinh tế có nhiều hình thức sở hữu, nhiều thành phần kinh tế, trong đó kinh tế nhà nước giữ vai trò chủ đạo, kinh tế tư nhân là một động lực
A. quyết định.
B. cơ bản.
C. chủ đạo.
*D. quan trọng.
Gt: Đường lối của Đảng và Nhà nước Việt Nam xác định kinh tế tư nhân là một động lực quan trọng của nền kinh tế.
Câu 436: Hệ thống quy tắc, luật pháp, bộ máy quản lý và cơ chế vận hành nhằm điều chỉnh hành vi của các chủ thể kinh tế, các hành vi sản xuất kinh doanh và các quan hệ kinh tế gọi là
*A. thể chế kinh tế.
B. chế độ kinh tế.
C. quy luật kinh tế.
D. hệ thống kinh tế.
Gt: Thể chế kinh tế là hành lang pháp lý, tổ chức và cơ chế quản lý các hoạt động kinh tế.
Câu 437: Kiểm soát, ngăn ngừa các quan hệ lợi ích có ảnh hưởng tiêu cực đối với sự phát triển xã hội là vai trò của chủ thể nào sau đây trong bảo đảm hài hoà các quan hệ lợi ích?
A. Người sản xuất.
B. Người tiêu dùng.
*C. Nhà nước.
D. Chủ thể trung gian.
Gt: Nhà nước thực hiện chức năng kiểm soát xã hội để giảm thiểu các mâu thuẫn tiêu cực và phân phối lại lợi ích một cách hài hòa.
Câu 438: Nền kinh tế trong đó sự sản sinh ra, phổ biến và sử dụng tri thức giữ vai trò quyết định nhất đối với sự phát triển kinh tế, tạo ra của cải, nâng cao chất lượng cuộc sống là
A. kinh tế thị trường.
B. kinh tế tự cung tự cấp.
C. kinh tế hàng hóa.
*D. kinh tế tri thức.
Gt: Kinh tế tri thức lấy tri thức và công nghệ làm động lực sản xuất chính thay cho các tài nguyên truyền thống.
Câu 439: Mối quan hệ tỷ lệ giữa các ngành, các vùng và các thành phần kinh tế gọi là
A. thể chế kinh tế.
B. chế độ kinh tế.

Câu 9: Mức độ khẩn trương, tích cực của hoạt động lao động trong sản xuất được gọi là

*A. phân bố nguồn lực xã hội

C. phân phối sản phẩm lao động

Gt: Hoàn thiện thể chế sở hữu và các thành phần kinh tế là nền tảng cơ bản nhất trong phát triển kinh tế thị trường.

A. Trình độ phát triển của lực lượng sản xuất
*B. Phong tục tập quán, truyền thống văn hóa
C. Địa vị của chủ thể trong hệ thống quan hệ sản xuất xã hội
D. Chính sách phân phối thu nhập của Nhà nước
Gt: Phong tục tập quán có thể tác động tới hành vi tiêu dùng nhưng không quyết định trực tiếp đến bản chất quan hệ lợi ích kinh tế.
Câu 38: Tạo lập những điều kiện để có thể thực hiện chuyển đổi từ nền sản xuất xã hội lạc hậu sang nền sản xuất xã hội tiến bộ là một trong những nội dung
*A. công nghiệp hóa, hiện đại hóa ở Việt Nam
B. của cách mạng công nghiệp lần thứ tư
C. của cách mạng công nghiệp lần thứ ba
D. phát triển kinh tế tri thức ở Việt Nam
Gt: Công nghiệp hóa, hiện đại hóa nhằm mục tiêu cốt lõi là biến nền sản xuất thô sơ, lạc hậu thành nền sản xuất tiên tiến.
Câu 39: Thực hiện các nhiệm vụ để chuyển đổi nền sản xuất- xã hội lạc hậu sang nền sản xuất- xã hội hiện đại là một trong những nội dung
*A. công nghiệp hóa, hiện đại hóa ở Việt Nam
B. của cách mạng công nghiệp lần thứ tư
C. của cách mạng công nghiệp lần thứ ba
D. phát triển kinh tế tri thức ở Việt Nam
Gt: Nội dung cơ bản của công nghiệp hóa, hiện đại hóa là cải biến toàn bộ các ngành kinh tế theo hướng hiện đại.
Câu 40: Trong bối cảnh hội nhập kinh tế quốc tế, chủ thể nào sau đây dẫn dắt tiến trình hội nhập và hỗ trợ các chủ thể khác cũng tham gia sân chơi ở khu vực và toàn cầu?
A. Người dân
B. Công ty xuyên quốc gia
*C. Nhà nước
D. Doanh nghiệp có vốn đầu tư nước ngoài
Gt: Nhà nước đóng vai trò hoạch định đường lối ngoại giao, ký kết hiệp định và dẫn dắt các doanh nghiệp hội nhập toàn cầu.

            name: "Câu 481-520",
            content: `
Câu 481: Nhà kinh tế học nào sau đây là đại biểu tiêu biểu của Chủ nghĩa trọng thương?
*A. Thomas Mun
B. Boisguillebert
C. F. Quesney
D. Turgot
Gt: Thomas Mun là một trong những đại biểu xuất sắc và tiêu biểu nhất của chủ nghĩa trọng thương ở Anh.
Câu 482: Nhà kinh tế học nào sau đây là đại biểu tiêu biểu của Chủ nghĩa trọng thương?
A. Boisguillebert
B. F. Quesney
C. Turgot
*D. Willian Stafford
Gt: William Stafford là nhà kinh tế học tiêu biểu thuộc giai đoạn đầu (chủ nghĩa trọng tiền) của chủ nghĩa trọng thương ở Anh.
Câu 483: Kinh tế chính trị cổ điển Anh được hình thành, phát triển từ cuối thế kỷ XVIII đến nửa đầu thế kỷ XIX và kết thúc ở hệ thống lý luận có nhiều giá trị khoa học của
A. William Petty
B. A. Smith
*C. David Ricardo
D. Montchretien
Gt: David Ricardo là người kế thừa, phát triển và hoàn chỉnh hệ thống lý luận của trường phái kinh tế chính trị cổ điển Anh.
Câu 484: Quy luật kinh tế tồn tại khách quan, không phụ thuộc vào ý chí của con người. Con người có thể
A. thủ tiêu quy luật kinh tế
*B. nhận thức và vận dụng quy luật kinh tế
C. thay đổi quy luật kinh tế
D. điều chỉnh hoặc xoá bỏ quy luật kinh tế
Gt: Quy luật kinh tế mang tính khách quan nên con người không thể thay đổi hay tiêu hủy mà chỉ có thể nhận thức để hành động phù hợp.
Câu 485: Chính sách kinh tế tác động vào các quan hệ lợi ích và những sự tác động đó mang tính chất nào sau đây?
*A. Chủ quan
B. Khách quan
C. Mâu thuẫn
D. Đối lập
Gt: Chính sách kinh tế là sản phẩm chủ quan của con người (nhà nước) dựa trên việc nhận thức các quy luật khách quan.
Câu 486: Trên cơ sở nhận thức được mở rộng và ngày càng sâu sắc, người lao động hình thành được năng lực, kỹ năng vận dụng các quy luật kinh tế vào thực tiễn hoạt động lao động là nói đến chức năng nào sau đây của Kinh tế chính trị Mác Lênin?
A. Nhận thức
B. Tư tưởng
C. Phương pháp luận
*D. Thực tiễn
Gt: Chức năng thực tiễn thể hiện ở việc cải biến hoạt động sản xuất và vận dụng hiệu quả các quy luật kinh tế vào đời sống.
Câu 487: Năng lực sản xuất của người lao động, được tính bằng số lượng sản phẩm sản xuất ra trong một đơn vị thời gian được gọi là
A. cường độ lao động
B. lực lượng lao động
*C. năng suất lao động
D. đối tượng lao động.
Gt: Năng suất lao động phản ánh năng lực sản xuất của lao động, tính bằng lượng sản phẩm tạo ra trong một đơn vị thời gian.
Câu 488: Năng lực sản xuất của người lao động được tính bằng số lượng thời gian hao phí để sản xuất ra một đơn vị sản phẩm được gọi là
A. cường độ lao động
*B. năng suất lao động
C. lực lượng lao động
D. đối tượng lao động
Gt: Bên cạnh lượng sản phẩm trong một đơn vị thời gian, năng suất lao động còn được đo bằng thời gian cần thiết để sản xuất một sản phẩm.
Câu 489: Mức độ khẩn trương, tích cực của hoạt động lao động trong sản xuất được gọi là
*A. cường độ lao động
B. năng suất lao động
C. lực lượng lao động
D. đối tượng lao động.
Gt: Cường độ lao động biểu thị mức độ khẩn trương, căng thẳng hoặc tiêu hao sức lực của người lao động trong một đơn vị thời gian.
Câu 490: Lao động cụ thể và lao động trừu tượng là tính hai mặt của lao động
A. tư nhân
*B. sản xuất hàng hóa
C. xã hội cần thiết
D. cá biệt
Gt: Theo C. Mác, lao động sản xuất hàng hóa luôn có tính hai mặt là lao động cụ thể tạo ra giá trị sử dụng và lao động trừu tượng tạo ra giá trị.
Câu 491: Giá cả hàng hóa là hình thức biểu hiện bằng tiền của
*A. giá trị hàng hóa
B. giá trị sử dụng của hàng hóa
C. giá trị trao đổi
D. giá trị thị trường
Gt: Giá cả chính là hình thái biểu hiện bằng tiền của giá trị hàng hóa trên thị trường.
Câu 492: Việc đưa số lượng tiền cần thiết cho lưu thông trong mỗi thời kỳ nhất định phải thống nhất với lưu thông hàng hóa, là yêu cầu của quy luật
A. lưu thông hàng hóa
*B. lưu thông tiền tệ
C. giá trị
D. cung cầu
Gt: Quy luật lưu thông tiền tệ quy định lượng tiền cần thiết cho lưu thông phải phù hợp với tổng giá giá cả của hàng hóa lưu thông.
Câu 493: Thị trường đóng vai trò quyết định trong việc phân bố các nguồn lực xã hội thông qua hoạt động của các thị trường bộ phận, là một trong những đặc trưng chung của
A. cơ cấu kinh tế
B. thể chế kinh tế
*C. kinh tế thị trường
D. kinh tế tự nhiên.
Gt: Việc phân bổ các nguồn lực xã hội bằng cơ chế thị trường và hệ thống giá cả là đặc trưng bản chất của nền kinh tế thị trường.
Câu 494: Giá cả được hình thành theo nguyên tắc thị trường là một trong những đặc trưng chung của
*A. kinh tế thị trường
B. kinh tế tự nhiên
C. thể chế kinh tế
D. cơ cấu kinh tế.
Gt: Trong nền kinh tế thị trường, giá cả hàng hóa do thị trường tự điều tiết dựa trên quy luật giá trị và quan hệ cung cầu.
Câu 495: Giá trị hàng hóa là nội dung, là cơ sở của
A. giá trị sử dụng
*B. giá trị trao đổi
C. phân phối
D. tiêu dùng.
Gt: Giá trị trao đổi chỉ là hình thức biểu hiện ra bên ngoài, còn giá trị là nội dung bên trong, là cơ sở của giá trị trao đổi.
Câu 496: Thực hiện quản trị phát triển nền kinh tế là vai trò của
A. người tiêu dùng
B. người sản xuất
C. các chủ thể trung gian
*D. nhà nước
Gt: Nhà nước đóng vai trò quản lý vĩ mô, định hướng và thực hiện quản trị sự phát triển toàn diện của nền kinh tế.
Câu 497: Lý luận giá trị thặng dư của C.Mác được trình bày cô đọng nhất trong tác phẩm nào sau đây?
A. Chuyên luận về kinh tế chính trị
*B. Bộ Tư bản
C. Tuyên ngôn của đảng cộng sản
D. Phê phán cương lĩnh Gôta
Gt: Bộ Tư bản là tác phẩm kinh điển lớn nhất của C.Mác, chứa đựng toàn bộ hệ thống lý luận cốt lõi về giá trị thặng dư.
Câu 498: Tiền ứng ra ban đầu với mục đích thu được giá trị thặng dư trở thành
A. hàng hoá
B. giá trị sử dụng.
*C. tư bản
D. giá trị trao đổi
Gt: Tiền thông thường chỉ biến thành tư bản khi nó được đưa vào vận động nhằm mục đích làm tăng thêm giá trị (thu về giá trị thặng dư).
Câu 499: Điểm khác cơ bản giữa hai hình thức vận động của tiền trong nền sản xuất hàng hoá giản đơn và tiền trong nền sản xuất hàng hóa tư bản chủ nghĩa là
*A. mục đích của quá trình lưu thông
B. điểm bắt đầu và điểm kết thúc của quá trình lưu thông
C. giới hạn của quá trình lưu thông
D. trình tự của quá trình lưu thông
Gt: Lưu thông hàng hóa giản đơn hướng đến giá trị sử dụng (H-T-H), còn lưu thông tư bản hướng đến mục đích làm tăng giá trị (T-H-T').
Câu 500: Một trong các bộ phận hợp thành giá trị của hàng hoá sức lao động là
A. phí tổn lao động
B. chi phí hàng hoá
C. chi phí sản xuất
*D. phí tốn đào tạo người lao động
Gt: Giá trị sức lao động gồm chi phí tư liệu sinh hoạt của người lao động, chi phí cho gia đình họ và cả chi phí đào tạo nghề nghiệp.
Câu 501: Xí nghiệp A có lượng tư bản đầu tư 100.000.000đồng, cấu tạo hữu cơ của tư bản 4/1. Vậy chi phí sức lao động là bao nhiêu?
A. 40.000.000 đồng
B. 10.000.000 đồng
*C. 20.000.000 đồng
D. 80.000.000 đồng
Gt: Cấu tạo hữu cơ c/v = 4/1 tức v chiếm 1/5 tổng tư bản. Chi phí sức lao động (tư bản khả biến v) = 100.000.000 / 5 = 20.000.000 đồng.
Câu 502: Việc làm tăng chênh lệch giữa thu nhập của nhà tư bản với thu nhập của người lao động làm thuê cả tuyệt đối lẫn tương đối là hệ quả của
*A. tích luỹ tư bản
B. tích luỹ tiêu dùng
C. lưu thông hàng hoá
D. lưu thông tiền tệ
Gt: Tích lũy tư bản không ngừng làm tăng quy mô sản xuất, phân hóa giàu nghèo và làm trầm trọng thêm chênh lệch thu nhập xã hội.
Câu 503: Một trong những nhân tố chủ yếu ảnh hưởng đến quy mô tích lũy tư bản là
*A. trình độ khai thác sức lao động
B. tiêu dùng
C. phân phối
D. bản chất của lao động
Gt: Tăng cường độ hoặc kéo dài ngày lao động (nâng cao trình độ khai thác) giúp tạo nhiều giá trị thặng dư hơn, từ đó tăng quy mô tích lũy.
Câu 504: Xí nghiệp A có chi phí tư bản 100.000.000 đồng, cấu tạo hữu cơ của tư bản 3/2. Vậy chi phí tư liệu sản xuất là bao nhiêu?
A. 40.000.000 đồng
*B. 60.000.000 đồng
C. 30.000.000 đồng
D. 50.000.000 đồng
Gt: Cấu tạo hữu cơ c/v = 3/2 tức c chiếm 3/5 tổng tư bản. Chi phí tư liệu sản xuất (tư bản bất biến c) = 100.000.000 * 3/5 = 60.000.000 đồng.
Câu 505: Mục tiêu, động cơ, động lực của hoạt động sản xuất, kinh doanh trong nền kinh tế thị trường là
A. giá cả
*B. lợi nhuận
C. thoả mãn nhu cầu xã hội
D. thoả mãn nhu cầu cá nhân
Gt: Trong nền kinh tế thị trường, các chủ thể kinh tế luôn đặt mục tiêu tối đa hóa lợi nhuận lên hàng đầu để làm động lực hoạt động.
Câu 506: Một trong những phạm trù thể hiện lợi ích kinh tế của nhà tư bản trong nền kinh tế thị trường tư bản chủ nghĩa là
A. trao đổi hàng hoá
B. giá trị hàng hoá
*C. tỷ suất lợi nhuận
D. giá trị sử dụng.
Gt: Tỷ suất lợi nhuận phản ánh mức độ sinh lời của việc đầu tư tư bản, phản ánh trực tiếp lợi ích kinh tế thu về của nhà tư bản.
Câu 507: Một trong những cơ sở khoa học để xây dựng các chính sách kinh tế liên quan đến thuế, giải quyết các quan hệ đất đai là lý luận địa tô của
*A. C. Mác
B. V.I. Lênin
C. A. Montchretien
D. Thomas Mun
Gt: Lý luận địa tô của C. Mác vạch trần bản chất kinh tế của các loại địa tô, cung cấp cơ sở cho việc quản lý đất đai và đánh thuế.
Câu 508: Mảnh đất có diện tích 100m2, địa tô thu được 60 triệu đồng, tỷ suất ngân hàng nhận gửi hiện hành 5%. Vậy giá cả của mảnh đất là bao nhiêu?
*A. 1.200.000.000 đồng
B. 1.080.000.000 đồng
C. 1.300.000.000 đồng
D. 1.480.000.000 đồng
Gt: Giá cả đất đai được tính theo công thức: Địa tô / Tỷ suất tiền gửi ngân hàng = 60.000.000 / 0.05 = 1.200.000.000 đồng.
Câu 509: Giá trị thặng dư của các nhà tư bản vừa và nhỏ bị mất đi do thua thiệt trong cuộc cạnh tranh là một trong những nguồn gốc của lợi nhuận
*A. độc quyền cao
B. độc quyền
C. bình quân
D. siêu ngạch
Gt: Các tập đoàn độc quyền thu lợi nhuận độc quyền cao bằng cách thâu tóm và chiếm đoạt một phần giá trị thặng dư của các nhà tư bản vừa và nhỏ.
Câu 510: Độc quyền nhà nước trong chủ nghĩa tư bản hình thành nhằm phục vụ lợi ích của
A. xã hội
B. người lao động
*C. độc quyền tư nhân
D. tập thể
Gt: Độc quyền nhà nước kết hợp sức mạnh của tổ chức độc quyền tư nhân với sức mạnh của nhà nước nhằm bảo vệ và phục vụ các tổ chức độc quyền tư nhân.
Câu 511: Độc quyền tạo được sức mạnh kinh tế góp phần thúc đẩy nền kinh tế phát triển theo hướng
A. tự do cạnh tranh
*B. sản xuất lớn hiện đại
C. kinh tế tự nhiên
D. sản xuất tự cấp tự túc
Gt: Nhờ có nguồn lực tích tụ khổng lồ, độc quyền thúc đẩy quá trình cải tiến kỹ thuật, nâng cao năng lực sản xuất lớn và hiện đại.
Câu 512: Sự phát triển của lực lượng sản xuất thúc đẩy trình độ độc quyền lên trạng thái cao hơn, đó là độc quyền
A. công nghiệp
B. tư nhân
C. ngân hàng
*D. nhà nước
Gt: Khi lực lượng sản xuất phát triển vượt bậc, độc quyền tư nhân bộc lộ hạn chế và cần có sự can thiệp, kết hợp của nhà nước tạo thành độc quyền nhà nước.
Câu 513: Sở hữu nhà nước được hình thành dưới hình thức xây dựng doanh nghiệp nhà nước bằng vốn của
A. nước ngoại
B. doanh nghiệp tư nhân
C. doanh nghiệp độc quyền
*D. ngân sách
Gt: Nhà nước trực tiếp sử dụng vốn ngân sách công của quốc gia để đầu tư, xây dựng mới các doanh nghiệp thuộc sở hữu nhà nước.
Câu 514: Sức mạnh và phạm vi bành trướng của các công ty xuyên quốc gia tăng lên thúc đẩy việc hình thành chủ nghĩa tư bản
A. độc quyền nhà nước
*B. độc quyền quốc tế

Gt: Các tổ chức độc quyền bành trướng ra ngoài biên giới quốc gia, đẩy mạnh liên minh quốc tế tạo thành chủ nghĩa tư bản độc quyền quốc tế.
Câu 515: Trong nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam, thị trường giữ vai trò quyết định trong
*A. phân bố nguồn lực xã hội
B. tạo lập điều kiện cho sản xuất phát triển
C. phân phối sản phẩm lao động
D. tạo ra phương thức thỏa mãn nhu cầu xã hội
Gt: Cơ chế thị trường ở Việt Nam đóng vai trò then chốt và quyết định trong việc điều tiết, phân bổ hiệu quả các nguồn lực kinh tế - xã hội.
Câu 516: Nội dung tiên quyết trong hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là hoàn thiện thể chế
*A. về sở hữu, phát triển các thành phần kinh tế và các loại hình doanh nghiệp
B. phát triển đồng bộ các yếu tố thị trường và các loại thị trường
C. gần tăng trưởng kinh tế với bảo đảm phát triển bền vững, thực hiện tiến bộ, công bằng xã hội và hội nhập quốc tế
D. nâng cao năng lực lãnh đạo của Đảng và hệ thống chính trị
Gt: Hoàn thiện thể chế sở hữu và đa dạng thành phần kinh tế là tiền đề cơ bản nhất để định hình nền kinh tế thị trường định hướng XHCN.
Câu 517: Nhân tố nào sau đây không ảnh hưởng đến quan hệ lợi ích kinh tế trong nền kinh tế thị trường?
A. Trình độ phát triển của lực lượng sản xuất
*B. Phong tục tập quán, truyền thống văn hóa
C. Địa vị của chủ thể trong hệ thống quan hệ sản xuất xã hội
D. Chính sách phân phối thu nhập của Nhà nước
Gt: Quan hệ lợi ích kinh tế trực tiếp chịu tác động từ các yếu tố bản chất kinh tế như lực lượng sản xuất, quan hệ sản xuất và chính sách phân phối, không do tập quán quyết định.
Câu 518: Tạo lập những điều kiện để có thể thực hiện chuyển đổi từ nền sản xuất-xã hội lạc hậu sang nền sản xuất-xã hội tiến bộ là một trong những nội dung
*A. công nghiệp hóa, hiện đại hóa ở Việt Nam
B. của cách mạng công nghiệp lần thứ tư
C. của cách mạng công nghiệp lần thứ ba
D. phát triển kinh tế tri thức ở Việt Nam
Gt: Mục đích cốt lõi của công nghiệp hóa, hiện đại hóa ở nước ta là đưa nền sản xuất từ trình độ lạc hậu lên tiên tiến, hiện đại.
Câu 519: Thực hiện các nhiệm vụ để chuyển đổi nền sản xuất- xã hội lạc hậu sang nền sản xuất xã hội hiện đại là một trong những nội dung
*A. công nghiệp hóa, hiện đại hóa ở Việt Nam
B. của cách mạng công nghiệp lần thứ tư
C. của cách mạng công nghiệp lần thứ ba
D. phát triển kinh tế tri thức ở Việt Nam
Gt: Công nghiệp hóa, hiện đại hóa đảm nhiệm vai trò cải biến toàn diện nền sản xuất xã hội từ phương thức thủ công lạc hậu sang công nghệ hiện đại.
Câu 520: Trong bối cảnh hội nhập kinh tế quốc tế, chủ thể nào sau đây dẫn dắt tiến trình hội nhập và hỗ trợ các chủ thể khác cùng tham gia sân chơi ở khu vực và toàn cầu?
A. Người dân
B. Công ty xuyên quốc gia
*C. Nhà nước
D. Doanh nghiệp có vốn đầu tư nước ngoài
Gt: Nhà nước đóng vai trò chủ đạo trong hoạch định đường lối đối ngoại, kiến tạo môi trường pháp lý và dẫn dắt, hỗ trợ nền kinh tế hội nhập toàn cầu.
