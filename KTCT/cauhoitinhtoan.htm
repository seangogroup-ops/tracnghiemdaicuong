<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTCT Mác-Lênin · Bài tập tính toán</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f1117;
  --ink2:#3d4154;
  --ink3:#7a7f96;
  --paper:#f7f8fc;
  --white:#ffffff;
  --primary:#3b5bdb;
  --primary-soft:#eef2ff;
  --primary-mid:#748ffc;
  --green:#2f9e44;
  --green-soft:#ebfbee;
  --red:#e03131;
  --red-soft:#fff5f5;
  --amber:#e67700;
  --amber-soft:#fff9db;
  --border:#e4e7f0;
  --shadow-sm:0 1px 3px rgba(15,17,23,.07),0 1px 2px rgba(15,17,23,.04);
  --shadow-md:0 4px 16px rgba(15,17,23,.1),0 1px 4px rgba(15,17,23,.06);
  --shadow-lg:0 12px 40px rgba(15,17,23,.14),0 4px 12px rgba(15,17,23,.08);
  --radius:14px;
  --radius-sm:8px;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── HEADER ─────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:200;
  background:rgba(247,248,252,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  height:60px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo-badge{
  width:34px;height:34px;border-radius:10px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-badge svg{color:#fff}
.hdr-title{font-size:15px;font-weight:700;color:var(--ink);line-height:1.2}
.hdr-sub{font-size:11px;font-weight:500;color:var(--ink3);letter-spacing:.3px;margin-top:1px}

.timer-pill{
  display:flex;align-items:center;gap:7px;
  background:var(--white);border:1.5px solid var(--border);
  border-radius:50px;padding:6px 14px;
  font-family:'JetBrains Mono',monospace;
  font-size:15px;font-weight:700;color:var(--ink);
  box-shadow:var(--shadow-sm);
  transition:border-color .2s,color .2s;
}
.timer-pill.urgent{border-color:var(--red);color:var(--red)}
.timer-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.4s ease infinite}
.timer-pill.urgent .timer-dot{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.submit-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--primary);color:#fff;
  border:none;border-radius:50px;
  padding:8px 18px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;
  box-shadow:0 2px 8px rgba(59,91,219,.35);
  transition:all .15s;white-space:nowrap;
}
.submit-btn:hover{background:#2f4ac9;transform:translateY(-1px);box-shadow:0 4px 14px rgba(59,91,219,.4)}

/* ── PROGRESS STRIP ──────────────────────── */
.prog-strip{height:3px;background:var(--border);display:flex;gap:1px}
.prog-seg{height:3px;transition:background .3s;flex:1}

/* ── NAV TABS SCROLLER ──────────────────── */
.nav-rail{
  background:var(--white);
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  display:flex;
  padding:0 16px;
  gap:2px;
  scrollbar-width:none;
}
.nav-rail::-webkit-scrollbar{display:none}
.nav-dot{
  flex-shrink:0;
  min-width:38px;height:38px;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
  cursor:pointer;
  color:var(--ink3);
  transition:all .15s;
  border:2px solid transparent;
  margin:6px 0;
}
.nav-dot:hover{background:var(--primary-soft);color:var(--primary)}
.nav-dot.cur{background:var(--primary);color:#fff;border-color:var(--primary)}
.nav-dot.ok{background:var(--green-soft);color:var(--green);border-color:rgba(47,158,68,.2)}
.nav-dot.ng{background:var(--red-soft);color:var(--red);border-color:rgba(224,49,49,.2)}
.nav-dot.skip{background:var(--amber-soft);color:var(--amber)}
.nav-dot.cur.ok,.nav-dot.cur.ng,.nav-dot.cur.skip{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ── MAIN BODY ───────────────────────────── */
.body-wrap{
  max-width:680px;margin:0 auto;
  padding:24px 20px 120px;
}

/* ── QUESTION CARD ───────────────────────── */
.q-card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  padding:24px;
  margin-bottom:16px;
}
.q-meta{
  display:flex;align-items:center;gap:10px;
  margin-bottom:16px;
}
.q-num-badge{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:700;
  color:var(--primary);
  background:var(--primary-soft);
  border-radius:6px;
  padding:4px 10px;
  letter-spacing:.5px;
}
.q-of{font-size:12px;color:var(--ink3);font-weight:500}
.q-text{
  font-size:17px;font-weight:600;
  line-height:1.7;color:var(--ink);
}

/* ── OPTIONS ─────────────────────────────── */
.options{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.opt{
  display:flex;align-items:center;gap:14px;
  padding:15px 18px;
  border-radius:var(--radius-sm);
  border:2px solid var(--border);
  background:var(--paper);
  cursor:pointer;
  transition:all .14s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.opt:not(.locked):hover{
  border-color:var(--primary-mid);
  background:var(--primary-soft);
}
.opt:not(.locked):hover .opt-label{
  background:var(--primary);color:#fff;border-color:var(--primary);
}
.opt.locked{cursor:default;pointer-events:none}

.opt-label{
  width:32px;height:32px;border-radius:50%;
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;font-weight:700;
  color:var(--ink3);
  flex-shrink:0;
  transition:all .14s;
  background:var(--white);
}
.opt-txt{font-size:15px;color:var(--ink);line-height:1.5;font-weight:500}

/* Pending (selected, not yet revealed) */
.opt.pending{border-color:var(--primary);background:var(--primary-soft)}
.opt.pending .opt-label{background:var(--primary);border-color:var(--primary);color:#fff}
.opt.pending .opt-txt{color:var(--primary);font-weight:600}

/* Correct */
.opt.correct{border-color:var(--green);background:var(--green-soft)}
.opt.correct .opt-label{background:var(--green);border-color:var(--green);color:#fff}
.opt.correct .opt-txt{color:var(--green);font-weight:600}

/* Wrong */
.opt.wrong{border-color:var(--red);background:var(--red-soft)}
.opt.wrong .opt-label{background:var(--red);border-color:var(--red);color:#fff}
.opt.wrong .opt-txt{color:var(--red);font-weight:600}

/* ── EXPLANATION BOX ──────────────────────── */
.explain{
  margin-top:14px;
  border-radius:var(--radius-sm);
  padding:16px 18px;
  display:flex;gap:12px;
  border:1.5px solid var(--border);
  background:var(--white);
}
.explain.correct{border-color:rgba(47,158,68,.3);background:var(--green-soft)}
.explain.wrong{border-color:rgba(224,49,49,.25);background:var(--red-soft)}
.explain.hint{border-color:rgba(230,119,0,.3);background:var(--amber-soft)}
.explain-ico{font-size:22px;flex-shrink:0;line-height:1;margin-top:1px}
.explain-tag{
  font-size:11px;font-weight:800;letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:6px;
}
.explain.correct .explain-tag{color:var(--green)}
.explain.wrong .explain-tag{color:var(--red)}
.explain.hint .explain-tag{color:var(--amber)}
.explain-body{font-size:14px;color:var(--ink2);line-height:1.65}

/* ── BOTTOM NAV ─────────────────────────── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(247,248,252,.95);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
  z-index:150;
}
.nav-info{
  text-align:center;flex:1;
  font-size:13px;color:var(--ink3);font-weight:500;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.nav-info-label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--ink3)}
.nav-info-count{font-size:14px;font-weight:700;color:var(--ink)}
.btn-round{
  width:46px;height:46px;border-radius:50%;
  border:none;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
.btn-prev{background:var(--white);border:1.5px solid var(--border);color:var(--ink2)}
.btn-prev:hover{background:var(--paper);border-color:var(--ink3)}
.btn-next{background:var(--primary);color:#fff;box-shadow:0 4px 14px rgba(59,91,219,.4)}
.btn-next:hover{background:#2f4ac9;transform:scale(1.05)}
.btn-round:disabled{opacity:.3;cursor:not-allowed;transform:none!important}

/* ── HINT FAB ───────────────────────────── */
@keyframes fab-bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}
.fab-hint{
  position:fixed;bottom:82px;right:18px;
  background:linear-gradient(135deg,#f76707,#e67700);
  border:none;
  color:#fff;
  border-radius:50px;
  padding:14px 22px;
  font-size:14px;font-weight:800;
  display:flex;align-items:center;gap:8px;
  cursor:pointer;
  box-shadow:0 6px 24px rgba(230,119,0,.5),0 2px 8px rgba(230,119,0,.3);
  font-family:inherit;
  transition:all .2s;
  z-index:140;
  letter-spacing:.2px;
  animation:fab-bounce 2.5s ease-in-out infinite;
}
.fab-hint:hover{
  background:linear-gradient(135deg,#e8590c,#cc6600);
  box-shadow:0 8px 30px rgba(230,119,0,.6),0 3px 10px rgba(230,119,0,.4);
  transform:translateY(-2px) scale(1.04);
  animation:none;
}
.fab-hint:active{transform:scale(.97);animation:none}
.fab-hint svg{flex-shrink:0}
.fab-hint.hidden{display:none}

/* ── SUMMARY ─────────────────────────────── */
.summary-wrap{
  max-width:560px;margin:0 auto;
  padding:32px 20px 100px;
  text-align:center;
}
.sum-hero{
  background:var(--white);border:1px solid var(--border);
  border-radius:20px;padding:32px 24px;
  box-shadow:var(--shadow-md);
  margin-bottom:20px;
}
.sum-emoji{font-size:60px;line-height:1;margin-bottom:12px}
.sum-score{font-size:60px;font-weight:800;color:var(--primary);letter-spacing:-2px;line-height:1}
.sum-total{font-size:18px;font-weight:500;color:var(--ink3);margin-bottom:6px}
.sum-msg{font-size:15px;color:var(--ink2);font-weight:500;margin-top:8px}

.sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.sum-tile{
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 16px;
  box-shadow:var(--shadow-sm);
}
.sum-tile-num{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.sum-tile-lbl{font-size:12px;font-weight:600;color:var(--ink3);letter-spacing:.3px}
.c-ok .sum-tile-num{color:var(--green)}
.c-ng .sum-tile-num{color:var(--red)}
.c-skip .sum-tile-num{color:var(--amber)}
.c-pct .sum-tile-num{color:var(--primary)}

.sum-actions{display:flex;flex-direction:column;gap:10px}
.sum-action-btn{
  width:100%;padding:15px;border-radius:var(--radius);
  font-size:15px;font-weight:700;cursor:pointer;
  border:none;font-family:inherit;
  transition:all .15s;
}
.btn-primary-full{background:var(--primary);color:#fff;box-shadow:0 4px 14px rgba(59,91,219,.35)}
.btn-primary-full:hover{background:#2f4ac9}
.btn-outline-full{background:var(--white);color:var(--primary);border:2px solid var(--primary)}
.btn-outline-full:hover{background:var(--primary-soft)}

/* ── GRID DRAWER ─────────────────────────── */
.drawer-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(15,17,23,.5);z-index:300;
  align-items:flex-end;
}
.drawer-overlay.open{display:flex}
.drawer{
  background:var(--white);
  border-radius:24px 24px 0 0;
  padding:20px 20px 32px;
  width:100%;max-width:680px;
  margin:0 auto;
  max-height:70vh;overflow-y:auto;
}
.drawer-handle{
  width:40px;height:4px;background:var(--border);
  border-radius:4px;margin:0 auto 16px;
}
.drawer-title{
  font-size:14px;font-weight:700;color:var(--ink);
  text-align:center;margin-bottom:16px;
}
.drawer-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.drawer-dot{
  aspect-ratio:1;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
  cursor:pointer;
  border:2px solid var(--border);
  background:var(--paper);
  color:var(--ink3);
  transition:all .12s;
}
.drawer-dot:hover{border-color:var(--primary-mid);color:var(--primary)}
.drawer-dot.cur{background:var(--primary);border-color:var(--primary);color:#fff}
.drawer-dot.ok{background:var(--green-soft);border-color:rgba(47,158,68,.3);color:var(--green)}
.drawer-dot.ng{background:var(--red-soft);border-color:rgba(224,49,49,.25);color:var(--red)}
.drawer-dot.skip{background:var(--amber-soft);border-color:rgba(230,119,0,.25);color:var(--amber)}
.drawer-close{
  width:100%;padding:12px;border-radius:10px;
  border:1.5px solid var(--border);
  background:var(--paper);color:var(--ink2);
  font-size:14px;font-weight:600;
  cursor:pointer;margin-top:16px;font-family:inherit;
  transition:all .12s;
}
.drawer-close:hover{background:var(--border)}

/* ── CONFIRM DIALOG ──────────────────────── */
.confirm-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(15,17,23,.55);z-index:400;
  align-items:center;justify-content:center;padding:24px;
}
.confirm-overlay.open{display:flex}
.confirm-box{
  background:var(--white);border-radius:20px;
  padding:32px 28px;width:100%;max-width:360px;
  text-align:center;
  box-shadow:var(--shadow-lg);
}
.confirm-icon{font-size:48px;margin-bottom:14px}
.confirm-title{font-size:20px;font-weight:800;color:var(--ink);margin-bottom:8px}
.confirm-desc{font-size:14px;color:var(--ink2);line-height:1.6;margin-bottom:24px}
.confirm-actions{display:flex;gap:10px}
.confirm-cancel{
  flex:1;padding:13px;border-radius:12px;
  background:var(--paper);color:var(--ink2);
  border:1.5px solid var(--border);
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .12s;
}
.confirm-cancel:hover{background:var(--border)}
.confirm-ok{
  flex:1;padding:13px;border-radius:12px;
  background:var(--primary);color:#fff;
  border:none;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;
  box-shadow:0 4px 12px rgba(59,91,219,.35);
  transition:all .12s;
}
.confirm-ok:hover{background:#2f4ac9}

/* ── RESPONSIVE ──────────────────────────── */
@media(max-width:480px){
  .hdr-sub{display:none}
  .q-text{font-size:15px}
  .submit-btn span{display:none}
  .submit-btn{padding:8px 12px}
  .drawer-grid{grid-template-columns:repeat(6,1fr)}
}

/* ── ANSWER REVIEW LIST ─────────────────── */
.ral-section{margin-top:24px;text-align:left}
.ral-title{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:14px;text-align:center;letter-spacing:.2px}
.ral-item{
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 18px 14px;
  margin-bottom:12px;box-shadow:var(--shadow-sm);
}
.ral-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ral-num{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--ink3)}
.ral-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:50px;letter-spacing:.4px}
.ral-badge.ok{background:var(--green-soft);color:var(--green)}
.ral-badge.ng{background:var(--red-soft);color:var(--red)}
.ral-badge.skip{background:var(--amber-soft);color:var(--amber)}
.ral-badge.hint{background:var(--amber-soft);color:var(--amber)}
.ral-question{font-size:14px;font-weight:600;color:var(--ink);line-height:1.6;margin-bottom:12px}
.ral-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.ral-opt{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);
  font-size:13px;color:var(--ink2);
}
.ral-opt.ral-correct{border-color:var(--green);background:var(--green-soft);color:var(--green);font-weight:700}
.ral-opt.ral-wrong{border-color:var(--red);background:var(--red-soft);color:var(--red);font-weight:700}
.ral-lbl{
  width:24px;height:24px;border-radius:50%;
  border:1.5px solid currentColor;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;
  font-family:'JetBrains Mono',monospace;
}
.ral-explain{
  font-size:12px;color:var(--ink3);line-height:1.6;
  border-top:1px solid var(--border);padding-top:10px;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-left">
    <div class="logo-badge">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="hdr-title">KTCT Mác-Lênin</div>
      <div class="hdr-sub">Bài tập tính toán</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="timer-pill" id="timer-pill">
      <span class="timer-dot" id="timer-dot"></span>
      <span id="timer-txt">60:00</span>
    </div>
    <button class="submit-btn" onclick="openConfirm()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Nộp bài</span>
    </button>
  </div>
</header>

<!-- PROGRESS STRIP -->
<div class="prog-strip" id="prog-strip"></div>

<!-- NAV RAIL (question dots) -->
<div class="nav-rail" id="nav-rail"></div>

<!-- MAIN CONTENT -->
<div id="main-content"></div>

<!-- HINT FAB -->
<button class="fab-hint hidden" id="fab-hint" onclick="showHint()">
  <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5"/><path d="M12 16v-4m0-4h.01" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
  💡 Xem đáp án
</button>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawerOutside(event)">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title">Danh sách câu hỏi</div>
    <div class="drawer-grid" id="drawer-grid"></div>
    <button class="drawer-close" onclick="closeDrawer()">Đóng</button>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">📋</div>
    <div class="confirm-title">Nộp bài?</div>
    <div class="confirm-desc" id="confirm-desc">Bạn chắc chắn muốn nộp bài không?</div>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeConfirm()">Làm tiếp</button>
      <button class="confirm-ok" onclick="doSubmit()">Nộp bài</button>
    </div>
  </div>
</div>

<script>
const Q=[
{t:"Để tái sản xuất sức lao động cần tiêu dùng những sản phẩm như: sản phẩm ăn uống là 50.000 đồng/ngày, đồ gia dụng là 29.200.000 đồng/năm, thỏa mãn nhu cầu văn hóa: 900.000 đồng/tháng. Vậy giá trị sức lao động trong ngày là bao nhiêu?",o:["160.000 đồng","170.000 đồng","180.000 đồng","200.000 đồng"],c:0,g:"Chi phí gia dụng ngày là 29.200.000 / 365 = 80.000 đồng. Chi phí văn hóa ngày là 900.000 / 30 = 30.000 đồng. Tổng giá trị sức lao động ngày = 50.000 + 80.000 + 30.000 = 160.000 đồng."},
{t:"Công ty A có 10 người lao động, giá trị sức lao động mỗi tháng của một công nhân 5.000.000 đồng, chi phí tư bản bất biến một tháng 90.000.000 đồng, tỷ suất giá trị thặng dư là 50%. Vậy tổng giá trị hàng hóa là bao nhiêu?",o:["195.000.000 đồng","185.000.000 đồng","190.000.000 đồng","165.000.000 đồng"],c:3,g:"Tư bản khả biến V = 10 * 5.000.000 = 50.000.000 đồng. Giá trị thặng dư M = 50% * V = 25.000.000 đồng. Tổng giá trị hàng hóa = C + V + M = 90.000.000 + 50.000.000 + 25.000.000 = 165.000.000 đồng."},
{t:"Xí nghiệp A có lượng tư bản đầu tư 10 tỷ đồng, trong đó tư bản bất biến gấp bốn lần tư bản khả biến, tỷ suất giá trị thặng dư 50%. Vậy khối lượng giá trị thặng dư là bao nhiêu?",o:["900.000.000 đồng","700.000.000 đồng","500.000.000 đồng","1.000.000.000 đồng"],c:3,g:"Ta có C = 4V và C + V = 10 tỷ -> 5V = 10 tỷ -> V = 2 tỷ đồng. Khối lượng giá trị thặng dư M = 50% * V = 1 tỷ đồng."},
{t:"Ngày làm việc 8 giờ thì tỷ suất giá trị thặng dư 100%. Sau đó nhà tư bản kéo dài ngày làm việc đến 10 giờ. Vậy tỷ suất giá trị thặng dư thay đổi như thế nào nếu giá trị sức lao động không đổi và nhà tư bản sử dụng phương pháp sản xuất giá trị thặng dư nào?",o:["150%, sản xuất giá trị thặng dư tuyệt đối","150%, sản xuất giá trị thặng dư tương đối","300%, sản xuất giá trị thặng dư tuyệt đối","300%, sản xuất giá trị thặng dư tương đối"],c:0,g:"Ngày làm 8 giờ, m' = 100% -> t = t' = 4 giờ. Khi ngày kéo dài thành 10 giờ, t không đổi = 4 giờ -> t' = 6 giờ. Tỷ suất mới m' = (6/4)*100% = 150%. Kéo dài ngày lao động là phương pháp sản xuất giá trị thặng dư tuyệt đối."},
{t:"Ngày làm việc 8 giờ, thời gian lao động thặng dư 4 giờ. Sau đó khoa học kỹ thuật phát triển đã được áp dụng vào sản xuất làm cho năng suất lao động ở những ngành sản xuất tư liệu sinh hoạt tăng nên giá trị hàng hóa ở những ngành này giảm hơn trước 2 lần. Vậy tỷ suất giá trị thặng dư thay đổi như thế nào và nhà tư bản sử dụng phương pháp sản xuất giá trị thặng dư nào?",o:["200%, sản xuất giá trị thặng dư tương đối","300%, sản xuất giá trị thặng dư siêu ngạch","300%, sản xuất giá trị thặng dư tuyệt đối","300%, sản xuất giá trị thặng dư tương đối"],c:3,g:"Ban đầu t = 8 - 4 = 4 giờ. Khi giá trị tư liệu sinh hoạt giảm 2 lần, t giảm 2 lần còn 2 giờ -> t' tăng thành 8 - 2 = 6 giờ. Tỷ suất mới m' = (6/2)*100% = 300%. Đây là phương pháp sản xuất giá trị thặng dư tương đối."},
{t:"Xí nghiệp A có lượng tư bản đầu tư 200.000.000 đồng, cấu tạo hữu cơ của tư bản 4/1, tỷ suất giá trị thặng dư 100%, giá trị thặng dư dành cho tiêu dùng 50%. Vậy lượng giá trị thặng dư tư bản hóa là bao nhiêu?",o:["30.000.000 đồng","25.000.000 đồng","20.000.000 đồng","35.000.000 đồng"],c:2,g:"Ta có C + V = 200 triệu, C/V = 4 -> V = 40 triệu đồng. Giá trị thặng dư M = m' * V = 100% * 40 triệu = 40 triệu đồng. Tỷ lệ tư bản hóa là 100% - 50% = 50%, lượng tư bản hóa = 50% * 40 triệu = 20.000.000 đồng."},
{t:"Xí nghiệp A có chi phí tư bản 100.000.000 đồng, trong đó trả tiền công cho người lao động 40.000.000 đồng. Vậy cấu tạo hữu cơ của tư bản là bao nhiêu?",o:["7/3","4/1","3/2","3/1"],c:2,g:"Chi phí khả biến V = 40 triệu, chi phí bất biến C = 100 triệu - 40 triệu = 60 triệu đồng. Cấu tạo hữu cơ c/v = 60/40 = 3/2."},
{t:"Xí nghiệp A có lượng tư bản đầu tư lần thứ nhất 200.000.000 đồng, cấu tạo hữu cơ của tư bản 4/1, tỷ suất giá trị thặng dư 100%, giá trị thặng dư được tư bản hóa 50%. Vậy lượng tư bản đầu tư lần thứ hai là bao nhiêu?",o:["220.000.000 đồng","225.000.000 đồng","230.000.000 đồng","235.000.000 đồng"],c:0,g:"Khối lượng thặng dư được tư bản hóa ở chu kỳ một là 20 triệu đồng. Tư bản đầu tư lần hai = Tư bản lần một + phần tư bản hóa = 200 triệu + 20 triệu = 220.000.000 đồng."},
{t:"Xí nghiệp A có lượng tư bản đầu tư 100.000.000 đồng, cấu tạo hữu cơ của tư bản 4/1, tỷ suất giá trị thặng dư 100%, giá trị thặng dư được tư bản hóa 50%, thì quy mô tư bản sau tích lũy là 110.000.000 đồng. Nếu lượng tư bản đầu tư 200.000.000 đồng thì quy mô tư bản sau tích lũy là",o:["220.000.000 đồng","250.000.000 đồng","200.000.000 đồng","300.000.000 đồng"],c:0,g:"Các tỷ lệ cấu trúc không đổi nên quy mô đầu tư ban đầu tăng gấp đôi (từ 100 triệu lên 200 triệu) thì quy mô tư bản sau tích lũy tăng tỷ lệ thuận gấp đôi: 110 triệu * 2 = 220.000.000 đồng."},
{t:"Xí nghiệp A có chi phí tư bản 100.000.000 đồng, cấu tạo hữu cơ của tư bản 3/2. Vậy chi phí tư bản bất biến là bao nhiêu?",o:["60.000.000 đồng","50.000.000 đồng","40.000.000 đồng","30.000.000 đồng"],c:0,g:"Ta có C + V = 100 triệu và C/V = 3/2 -> V = (2/3)C. Thay vào phương trình ta được C + (2/3)C = 100 triệu -> C = 60.000.000 đồng."},
{t:"Xí nghiệp A có chi phí tư bản 100.000.000 đồng, trong đó chi phí mua tư liệu sản xuất 70.000.000 đồng. Vậy cấu tạo hữu cơ của tư bản là bao nhiêu?",o:["7/3","4/1","3/2","3/1"],c:0,g:"Chi phí tư bản bất biến (mua TLSX) C = 70 triệu đồng. Chi phí tư bản khả biến V = 100 triệu - 70 triệu = 30 triệu đồng. Cấu tạo hữu cơ c/v = 70/30 = 7/3. `  },  {  name: \"Câu 241-280\",  content: `"},
{t:"Xí nghiệp giày da có tổng giá trị hàng hóa một tháng 650.000.000 đồng, giá trị thặng dư trong tháng thu được 100.000.000 đồng. Vậy chi phí sản xuất của xí nghiệp giày da trong tháng là bao nhiêu?",o:["550.000.000 đồng","100.000.000 đồng","450.000.000 đồng","300.000.000 đồng"],c:0,g:"Ta có công thức tính giá trị hàng hóa: G = K + M với K là chi phí sản xuất của xí nghiệp, M là tổng giá trị thặng dư của xí nghiệp giày da. Từ đó, ta rút ra công thức tính chi phí sản xuất: K = G - M. Thay số vào ta được: k = 650.000.000 - 100.000.000 = 550.000.000 đồng."},
{t:"Xí nghiệp A có lượng tư bản đầu tư 800.000.000 đồng, lợi nhuận thu được 8.000.000 đồng. Vậy tỷ suất lợi nhuận của xí nghiệp A là bao nhiêu?",o:["10%","1%","0,1%","2%"],c:1,g:"Theo đề, ta có: lợi nhuận của xí nghiệp A là P = 8.000.000 đồng và chi phí sản xuất của xí nghiệp (lượng tư bản đầu tư) K = 800.000.000 đồng. Tỷ suất lợi nhuận của xí nghiệp A là P' = (P / K) * 100% = (8.000.000 / 800.000.000) * 100% = 1%."},
{t:"Xí nghiệp A có lượng tư bản đầu tư 400.000.000 đồng, cấu tạo hữu cơ của tư bản 3/2, tỷ suất giá trị thặng dư 50%. Trong điều kiện cung bằng cầu lợi nhuận của xí nghiệp A là bao nhiêu?",o:["20.000.000 đồng","40.000.000 đồng","80.000.000 đồng","50.000.000 đồng"],c:2,g:"Gọi C, V lần lượt là tổng tư bản bất biến và tư bản khả biến của xí nghiệp A. Vì cấu tạo hữu cơ của tư bản C/V = 3/2 nên C = 3/2 V. Ta có: lượng tư bản đầu tư = tổng tư bản bất biến (C) + tổng tư bản khả biến (V). Từ đó, ta có phương trình: 3/2 V + V = 400.000.000 V = 160.000.000 đồng. Gọi M là tổng giá trị thặng dư của toàn bộ xí nghiệp A. Vì tỷ suất giá trị thặng dư (m') là tỷ lệ phần trăm giữa giá trị thặng dư và tư bản khả biến. Từ công thức tính tỷ suất giá trị thặng dư, ta rút ra được công thức tính giá trị thặng dư: M = (m' * V) / 100%. Do đó, tổng giá trị thặng dư của toàn bộ xí nghiệp là M = (50% * 160.000.000) / 100% = 80.000.000 đồng. Trong điều kiện cung bằng cầu, lợi nhuận của xí nghiệp A (P) bằng đúng tổng giá trị thặng dư (M) nên P = 80.000.000 đồng."},
{t:"Ông A vay ông B số tiền 100.000.000 đồng với tỷ suất lợi tức 3% một tháng. Vậy lợi tức ông A trả cho ông B một tháng là bao nhiêu?",o:["3.000.000 đồng","4.000.000 đồng","5.000.000 đồng","6.000.000 đồng"],c:0,g:"Lợi tức (z) được tính bằng số tiền vay nhân với tỷ suất lợi tức => z = 100.000.000 * 3% = 3.000.000 đồng."},
{t:"Có 3 ngành sản xuất trong đó tư bản đầu tư của ngành I: 900C + 100V; ngành II: 3100C + 900V; ngành III: 8000C + 2000V; tỷ suất giá trị thặng dư đều là 100% (đơn vị tính: tỷ đồng). Trong điều kiện cung bằng cầu, tỷ suất lợi nhuận bình quân là bao nhiêu?",o:["10%","25%","15%","20%"],c:3,g:"Tổng P = Tổng V = 100 + 900 + 2000 = 3000. Tổng tư bản = 1000 + 4000 + 10000 = 15000. Tỷ suất lợi nhuận bình quân = (3000 / 15000) * 100% = 20%."},
{t:"Có ba ngành sản xuất A, B, C đầu tư một lượng tư bản như nhau là 100.000.000 đồng với cấu tạo hữu cơ của tư bản của từng ngành lần lượt là 4/1, 3/2, 7/3, tỷ suất giá trị thặng dư là 100%. Trong điều kiện cung bằng cầu, lợi nhuận bình quân từng ngành thu được bằng bao nhiêu?",o:["20.000.000 đồng","30.000.000 đồng","40.000.000 đồng","80.000.000 đồng"],c:1,g:"Tổng V của 3 ngành lần lượt là 20 triệu, 40 triệu, 30 triệu => Tổng m = 90 triệu. Tỷ suất lợi nhuận bình quân = 90 / 300 = 30%. Lợi nhuận bình quân mỗi ngành = 100 triệu * 30% = 30.000.000 đồng."},
{t:"Ông A vay ông B số tiền 100.000.000 đồng. Sau 1 tháng ông A phải trả cho ông B 103.000.000 đồng. Vậy ông A vay tiền ông B với tỷ suất lợi tức là bao nhiêu?",o:["1%","4%","2%","3%"],c:3,g:"Tiền lợi tức z = 103 - 100 = 3 triệu. Tỷ suất lợi tức z' = (3 / 100) * 100% = 3%."},
{t:"Xí nghiệp A có chi phí tư bản 100.000.000 đồng, cấu tạo hữu cơ của tư bản 7/3, tỷ suất giá trị thặng dư 50%. Vậy giá trị cũ là bao nhiêu?",o:["70.000.000 đồng","45.000.000 đồng","15.000.000 đồng","30.000.000 đồng"],c:0,g:"Chi phí tư bản k = c + v = 100tr, cấu tạo hữu cơ c/v = 7/3 nên giá trị cũ chuyển vào (tư bản bất biến c) là 70 triệu đồng."},
{t:"Tổng số tư bản công nghiệp và tư bản thương nghiệp là 1.000.000.000 đồng, tỷ suất lợi nhuận bình quân 18%, lợi nhuận bình quân công nghiệp là 162.000.000 đồng. Vậy lợi nhuận bình quân của thương nghiệp là bao nhiêu?",o:["18.000.000 đồng","180.000.000 đồng","14.800.000 đồng","148.000.000 đồng"],c:0,g:"Tổng lợi nhuận bình quân = 1 tỷ * 18% = 180tr. Lợi nhuận thương nghiệp = 180tr - 162tr = 18 triệu đồng."},
{t:"Mảnh đất có diện tích 100m2, địa tô thu được 60 triệu đồng, tỷ suất ngân hàng nhận gửi hiện hành 5%. Vậy giá cả của mảnh đất là bao nhiêu?",o:["1.200.000.000 đồng","1.080.000.000 đồng","1.300.000.000 đồng","1.480.000.000 đồng"],c:0,g:"Giá cả đất đai bằng địa tô chia cho tỷ suất lợi tức ngân hàng (60.000.000 / 5% = 1.200.000.000 đồng)."},
{t:"Mảnh đất có diện tích 100m2, giá cả mảnh đất 2 tỷ đồng, tỷ suất ngân hàng nhận gửi hiện hành 7%. Vậy địa tô của mảnh đất là bao nhiêu?",o:["140.000.000 đồng","120.000.000 đồng","130.000.000 đồng","170.000.000 đồng"],c:0,g:"Địa tô = Giá cả đất x Tỷ suất lợi tức = 2.000.000.000 x 7% = 140.000.000 đồng."},
{t:"Xí nghiệp A có lượng tư bản đầu tư ban đầu 100.000.000 đồng, cấu tạo hữu cơ 4/1, tỷ suất giá trị thặng dư 100%, giá trị thặng dư được tư bản hóa 50%, quy mô tư bản sau tích lũy là 110.000.000 đồng. Nếu lượng tư bản ban đầu tăng gấp đôi (200.000.000 đồng) thì quy mô tư bản sau tích lũy là bao nhiêu?",o:["300.000.000 đồng","220.000.000 đồng","200.000.000 đồng","250.000.000 đồng"],c:1,g:"Các thông số khác không đổi, khi lượng tư bản đầu tư ban đầu gấp đôi từ 100.000.000 đồng lên 200.000.000 đồng thì quy mô tư bản sau tích lũy cũng sẽ gấp đôi: 110.000.000 × 2 = 220.000.000 đồng."},
{t:"Xí nghiệp A trong một tháng sản xuất kinh doanh thu về tổng giá trị hàng hóa 400.000.000 đồng, trong đó giá trị mới là 80.000.000 đồng. Vậy lượng giá trị cũ là bao nhiêu?",o:["220.000.000 đồng","320.000.000 đồng","340.000.000 đồng","250.000.000 đồng"],c:1,g:"Tổng giá trị hàng hóa G = C + (V + M), trong đó giá trị mới là V + M = 80.000.000 đồng. Do đó giá trị cũ C = G − (V + M) = 400.000.000 − 80.000.000 = 320.000.000 đồng."},
{t:"Mảnh đất có diện tích 100m², giá cả mảnh đất 2 tỷ đồng, tỷ suất ngân hàng nhận gửi hiện hành 7%. Vậy địa tô của mảnh đất là bao nhiêu?",o:["170.000.000 đồng","130.000.000 đồng","120.000.000 đồng","140.000.000 đồng"],c:3,g:"Công thức: Địa tô = Giá cả mảnh đất × Tỷ suất ngân hàng = 2.000.000.000 × 7% = 140.000.000 đồng."},
{t:"Giá mảnh đất 100m² ở Bình Định năm 2020 tăng từ 500.000.000 đồng lên 800.000.000 đồng, lãi suất tiền vay giảm từ 5% xuống 4%. Vậy địa tô thay đổi như thế nào?",o:["Từ 25.000.000 đồng tăng lên 30.000.000 đồng","Từ 25.000.000 đồng tăng lên 22.000.000 đồng","Từ 30.000.000 đồng giảm xuống 25.000.000 đồng","Từ 25.000.000 đồng tăng lên 32.000.000 đồng"],c:3,g:"Địa tô ban đầu = 500.000.000 × 5% = 25.000.000 đồng. Địa tô lúc sau = 800.000.000 × 4% = 32.000.000 đồng. Vậy địa tô tăng từ 25.000.000 đồng lên 32.000.000 đồng."},
{t:"Ngày làm việc 8 giờ, thời gian lao động thặng dư 4 giờ. Sau đó năng suất lao động tăng làm giá trị tư liệu sinh hoạt giảm 2 lần. Tỷ suất giá trị thặng dư mới là bao nhiêu và sử dụng phương pháp sản xuất giá trị thặng dư nào?",o:["300%, sản xuất giá trị thặng dư tương đối","200%, sản xuất giá trị thặng dư tương đối","300%, sản xuất giá trị thặng dư siêu ngạch","300%, sản xuất giá trị thặng dư tuyệt đối"],c:0,g:"Thời gian lao động tất yếu ban đầu t = 8 − 4 = 4 giờ. Khi giá trị tư liệu sinh hoạt giảm 2 lần thì thời gian lao động tất yếu giảm còn t' = 2 giờ. Thời gian lao động thặng dư mới là 8 − 2 = 6 giờ. Tỷ suất giá trị thặng dư mới m' = (6 / 2) × 100% = 300%. Đây là phương pháp sản xuất giá trị thặng dư tương đối."},

{t:"Xí nghiệp A có lượng tư bản đầu tư 200.000.000 đồng, cấu tạo hữu cơ 4/1, tỷ suất giá trị thặng dư 100%, tỷ suất tích lũy tư bản 50%. Hỏi khối lượng giá trị thặng dư tư bản hóa là bao nhiêu?",o:["35.000.000 đồng","20.000.000 đồng","30.000.000 đồng","32.000.000 đồng"],c:1,g:"Từ C/V = 4/1 và C + V = 200.000.000 đồng, suy ra V = 40.000.000 đồng. Tổng khối lượng giá trị thặng dư M = V × m' = 40.000.000 × 100% = 40.000.000 đồng. Khối lượng giá trị thặng dư tư bản hóa = 40.000.000 × 50% = 20.000.000 đồng."},
{t:"Mảnh đất có diện tích 100m², địa tô thu được 60 triệu đồng, tỷ suất ngân hàng nhận gửi hiện hành 5%. Vậy giá cả của mảnh đất là bao nhiêu?",o:["1.200.000.000 đồng","1.300.000.000 đồng","1.080.000.000 đồng","1.400.000.000 đồng"],c:0,g:"Giá cả ruộng đất = Địa tô / Tỷ suất ngân hàng = 60.000.000 / 5% = 1.200.000.000 đồng."},
{t:"Tổng tư bản công nghiệp và tư bản thương nghiệp là 1.000.000.000 đồng, tỷ suất lợi nhuận bình quân 18%, lợi nhuận bình quân công nghiệp là 162.000.000 đồng. Vậy lợi nhuận bình quân của thương nghiệp là bao nhiêu?",o:["14.800.000 đồng","18.000.000 đồng","148.000.000 đồng","180.000.000 đồng"],c:1,g:"Tổng lợi nhuận bình quân = 1.000.000.000 × 18% = 180.000.000 đồng. Lợi nhuận bình quân thương nghiệp = 180.000.000 − 162.000.000 = 18.000.000 đồng."},
{t:"Xí nghiệp A có lượng tư bản đầu tư 10 tỷ đồng, tư bản bất biến gấp bốn lần tư bản khả biến, tỷ suất giá trị thặng dư 50%, thời gian chu chuyển một vòng 6 tháng. Vậy khối lượng giá trị thặng dư trong năm là bao nhiêu?",o:["2 tỷ đồng","1 tỷ đồng","500.000.000 đồng","900.000.000 đồng"],c:0,g:"Từ C = 4V và C + V = 10 tỷ đồng, suy ra V = 2 tỷ đồng. Giá trị thặng dư một vòng M1 = V × m' = 2 tỷ × 50% = 1 tỷ đồng. Số vòng chu chuyển trong năm = 12 / 6 = 2 vòng. Tổng giá trị thặng dư trong năm = 1 tỷ × 2 = 2 tỷ đồng."},
{t:"Có ba ngành sản xuất A, B, C đầu tư 100.000.000 đồng mỗi ngành, cấu tạo hữu cơ lần lượt là 4/1, 3/2, 7/3; tỷ suất giá trị thặng dư là 100%. Trong điều kiện cung bằng cầu, lợi nhuận bình quân từng ngành thu được bằng bao nhiêu?",o:["40.000.000 đồng","20.000.000 đồng","30.000.000 đồng","60.000.000 đồng"],c:2,g:"Tổng V = VA + VB + VC = 20 + 40 + 30 = 90.000.000 đồng. Tổng M = 90.000.000 đồng. Tỷ suất lợi nhuận bình quân P' = 90 / 300 × 100% = 30%. Do đầu tư bằng nhau nên lợi nhuận bình quân mỗi ngành = 100.000.000 × 30% = 30.000.000 đồng."},
{t:"Với tỷ suất lợi tức cho vay 3% một tháng, ông A trả lợi tức cho ông B một tháng 6.000.000 đồng. Vậy ông B cho ông A vay với số tiền là bao nhiêu?",o:["200.000.000 đồng","600.000.000 đồng","300.000.000 đồng","400.000.000 đồng"],c:0,g:"Số tiền cho vay = Lợi tức / z' = 6.000.000 / 3% = 200.000.000 đồng."},
{t:"Ngày làm việc 8 giờ thì tỷ suất giá trị thặng dư là 100%. Sau đó nhà tư bản kéo dài ngày làm việc đến 10 giờ (giá trị sức lao động không đổi). Tỷ suất giá trị thặng dư mới là bao nhiêu và sử dụng phương pháp nào?",o:["200%, sản xuất giá trị thặng dư tương đối","150%, sản xuất giá trị thặng dư tuyệt đối","300%, sản xuất giá trị thặng dư tuyệt đối","150%, sản xuất giá trị thặng dư tương đối"],c:1,g:"Ban đầu m' = 100% nên thời gian lao động tất yếu t = 4 giờ. Khi ngày làm việc kéo dài đến 10 giờ, thời gian lao động thặng dư mới là 10 − 4 = 6 giờ. Tỷ suất giá trị thặng dư mới m' = (6 / 4) × 100% = 150%. Phương pháp kéo dài ngày làm việc là sản xuất giá trị thặng dư tuyệt đối."},
{t:"Có 3 ngành sản xuất với tư bản: ngành I: 900c + 100v; ngành II: 3100c + 900v; ngành III: 8000c + 2000v; tỷ suất giá trị thặng dư đều 100% (đơn vị tỷ đồng). Trong điều kiện cung bằng cầu, tỷ suất lợi nhuận bình quân là bao nhiêu?",o:["10%","20%","15%","25%"],c:1,g:"Tổng V = 100 + 900 + 2000 = 3000 tỷ. Tổng tư bản đầu tư = (900 + 100) + (3100 + 900) + (8000 + 2000) = 15000 tỷ. Vì m' = 100% nên tổng M = tổng V = 3000 tỷ. Tỷ suất lợi nhuận bình quân P' = (3000 / 15000) × 100% = 20%."},
];

// ── STATE ──
let cur = 0;
let ans = new Array(Q.length).fill(null);
// ans[i]: null | {choice:number, revealed:bool} | 'skip' | 'hint' | 'unanswered'
let showSum = false;
let totalSec = 60 * 60;

// ── TIMER ──
const timerEl = document.getElementById('timer-txt');
const timerPill = document.getElementById('timer-pill');
const timerInterval = setInterval(() => {
  if (totalSec <= 0) { clearInterval(timerInterval); finishQuiz(); return; }
  totalSec--;
  const m = String(Math.floor(totalSec / 60)).padStart(2, '0');
  const s = String(totalSec % 60).padStart(2, '0');
  timerEl.textContent = m + ':' + s;
  if (totalSec < 300) timerPill.classList.add('urgent');
}, 1000);

// ── HELPERS ──
const LABELS = ['A', 'B', 'C', 'D'];

function revealCurrent() {
  const a = ans[cur];
  if (a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && !a.revealed)
    ans[cur] = { choice: a.choice, revealed: true };
}
function skipIfEmpty() {
  if (ans[cur] === null) ans[cur] = 'skip';
}
function ansState(i) {
  const a = ans[i];
  if (!a || a === 'skip') return 'none';
  if (a === 'unanswered') return 'unanswered';
  if (a === 'hint') return 'hint';
  if (!a.revealed) return 'pending';
  return a.choice === Q[i].c ? 'ok' : 'ng';
}

// ── RENDER NAV ──
function renderNav() {
  const rail = document.getElementById('nav-rail');
  rail.innerHTML = Q.map((_, i) => {
    const s = ansState(i);
    const isCur = i === cur && !showSum;
    let cls = 'nav-dot';
    if (isCur) cls += ' cur';
    else if (s === 'ok') cls += ' ok';
    else if (s === 'ng') cls += ' ng';
    else if (s === 'hint' || s === 'none' && ans[i] === 'skip') cls += ' skip';
    return `<div class="${cls}" onclick="goTo(${i})">${i + 1}</div>`;
  }).join('');
  // Scroll active into view
  setTimeout(() => {
    const dots = rail.querySelectorAll('.nav-dot');
    if (dots[cur]) dots[cur].scrollIntoView({ block: 'nearest', inline: 'center' });
  }, 30);
}

// ── RENDER PROGRESS ──
function renderProgress() {
  const strip = document.getElementById('prog-strip');
  strip.innerHTML = Q.map((_, i) => {
    const s = ansState(i);
    let bg = '#e4e7f0';
    if (s === 'ok') bg = '#2f9e44';
    else if (s === 'ng' || s === 'unanswered') bg = '#e03131';
    else if (s === 'hint' || (ans[i] === 'skip')) bg = '#e67700';
    return `<div class="prog-seg" style="background:${bg}"></div>`;
  }).join('');
}

// ── RENDER QUESTION ──
function renderQ() {
  if (showSum) { renderSum(); return; }

  const q = Q[cur];
  const a = ans[cur];
  const isHint = a === 'hint';
  const isSkip = a === 'unanswered';
  const isChosen = a && a !== 'skip' && a !== 'unanswered' && a !== 'hint';
  const isRevealed = isChosen && a.revealed;
  const choice = isChosen ? a.choice : null;
  const locked = isSkip || isRevealed || isHint;

  // Build options
  const opts = q.o.map((o, i) => {
    let cls = 'opt';
    if (locked) cls += ' locked';
    if (isRevealed) {
      if (i === q.c) cls += ' correct';
      else if (i === choice) cls += ' wrong';
    } else if (isHint && i === q.c) {
      cls += ' correct';
    } else if (isChosen && i === choice && !isRevealed) {
      cls += ' pending';
    }
    const click = !locked ? `onclick="pick(${i})"` : '';
    return `<div class="${cls}" ${click}>
      <div class="opt-label">${LABELS[i]}</div>
      <div class="opt-txt">${o}</div>
    </div>`;
  }).join('');

  // Explanation
  let explain = '';
  if (isRevealed) {
    const isCorrect = choice === q.c;
    const cls = isCorrect ? 'correct' : 'wrong';
    const ico = isCorrect ? '✅' : '❌';
    const tag = isCorrect ? 'Chính xác!' : `Sai — Đáp án đúng: ${LABELS[q.c]}. ${q.o[q.c]}`;
    explain = `<div class="explain ${cls}">
      <div class="explain-ico">${ico}</div>
      <div><div class="explain-tag">${tag}</div><div class="explain-body">${q.g}</div></div>
    </div>`;
  } else if (isHint) {
    explain = `<div class="explain hint">
      <div class="explain-ico">💡</div>
      <div><div class="explain-tag">Đáp án đúng: ${LABELS[q.c]}</div><div class="explain-body"><strong>${q.o[q.c]}</strong><br><br>${q.g}</div></div>
    </div>`;
  }

  // FAB
  const fab = document.getElementById('fab-hint');
  const showFab = !showSum && !locked;
  fab.classList.toggle('hidden', !showFab);

  document.getElementById('main-content').innerHTML = `
    <div class="body-wrap">
      <div class="q-card">
        <div class="q-meta">
          <span class="q-num-badge">CÂU ${cur + 1}</span>
          <span class="q-of">/ ${Q.length} câu</span>
        </div>
        <div class="q-text">${q.t}</div>
        <div class="options">${opts}</div>
        ${explain}
      </div>
    </div>
    <div class="bottom-nav">
      <button class="btn-round btn-prev" onclick="prev()" ${cur === 0 ? 'disabled' : ''}>
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-info" onclick="openDrawer()">
        <span class="nav-info-label">Tiến độ</span>
        <span class="nav-info-count">${cur + 1} / ${Q.length}</span>
      </div>
      <button class="btn-round btn-next" onclick="next()">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>`;

  renderNav();
  renderProgress();
}

// ── RENDER SUMMARY ──
function renderSum() {
  const ok = ans.filter((a, i) => a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && a.revealed && a.choice === Q[i].c).length;
  const ng = ans.filter((a, i) => a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && a.revealed && a.choice !== Q[i].c).length;
  const sk = ans.filter(a => !a || a === 'skip' || a === 'unanswered' || a === 'hint').length;
  const pct = Math.round(ok / Q.length * 100);
  const pass = ok >= Math.ceil(Q.length * 0.8);

  const answerList = Q.map((q, i) => {
    const a = ans[i];
    const isSkip = !a || a === 'skip' || a === 'unanswered';
    const isHint = a === 'hint';
    const isCorrect = !isSkip && !isHint && a.revealed && a.choice === q.c;
    const isWrong   = !isSkip && !isHint && a.revealed && a.choice !== q.c;
    const choiceIdx = (!isSkip && !isHint) ? a.choice : null;

    let badge, badgeCls;
    if (isCorrect)    { badge = '✓ Đúng';   badgeCls = 'ral-badge ok'; }
    else if (isWrong) { badge = '✗ Sai';    badgeCls = 'ral-badge ng'; }
    else if (isHint)  { badge = '💡 Gợi ý'; badgeCls = 'ral-badge hint'; }
    else              { badge = '— Bỏ qua'; badgeCls = 'ral-badge skip'; }

    const opts = q.o.map((o, j) => {
      let cls = 'ral-opt';
      if (j === q.c) cls += ' ral-correct';
      else if (j === choiceIdx && isWrong) cls += ' ral-wrong';
      return `<div class="${cls}"><span class="ral-lbl">${LABELS[j]}</span><span>${o}</span></div>`;
    }).join('');

    return `<div class="ral-item">
      <div class="ral-header"><span class="ral-num">Câu ${i + 1}</span><span class="${badgeCls}">${badge}</span></div>
      <div class="ral-question">${q.t}</div>
      <div class="ral-opts">${opts}</div>
      <div class="ral-explain">💬 ${q.g}</div>
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="summary-wrap">
      <div class="sum-hero">
        <div class="sum-emoji">${pass ? '🎉' : '📖'}</div>
        <div class="sum-score">${ok}</div>
        <div class="sum-total">/ ${Q.length} câu đúng</div>
        <div class="sum-msg">${pass ? 'Xuất sắc! Bạn nắm vững nội dung.' : 'Cần ôn thêm để nắm chắc hơn nhé.'}</div>
      </div>
      <div class="sum-grid">
        <div class="sum-tile c-ok"><div class="sum-tile-num">${ok}</div><div class="sum-tile-lbl">Câu đúng</div></div>
        <div class="sum-tile c-ng"><div class="sum-tile-num">${ng}</div><div class="sum-tile-lbl">Câu sai</div></div>
        <div class="sum-tile c-skip"><div class="sum-tile-num">${sk}</div><div class="sum-tile-lbl">Bỏ qua</div></div>
        <div class="sum-tile c-pct"><div class="sum-tile-num">${pct}%</div><div class="sum-tile-lbl">Điểm số</div></div>
      </div>
      <div class="sum-actions">
        <button class="sum-action-btn btn-primary-full" onclick="restart()">Làm lại từ đầu</button>
      </div>
      <div class="ral-section">
        <div class="ral-title">📋 Đáp án chi tiết</div>
        ${answerList}
      </div>
    </div>`;

  document.getElementById('fab-hint').classList.add('hidden');
  renderNav();
  renderProgress();
}

// ── ACTIONS ──
function pick(i) {
  const a = ans[cur];
  if (a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && a.revealed) return;
  ans[cur] = { choice: i, revealed: false };
  renderQ();
}

function prev() {
  if (cur === 0) return;
  revealCurrent();
  cur--;
  showSum = false;
  renderQ();
}

function next() {
  revealCurrent();
  if (cur < Q.length - 1) { cur++; renderQ(); }
  else { openConfirm(); }
}

function goTo(i) {
  revealCurrent();
  skipIfEmpty();
  cur = i;
  showSum = false;
  renderQ();
  closeDrawer();
}

function showHint() {
  const a = ans[cur];
  if (a && a !== 'skip' && a !== 'unanswered' && !a.revealed)
    ans[cur] = { choice: a.choice, revealed: true };
  else if (a === null)
    ans[cur] = 'hint';
  renderQ();
}

function finishQuiz() {
  // Reveal all answers — pending choices get revealed and scored properly
  ans = ans.map(a => {
    if (a === null) return 'unanswered';
    if (a === 'skip') return 'skip';
    if (a === 'hint' || a === 'unanswered') return a;
    if (!a.revealed) return { choice: a.choice, revealed: true };
    return a;
  });
  showSum = true;
  renderSum();
}

function restart() {
  ans = new Array(Q.length).fill(null);
  cur = 0; showSum = false;
  totalSec = 60 * 60;
  renderQ();
}

function review() {
  showSum = false; cur = 0; renderQ();
}

// ── DRAWER ──
function openDrawer() {
  const grid = document.getElementById('drawer-grid');
  grid.innerHTML = Q.map((_, i) => {
    const s = ansState(i);
    let cls = 'drawer-dot';
    if (i === cur && !showSum) cls += ' cur';
    else if (s === 'ok') cls += ' ok';
    else if (s === 'ng') cls += ' ng';
    else if (s === 'hint' || ans[i] === 'skip') cls += ' skip';
    return `<div class="${cls}" onclick="goTo(${i})">${i + 1}</div>`;
  }).join('');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
}
function closeDrawerOutside(e) {
  if (e.target === document.getElementById('drawer-overlay')) closeDrawer();
}

// ── CONFIRM ──
function openConfirm() {
  const done = ans.filter(a => a !== null && a !== 'skip' && a !== 'unanswered').length;
  const skip = ans.filter(a => a === null || a === 'skip').length;
  const desc = document.getElementById('confirm-desc');
  if (skip > 0)
    desc.innerHTML = `Đã làm <strong>${done}/${Q.length}</strong> câu, còn <strong>${skip}</strong> câu chưa trả lời.`;
  else
    desc.innerHTML = `Đã hoàn thành <strong>tất cả ${Q.length} câu</strong>. Sẵn sàng nộp!`;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() {
